description:
  nl:
    localisedName: GBO-Semantiek
    shortDescription: >
      Open standaard voor de semantische beschrijving van overheidsbasisgegevens.
    longDescription: >
      GBO-Semantiek is het semantisch raamwerk van de Gemeenschappelijke
      BronOntsluiting (GBO): een landelijke, sectoroverstijgende open standaard
      voor de semantische beschrijving van basisgegevens uit overheidsregistraties.
      De standaard biedt een gedeeld begrippenkader en informatiemodel voor
      interoperabiliteit en datakwaliteit tussen overheidsorganisaties, gemeenten
      en ketenpartners. De inhoud put uit gemeentelijke referentiemodellen (GGM,
      RSGB) en de catalogi van de landelijke basisregistraties (BRP, BAG, BRK,
      BGT, HR, WOZ). Het repository volgt het principe documentation-first: de
      documentatie is de bron van waarheid en UML-, JSON Schema- en RDF/OWL-
      artefacten worden daarvan afgeleid.
    features:
      - Begrippenkader (SKOS)
      - Informatiemodel
      - Linked Data / RDF-ontologie
      - Documentatiewebsite

