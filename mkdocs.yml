# mkdocs.yml — GBO Semantiek documentatieconfiguratie
#
# Gebruik:
#   mkdocs serve          — lokale ontwikkelserver
#   mkdocs build          — statische site bouwen
#   mike deploy v0.1      — versie publiceren via mike
#
# Mike-integratie:
#   mike beheert gedocumenteerde versies op GitHub Pages (gh-pages branch).
#   Gebruik 'mike deploy --push --update-aliases <versie> latest' om te publiceren.
#   Zie docs/versiebeheer.md voor meer uitleg.

site_name: GBO Semantiek
site_description: >-
  Informatiemodel Semantiek voor Gemeentelijke Basisgegevens Objecten —
  open standaard voor interoperabiliteit en datakwaliteit binnen gemeenten.
site_author: GBO Semantiek Werkgroep
site_url: https://brienen.github.io/gbo-semantiek/

# Repository-link in de navigatie
repo_name: brienen/gbo-semantiek
repo_url: https://github.com/brienen/gbo-semantiek
edit_uri: edit/main/docs/

# Documentatiedirectory
docs_dir: docs
site_dir: site

# Mike-versioning: stel in zodat mike de versie-informatie correct injecteert
extra:
  version:
    provider: mike
    default: latest

# Thema: Material (conform GGM-stijl)
theme:
  name: material
  language: nl
  palette:
    - scheme: default
      primary: blue
      accent: light blue
      toggle:
        icon: material/brightness-7
        name: Schakel naar donker thema
    - scheme: slate
      primary: blue
      accent: light blue
      toggle:
        icon: material/brightness-4
        name: Schakel naar licht thema
  features:
    - navigation.top
    - navigation.footer
    - navigation.indexes
    - search.highlight
    - search.share
    - content.action.edit
    - content.code.copy
  font:
    text: Roboto
    code: Roboto Mono
  logo: assets/icon.png
  favicon: assets/icon.png

# Plugins
plugins:
  - search:
      lang: nl

# Markdown-extensies
markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
      title: Op deze pagina
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html

# Navigatiestructuur
# Links: alleen de hoofdsecties. Rechts: subpagina's en TOC van de huidige pagina.
# Elke sectie heeft een index.md die de subpagina's linkt.
nav:
  - Inleiding: index.md
  - Uitgangspunten:
    - Ontwerprincipes: uitgangspunten/ontwerpprincipes.md
    - Andere standaarden: uitgangspunten/andere_standaarden.md
    - URI-strategie: uitgangspunten/uri-strategie.md
  - Architectuur: 
    - Raamwerk: architectuur/raamwerk.md
    - Componenten: architectuur/componenten.md
    - Publicatie: architectuur/publicatie.md
  - "Laag 1: Begrippenmodel":
    - Kader: begrippen/kader.md
    - Relatie Informatiemodel: begrippen/relatie_informatiemodel.md
    - Structuur: begrippen/structuur.md
    - Beheer en governance: begrippen/beheer.md
  - "Laag 2: Informatiemodel": 
    - Model op hoofdlijnen: informatiemodel.md
    - Detailmodel RSGB: "definities/definitie_Model Kern RSGB.md"
    - Detailmodel RGBZ: "definities/definitie_Model Kern RGBZ.md"
    - Detailmodel BAG: "definities/definitie_Model BAG.md"
    - Detailmodel Generiek: "definities/definitie_Model Generiek.md"
  - "Laag 3: Ontologie":
    - Skos: ontologie/skos.md
    - Kwaliteit: ontologie/kwaliteit.md
    - Publicatie: ontologie/publicatie.md
  - JSON-LD:
    - Context: jsonld/context.md
    - API-patronen: jsonld/api-patronen.md
    - Framing: jsonld/framing.md
    - Meerdere contexts: jsonld/meerdere_contexts.md
  - Bijlagen:
    - Woordenlijst: bijlagen/woordenlijst.md
    - Tooling: bijlagen/tooling.md
    - URI-namespace: bijlagen/namespace.md
