# mkdocs.yml — GBO-Semantiek documentatieconfiguratie
#
# Gebruik:
#   mkdocs serve          — lokale ontwikkelserver
#   mkdocs build          — statische site bouwen
#   mike deploy v0.1      — versie publiceren via mike
#
# Mike-integratie:
#   mike beheert gedocumenteerde versies op GitHub Pages (gh-pages branch).
#   Gebruik 'mike deploy --push --update-aliases <versie> latest' om te publiceren.
#   Zie docs/versiebeheer.md voor meer uitleg.

site_name: GBO-Semantiek
site_description: >-
  Informatiemodel Semantiek voor Gemeentelijke Basisgegevens Objecten —
  open standaard voor interoperabiliteit en datakwaliteit binnen gemeenten.
site_author: GBO-Semantiek Werkgroep
site_url: https://ictu.github.io/gbo-semantiek/

# Repository-link in de navigatie
repo_name: ICTU/gbo-semantiek
repo_url: https://github.com/ICTU/gbo-semantiek
edit_uri: edit/main/docs/

# Documentatiedirectory
docs_dir: docs
site_dir: site

# Mike-versioning: stel in zodat mike de versie-informatie correct injecteert
extra:
  version:
    provider: mike
    default: latest

# Thema: Material (conform GGM-stijl)
theme:
  name: material
  language: nl
  palette:
    - scheme: default
      primary: blue
      accent: light blue
      toggle:
        icon: material/brightness-7
        name: Schakel naar donker thema
    - scheme: slate
      primary: blue
      accent: light blue
      toggle:
        icon: material/brightness-4
        name: Schakel naar licht thema
  features:
    - navigation.sections
    - navigation.top
    - navigation.footer
    - navigation.indexes
    - search.highlight
    - search.share
    - content.action.edit
    - content.code.copy
  font:
    text: Roboto
    code: Roboto Mono
  logo: assets/icon.svg
  favicon: assets/icon.svg

# Plugins
plugins:
  - search:
      lang: nl
  - glightbox

# Custom CSS
extra_css:
  - assets/stylesheets/custom.css

# Custom JavaScript
extra_javascript:
  - https://unpkg.com/mermaid@11/dist/mermaid.min.js
  - assets/javascripts/mermaid-init.js

# Markdown-extensies
markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
      title: Op deze pagina
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_div_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - plantuml_markdown:
      format: svg
      plantuml_cmd: /opt/homebrew/bin/plantuml
      cachedir: .cache/plantuml
      classes: "uml"
      alt: "GBO PlantUML class-diagram"
      title: "GBO"

# Navigatiestructuur
# Links: alleen de hoofdsecties. Rechts: subpagina's en TOC van de huidige pagina.
# Elke sectie heeft een index.md die de subpagina's linkt.
nav:
  - Inleiding: index.md
  - Uitgangspunten:
    - Ontwerprincipes: uitgangspunten/ontwerpprincipes.md
    - Kaders en standaarden: uitgangspunten/kaders_standaarden.md
    - Bronnenprioritering: uitgangspunten/bronnenprioritering.md
    - Inspiratie: uitgangspunten/inspiratie.md
  - Architectuur:
    - Gegevensarchitectuur: architectuur/gegevensarchitectuur.md
    - Gegevenscomponenten: architectuur/gegevenscomponenten.md
    # - Gegevenstoepassing: architectuur/gegevenstoepassing.md
    # - Raamwerk: architectuur/raamwerk.md
  - "Begrippenmodel":
    - Inleiding: begrippen/inleiding.md
    # - GBO-Begrippenkader: begrippen/gbo-begrippenkader.md
    # - Kader: begrippen/kader.md
    # - Relatie Informatiemodel: begrippen/relatie_informatiemodel.md
    # - Structuur: begrippen/structuur.md
    # - Beheer en governance: begrippen/beheer.md
  - "Informatiemodel: GBO-Kernmodel":
    - Hoofdmodel: informatiemodel/gbo-kern/hoofdmodel.md
    - Deelmodel Personen: informatiemodel/gbo-kern/deelmodellen/personen.md
    - Deelmodel Bedrijven en Instellingen: informatiemodel/gbo-kern/deelmodellen/bedrijven-en-instellingen.md
    - Deelmodel Adressen en Gebouwen: informatiemodel/gbo-kern/deelmodellen/adressen-en-gebouwen.md
    - Deelmodel Onroerende Zaken: informatiemodel/gbo-kern/deelmodellen/onroerende-zaken.md
    - Deelmodel Waarde Onroerende Zaken: informatiemodel/gbo-kern/deelmodellen/waarde-onroerende-zaken.md
    - Deelmodel Belastingen: informatiemodel/gbo-kern/deelmodellen/belastingen.md
    - Deelmodel Krediet: informatiemodel/gbo-kern/deelmodellen/krediet.md
    - Deelmodel Onderwijs: informatiemodel/gbo-kern/deelmodellen/onderwijs.md
    - Deelmodel Werk en Inkomen: informatiemodel/gbo-kern/deelmodellen/werk-en-inkomen.md
    - Datatypes en codelijsten: informatiemodel/gbo-kern/datatypes-en-codelijsten.md
  - "Informatiemodel: GBO-Voorzieningenmodel":
    - Hoofdmodel: informatiemodel/gbo-voorzieningen.md
  - "Ontologie":
    - Inleiding: ontologie/inleiding.md
    # - Skos: ontologie/skos.md
    # - Kwaliteit: ontologie/kwaliteit.md
    # - Publicatie: ontologie/publicatie.md
  - Implementatie:
    - URI-strategie: implementatie/uri-strategie.md
    - Naamgeving: implementatie/naamgeving.md
    - Deployment: implementatie/deployment.md
    - Publicatie: implementatie/publicatie.md
  #- JSON-LD:
  #  - Context: json-ld/context.md
  #  - API-patronen: json-ld/api-patronen.md
  #  - Framing: json-ld/framing.md
  #  - Meerdere contexts: json-ld/meerdere-contexts.md
  - Bijlagen:
    - Woordenlijst: bijlagen/woordenlijst.md
    - Tooling: bijlagen/tooling.md
    - URI-namespace: bijlagen/uri-namespace.md
