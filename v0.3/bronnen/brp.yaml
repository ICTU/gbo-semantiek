# =============================================================================
# Bron-profiel BRP — welke onderdelen van het GBO-informatiemodel de
# Basisregistratie Personen via GBO beschikbaar stelt.
#
# Dit bestand is LinkML-data conform het schema
# ../informatiemodel/linkml/bronprofiel.yaml (klasse Bronprofiel).
# Valideren:
#   linkml-validate -s ../informatiemodel/linkml/bronprofiel.yaml \
#       -C Bronprofiel brp.yaml
# Materialiseren:
#   python3 tools/genereer_bronschema.py v0.2/bronnen/brp.yaml
#
# Supertypen en mixins (Partij, Adres, Voorkomen) worden door de
# snoei-tool automatisch meegenomen en hoeven hier niet genoemd te
# worden.
# =============================================================================
bron: BRP
titel: Basisregistratie Personen
beschrijving: >-
  Persoonsgegevens uit de BRP (GBA en RNI), inclusief de
  persoonslijst-categorieën nationaliteit, huwelijk, verblijfstitel,
  gezagsverhouding en immigratie, en het binnenlandse verblijfadres.
schemabestand: ../informatiemodel/linkml/gbo.yaml

# Query-ingangen: hiervoor genereert de pipeline GraphQL Query-velden.
ingangen:
  - IngeschrevenPersoon

# Objecttypen die deze bron beschikbaar stelt (expliciete lijst).
objecttypen:
  - NatuurlijkPersoon
  - IngeschrevenPersoon
  - Ingezetene
  - NietIngezetene
  - Nationaliteit
  - Huwelijk
  - Verblijfstitel
  - Gezagsverhouding
  - Immigratie
  - Binnenlandsadres

# Attributen die deze bron niet levert.
uitsluitingen:
  - objecttype: IngeschrevenPersoon
    attributen:
      - aNummer    # intern BRP-administratienummer, niet voor afnemers

# Afwijkende afhandeling van relaties buiten het profiel; zonder
# vermelding geldt de default "sleutel". Hier:
#   NietIngezetene.woontOp          -> sleutel (Buitenlandsadres.adresId)
#   Binnenlandsadres.wordtGevormdDoor -> sleutel
#       (Nummeraanduiding.identificatie, de BAG-koppeling)
# Ingezetene.woontOp blijft een echte relatie: Binnenlandsadres zit
# in dit profiel.
relatieAfhandeling:
  - objecttype: Ingezetene
    relatie: heeftBriefadres
    afhandeling: weglaten    # briefadres wordt via de adressen-bron ontsloten
