# =============================================================================
# GBO — Bronprofiel-schema
#
# Schema voor de bron-profielen in <versie>/bronnen/. Een bron-profiel
# beschrijft welke onderdelen van het GBO-informatiemodel één bron
# beschikbaar stelt; het is LinkML-DATA (een instantie van de klasse
# Bronprofiel hieronder), geen LinkML-schema.
#
# Valideren van een profiel:
#   linkml-validate -s bronprofiel.yaml -C Bronprofiel ../../bronnen/brp.yaml
#
# De snoei-tool (tools/genereer_bronschema.py, stap 3) leest een
# profiel, controleert dat alle genoemde objecttypen in gbo.yaml
# bestaan, neemt supertypen en mixins automatisch mee (overerving) en
# materialiseert een per-bron LinkML-schema waarop de standaard-
# generatoren draaien.
# =============================================================================
id: https://lod.gbo-semantiek.nl/informatiemodel/bronprofiel
name: gbo-bronprofiel
title: GBO bronprofiel-schema
description: >-
  Schema voor bron-profielen: welke onderdelen van het
  GBO-informatiemodel stelt één bron beschikbaar.
license: https://joinup.ec.europa.eu/collection/eupl/eupl-text-eupl-12

prefixes:
  linkml: https://w3id.org/linkml/
  gbo: https://lod.gbo-semantiek.nl/
default_prefix: gbo
default_range: string

imports:
  - linkml:types

classes:

  Bronprofiel:
    tree_root: true
    description: >-
      Beschrijft welke onderdelen van het GBO-informatiemodel één bron
      beschikbaar stelt.
    attributes:
      bron:
        identifier: true
        required: true
        description: >-
          Korte code van het bronregister, bijvoorbeeld BRP, BAG of
          BRI.
      titel:
        required: true
        description: Volledige naam van het bronregister.
      beschrijving:
        description: Toelichting op wat deze bron via GBO ontsluit.
      schemabestand:
        required: true
        description: >-
          Relatief pad (vanaf het profielbestand) naar het
          LinkML-hoofdschema van het informatiemodel.
      ingangen:
        multivalued: true
        required: true
        description: >-
          Objecttypen die als query-ingang dienen; hiervoor genereert
          de pipeline GraphQL Query-velden.
      objecttypen:
        multivalued: true
        required: true
        description: >-
          Objecttypen die deze bron beschikbaar stelt, als expliciete
          lijst. Supertypen en mixins van genoemde objecttypen worden
          door de snoei-tool automatisch meegenomen; subtypen niet.
      uitsluitingen:
        multivalued: true
        range: Uitsluiting
        inlined_as_list: true
        description: >-
          Attributen of relaties per objecttype die deze bron niet
          levert.
      relatieAfhandeling:
        multivalued: true
        range: RelatieAfhandeling
        inlined_as_list: true
        description: >-
          Afwijkende afhandeling van relaties die buiten het profiel
          wijzen. Zonder vermelding geldt de default: vervanging door
          de identificerende sleutel van het doelobject.

  Uitsluiting:
    description: >-
      Attributen of relaties van één objecttype die de bron niet
      levert.
    attributes:
      objecttype:
        required: true
        description: Naam van het objecttype in het informatiemodel.
      attributen:
        multivalued: true
        required: true
        description: >-
          Namen van de attributen of relaties die worden uitgesloten.
          Een uitsluiting geldt op het objecttype waar het attribuut is
          gedeclareerd; geërfde attributen kunnen niet per subtype
          worden uitgesloten.

  RelatieAfhandeling:
    description: >-
      Afwijkende afhandeling van één relatie die buiten het profiel
      wijst.
    attributes:
      objecttype:
        required: true
        description: Naam van het objecttype waarop de relatie staat.
      relatie:
        required: true
        description: Naam van de relatie (attribuut met objecttype-range).
      afhandeling:
        required: true
        range: AfhandelingsWijze
        description: Hoe de relatie in het bron-schema wordt afgehandeld.

enums:

  AfhandelingsWijze:
    description: >-
      Manieren waarop een relatie naar een objecttype buiten het
      profiel kan worden afgehandeld.
    permissible_values:
      sleutel:
        description: >-
          Vervang de relatie door de identificerende sleutel van het
          doelobject (default).
      weglaten:
        description: Laat de relatie geheel weg uit het profiel.
