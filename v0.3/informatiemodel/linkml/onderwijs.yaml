# =============================================================================
# GBO — Deelmodel Onderwijs
# Bron (leidend): docs/informatiemodel/gbo-kern/deelmodellen/onderwijs.md
#
# Personen in een Nederlandse onderwijssector, hun lopende en
# afgesloten onderwijsdeelnames, behaalde resultaten en, zolang DUO
# deze administreert, hun studiefinanciering en studielening.
# Inclusief de instellingen waar dit gebeurt en de wettelijke
# verzuimregistratie voor leerplichtige en kwalificatieplichtige
# leerlingen.
#
# Verwijzingen naar andere deelmodellen (NatuurlijkPersoon,
# NietNatuurlijkPersoon) worden opgelost via gbo.yaml; valideer dus
# altijd via gbo.yaml.
# =============================================================================
id: https://lod.gbo-semantiek.nl/informatiemodel/onderwijs
name: gbo-onderwijs
title: "GBO deelmodel: Onderwijs"
description: >-
  Personen in een Nederlandse onderwijssector, hun lopende en
  afgesloten onderwijsdeelnames, behaalde resultaten en, zolang DUO
  deze administreert, hun studiefinanciering en studielening.
  Inclusief de instellingen waar dit gebeurt en de wettelijke
  verzuimregistratie voor leerplichtige en kwalificatieplichtige
  leerlingen.
license: https://joinup.ec.europa.eu/collection/eupl/eupl-text-eupl-12

prefixes:
  linkml: https://w3id.org/linkml/
  gbo: https://lod.gbo-semantiek.nl/
  gbobegrip: https://begrippen.gbo-semantiek.nl/id/begrip/
  mim: https://lod.gbo-semantiek.nl/def/mim#
default_prefix: gbo
default_range: string

imports:
  - linkml:types
  - datatypes
  - hoofdmodel

classes:

  # --- Objecttypen ------------------------------------------------------------

  BeroepspraktijkvormingPeriode:
    description: >-
      Een afgebakende periode waarin een MBO-student bij een erkend
      leerbedrijf het beroepspraktijkvorming-deel van een
      MBO-opleiding doorloopt.
    exact_mappings:
      - gbobegrip:BeroepspraktijkvormingPeriode
    annotations:
      mim:herkomst: Register Onderwijsdeelnemers, cluster MBO
      mim:herkomstDefinitie: >-
        Wet educatie en beroepsonderwijs (WEB) art. 7.2.8 en
        art. 7.2.9 (beroepspraktijkvorming en BPV-overeenkomst); WEB
        art. 1.5.5 (erkenning leerbedrijf door SBB).
      mim:datumOpname: "2026-05-19"
      mim:uniekeAanduiding: periodeId binnen OpleidingDeelname
      mim:populatie: >-
        Alle BPV-perioden voor MBO-studenten met een lopende
        OpleidingDeelname in BOL of BBL.
      mim:kwaliteit: >-
        MBO-instelling levert; geldigheid van de BPV-overeenkomst
        wordt geborgd door SBB-erkenning van het leerbedrijf en door
        registratie in ROD.
    comments:
      - >-
        BeroepspraktijkvormingPeriode hangt als component aan een
        lopende MBO-OpleidingDeelname. In de beroepsopleidende
        leerweg (BOL) ligt het aandeel BPV doorgaans tussen twintig
        en zestig procent van de studielast; in de
        beroepsbegeleidende leerweg (BBL) bedraagt het ten minste
        zestig procent. Het onderscheid BOL/BBL zit op de
        moederinschrijving (OpleidingDeelname.leerweg), niet op de
        BPV-periode zelf. Erkenning van leerbedrijven verloopt via
        SBB (Samenwerkingsorganisatie Beroepsonderwijs
        Bedrijfsleven).
    unique_keys:
      periodeIdBinnenOpleidingDeelname:
        unique_key_slots: [binnen, periodeId]
        description: >-
          MIM unieke aanduiding: periodeId binnen OpleidingDeelname;
          als samengestelde sleutel gemodelleerd omdat periodeId
          alleen binnen de moederinschrijving uniek is.
    attributes:
      periodeId:
        range: Tekst
        required: true
        description: >-
          Identificatie van de BPV-periode binnen de
          moederinschrijving.
        annotations:
          mim:authentiek: Basisgegeven
          mim:materieleHistorie: false
          mim:formeleHistorie: false
          mim:herkomst: PvE ROD MBO
      begindatum:
        range: Datum
        required: true
        description: De startdatum van de BPV-periode.
        annotations:
          mim:authentiek: Basisgegeven
          mim:materieleHistorie: true
          mim:formeleHistorie: true
          mim:herkomst: PvE ROD MBO
      einddatum:
        range: Datum
        required: true
        description: De einddatum van de BPV-periode.
        annotations:
          mim:authentiek: Basisgegeven
          mim:materieleHistorie: true
          mim:formeleHistorie: true
          mim:herkomst: PvE ROD MBO
      omvangInUren:
        range: Numeriek
        description: De omvang van de BPV-periode in uren.
        annotations:
          mim:authentiek: Basisgegeven
          mim:materieleHistorie: false
          mim:formeleHistorie: false
          mim:herkomst: PvE ROD MBO
        comments:
          - >-
            Alternatief in dagen wanneer de instelling die maat
            hanteert.
          - Wiki-type Geheel; gemodelleerd als Numeriek (geheel getal).
      leerbedrijfIdentificatie:
        range: Tekst
        required: true
        description: Verwijzing naar het SBB-erkende leerbedrijf.
        annotations:
          mim:authentiek: Basisgegeven
          mim:materieleHistorie: true
          mim:formeleHistorie: true
          mim:herkomst: PvE ROD MBO
      binnen:
        range: OpleidingDeelname
        required: true
        description: >-
          Componentbinding aan de moeder-OpleidingDeelname (MBO).
        annotations:
          mim:authentiek: Basisgegeven
          mim:materieleHistorie: true
          mim:formeleHistorie: true
          mim:kardinaliteit: "1 -> 1"

  ModuleInschrijving:
    description: >-
      De inschrijving van een student voor een onderwijseenheid
      binnen een lopende opleiding-deelname in het hoger onderwijs,
      met een vastgestelde studielast in ECTS.
    exact_mappings:
      - gbobegrip:ModuleInschrijving
    annotations:
      mim:herkomst: Register Onderwijsdeelnemers, cluster HO
      mim:herkomstDefinitie: >-
        Wet op het hoger onderwijs en wetenschappelijk onderzoek
        (WHW) art. 7.3 (opleiding) en art. 7.3a (onderwijseenheden
        en studiepunten); studielast uitgedrukt in EC, conform het
        Europese ECTS-systeem.
      mim:datumOpname: "2026-05-19"
      mim:uniekeAanduiding: moduleIdentificatie binnen OpleidingDeelname
      mim:populatie: >-
        Inschrijvingen van HO-studenten voor onderwijseenheden die
        de instelling op grond van de WHW als examenonderdeel
        registreert.
      mim:kwaliteit: >-
        Aangeleverd door de HO-instelling; resultaatstatus volgt de
        instellings-administratie.
    comments:
      - >-
        ModuleInschrijving is een fijnmazige gebeurtenis binnen een
        OpleidingDeelname: één deelname kan meerdere
        moduleinschrijvingen omvatten. Eén EC komt overeen met circa
        achtentwintig studieuren. Een moduleinschrijving levert geen
        zelfstandig bewijsstuk; het cumulatief behalen van modules
        leidt tot een getuigschrift, gemodelleerd als
        OpleidingResultaat.
    unique_keys:
      moduleIdentificatieBinnenOpleidingDeelname:
        unique_key_slots: [binnen, moduleIdentificatie]
        description: >-
          MIM unieke aanduiding: moduleIdentificatie binnen
          OpleidingDeelname; als samengestelde sleutel gemodelleerd
          omdat moduleIdentificatie alleen binnen de
          moederinschrijving uniek is.
    attributes:
      moduleIdentificatie:
        range: Tekst
        required: true
        description: >-
          Identificatie van de onderwijseenheid binnen de
          instelling.
        annotations:
          mim:authentiek: Basisgegeven
          mim:materieleHistorie: false
          mim:formeleHistorie: false
          mim:herkomst: PvE ROD HO
        comments:
          - Instelling-eigen sleutel.
      ects:
        range: Decimaal
        required: true
        description: >-
          De studielast van de onderwijseenheid uitgedrukt in EC.
        annotations:
          mim:authentiek: Basisgegeven
          mim:materieleHistorie: false
          mim:formeleHistorie: false
          mim:herkomst: PvE ROD HO
      inschrijfdatum:
        range: Datum
        required: true
        description: >-
          De datum waarop de student zich voor de onderwijseenheid
          heeft ingeschreven.
        annotations:
          mim:authentiek: Basisgegeven
          mim:materieleHistorie: true
          mim:formeleHistorie: true
          mim:herkomst: PvE ROD HO
      resultaatstatus:
        range: Resultaatstatus
        description: De uitkomst van de moduledeelname.
        annotations:
          mim:authentiek: Basisgegeven
          mim:materieleHistorie: true
          mim:formeleHistorie: true
          mim:herkomst: PvE ROD HO
      cijfer:
        range: Tekst
        description: >-
          Het beoordelingsresultaat in numerieke of pass/fail-vorm.
        annotations:
          mim:authentiek: Basisgegeven
          mim:materieleHistorie: false
          mim:formeleHistorie: false
          mim:herkomst: PvE ROD HO
        comments:
          - Vorm-afhankelijk per instelling.
      binnen:
        range: OpleidingDeelname
        required: true
        description: >-
          Componentbinding aan de moeder-OpleidingDeelname (HO).
        annotations:
          mim:authentiek: Basisgegeven
          mim:materieleHistorie: true
          mim:formeleHistorie: true
          mim:kardinaliteit: "1 -> 1"

  OnderwijsInstelling:
    is_a: NietNatuurlijkPersoon
    description: >-
      Een door OCW erkende rechtspersoon of bestuurlijke entiteit
      die onderwijs aanbiedt in een of meer Nederlandse
      onderwijssectoren.
    exact_mappings:
      - gbobegrip:OnderwijsInstelling
    annotations:
      mim:herkomst: >-
        RIO (instellings-laag); Handelsregister (rechtspersoon-laag)
      mim:herkomstDefinitie: >-
        Wet op het primair onderwijs (WPO) art. 1 (basisschool); Wet
        voortgezet onderwijs 2020 (WVO 2020) art. 1.1 (school voor
        voortgezet onderwijs); Wet educatie en beroepsonderwijs
        (WEB) art. 1.1.1 (instelling); Wet op het hoger onderwijs en
        wetenschappelijk onderzoek (WHW) art. 1.2 (instelling).
      mim:datumOpname: "2026-05-19"
      mim:uniekeAanduiding: brincode of instellingscodeRIO
      mim:populatie: >-
        Alle in RIO geregistreerde Nederlandse
        onderwijsinstellingen, zowel bekostigde publieke
        instellingen als private aanbieders met erkenning.
      mim:kwaliteit: >-
        RIO is autoritatief; BRIN-codes worden door DUO uitgegeven;
        mutaties in bestuurs- of vestigingsstructuur zijn na
        publicatie in RIO bindend.
    comments:
      - >-
        Onderwijsinstelling is een NietNatuurlijkPersoon in een
        specifieke rol als bevoegd gezag. De registratie
        Instellingen en Opleidingen (RIO) kent een hiërarchie van
        onderwijsbestuur, instelling, vestiging en
        opleidingsaanbod-eenheid. Dit deelmodel bindt het
        Onderwijsinstelling-objecttype aan het instelling-niveau.
        Het bestuur-niveau correspondeert met de rechtspersoon in
        het Handelsregister; voor het instelling-niveau is BRIN de
        korte identifier en de RIO-instellingscode de uitgebreide.
      - >-
        NietNatuurlijkPersoon: zie deelmodel Bedrijven en
        instellingen.
    unique_keys:
      instellingscodeRIO:
        unique_key_slots: [instellingscodeRIO]
        description: >-
          MIM unieke aanduiding (uitgebreide vorm); ID
          (geërfd van Partij via NietNatuurlijkPersoon) blijft de
          technische identifier.
      brincode:
        unique_key_slots: [brincode]
        description: >-
          MIM unieke aanduiding (korte vorm); voor sommige sectoren
          niet uitgegeven.
    attributes:
      brincode:
        range: BRINcode
        description: >-
          De vier-tekens-code waarmee een onderwijsinstelling
          historisch wordt aangeduid.
        annotations:
          mim:authentiek: Basisgegeven
          mim:materieleHistorie: true
          mim:formeleHistorie: true
          mim:herkomst: RIO en DUO
        comments:
          - Voor sommige sectoren niet uitgegeven.
          - >-
            Wiki-type Alfanumeriek4 ontbreekt in datatypes.yaml;
            voorlopig Alfanumeriek. Validatie via Codelijst~BRIN.
      instellingscodeRIO:
        range: Identificatie
        required: true
        description: De uitgebreide instellingscode in RIO.
        annotations:
          mim:authentiek: Basisgegeven
          mim:materieleHistorie: true
          mim:formeleHistorie: true
          mim:herkomst: RIO
      naam:
        range: Tekst
        required: true
        description: De officiële benaming van de instelling.
        annotations:
          mim:authentiek: Basisgegeven
          mim:materieleHistorie: true
          mim:formeleHistorie: false
          mim:herkomst: RIO
      onderwijssector:
        range: Onderwijssector
        required: true
        multivalued: true
        description: Sector waarin de instelling actief is.
        annotations:
          mim:authentiek: Basisgegeven
          mim:materieleHistorie: false
          mim:formeleHistorie: false
          mim:herkomst: RIO
        comments:
          - Een instelling kan in meerdere sectoren actief zijn.
      heeftBestuur:
        range: NietNatuurlijkPersoon
        required: true
        description: >-
          Verwijzing naar de rechtspersoon van het schoolbestuur.
        annotations:
          mim:authentiek: Basisgegeven
          mim:materieleHistorie: true
          mim:formeleHistorie: true
          mim:kardinaliteit: "1 -> 1"
        comments:
          - Zie deelmodel Bedrijven en instellingen.
      biedtAan:
        range: Opleiding
        multivalued: true
        description: Het aanbod aan opleidingen.
        annotations:
          mim:authentiek: Basisgegeven
          mim:materieleHistorie: false
          mim:formeleHistorie: false
          mim:kardinaliteit: "1 -> 0..*"

  Opleiding:
    description: >-
      Een door een bevoegd gezag aangeboden, samenhangend geheel van
      onderwijs- en leeractiviteiten dat tot een vooraf vastgesteld
      kwalificatie- of diplomaniveau leidt.
    exact_mappings:
      - gbobegrip:Opleiding
    annotations:
      mim:herkomst: RIO; sector-codelijsten CROHO, CREBO en schoolsoort
      mim:herkomstDefinitie: >-
        WHW art. 7.3 en 7.3a (HO-opleidingen en studiepunten); WEB
        art. 7.1.3 (MBO-opleiding gekoppeld aan
        kwalificatiedossier); WPO en WVO 2020 voor PO- en VO-aanbod.
      mim:datumOpname: "2026-05-19"
      mim:uniekeAanduiding: opleidingscode binnen codestelsel
      mim:populatie: >-
        Alle opleidingen die in een Nederlandse onderwijssector door
        een erkend bevoegd gezag worden aangeboden en in RIO of de
        bijbehorende sectorlijst zijn geregistreerd.
      mim:kwaliteit: >-
        CROHO-registratie is voorwaarde voor bekostiging van
        HO-opleidingen; CREBO-registratie geldt analoog voor MBO.
        Een opleiding zonder geldige registratie geeft geen recht op
        bekostigde diploma-uitreiking.
    comments:
      - >-
        Opleiding abstraheert van de sector-eigen
        identificatiestelsels: CROHO (Centraal Register Opleidingen
        Hoger Onderwijs) voor HO, CREBO (Centraal Register
        Beroepsopleidingen) voor MBO, en schoolsoort-codes voor PO
        en VO. Het attribuut codestelsel zegt welk stelsel de
        opleidingscode volgt. Sectoroverstijgende vergelijking
        gebeurt via opleidingsniveau op de NLQF-schaal (Nederlands
        Kwalificatieraamwerk).
    unique_keys:
      opleidingscodeBinnenCodestelsel:
        unique_key_slots: [opleidingscode, codestelsel]
        description: >-
          MIM unieke aanduiding: opleidingscode binnen codestelsel;
          als samengestelde sleutel gemodelleerd omdat de
          opleidingscode alleen binnen het codestelsel uniek is.
    attributes:
      opleidingscode:
        range: Tekst
        required: true
        description: De sector-specifieke code van de opleiding.
        annotations:
          mim:authentiek: Basisgegeven
          mim:materieleHistorie: false
          mim:formeleHistorie: false
          mim:herkomst: RIO of sectorlijst
        comments:
          - >-
            Vorm en patroon zijn afhankelijk van het codestelsel.
      codestelsel:
        range: Codestelsel
        required: true
        description: >-
          Het identificatiestelsel waarvan de opleidingscode deel
          uitmaakt.
        annotations:
          mim:authentiek: Basisgegeven
          mim:materieleHistorie: false
          mim:formeleHistorie: false
          mim:herkomst: GBO-Kern
      opleidingsnaam:
        range: Tekst
        required: true
        description: De officiële benaming van de opleiding.
        annotations:
          mim:authentiek: Basisgegeven
          mim:materieleHistorie: true
          mim:formeleHistorie: false
          mim:herkomst: RIO
      opleidingsniveau:
        range: CodelijstNLQF
        description: >-
          Het kwalificatieniveau op de NLQF-schaal van een tot acht.
        annotations:
          mim:authentiek: Basisgegeven
          mim:materieleHistorie: false
          mim:formeleHistorie: false
          mim:herkomst: Afgeleide; NCP-NLQF
        comments:
          - Sectoroverstijgende vergelijking.
      onderwijssector:
        range: Onderwijssector
        required: true
        description: De sector waarin de opleiding wordt aangeboden.
        annotations:
          mim:authentiek: Basisgegeven
          mim:materieleHistorie: false
          mim:formeleHistorie: false
          mim:herkomst: RIO
      wordtAangebodenDoor:
        range: OnderwijsInstelling
        required: true
        multivalued: true
        description: De instelling waar de opleiding wordt aangeboden.
        annotations:
          mim:authentiek: Basisgegeven
          mim:materieleHistorie: false
          mim:formeleHistorie: false
          mim:kardinaliteit: "0..* -> 1..*"

  OpleidingDeelname:
    description: >-
      De inschrijving van een natuurlijk persoon voor het volgen van
      een opleiding bij een onderwijsinstelling, geldig binnen een
      afgebakende periode.
    exact_mappings:
      - gbobegrip:OpleidingDeelname
    annotations:
      mim:herkomst: Register Onderwijsdeelnemers per sector
      mim:herkomstDefinitie: >-
        Wet op het onderwijsnummer art. 1 onder b (deelnemer);
        sectorwetten WPO, WVO 2020, WEB en WHW; operationele
        invulling in het Programma van Eisen voor het Register
        Onderwijsdeelnemers per sector.
      mim:datumOpname: "2026-05-19"
      mim:uniekeAanduiding: deelnameId
      mim:populatie: >-
        Alle inschrijvingen die op grond van een sectorwet aan ROD
        moeten worden gemeld: in PO en VO ingeschreven leerlingen,
        in MBO en VAVO ingeschreven studenten, in HO ingeschreven
        studenten en, waar van toepassing, extranei.
      mim:kwaliteit: >-
        ROD-bijhouding is per sector wettelijk verplicht; de
        onderwijsinstelling levert via Edukoppeling. Tijdigheid van
        overgangs- en uitschrijfmeldingen en juistheid van
        peilmoment worden door DUO teruggekoppeld aan de instelling.
    comments:
      - >-
        OpleidingDeelname is de centrale registratie van het feit
        dat een persoon onderwijs volgt. Eén deelname dekt één
        combinatie van Persoon, Opleiding en Onderwijsinstelling
        binnen één periode. Een wijziging van leerweg of vestiging
        leidt doorgaans tot een nieuwe deelname; de exacte
        sectorregel staat in het bijbehorende PvE. Een afgeronde
        deelname leidt vaak, niet altijd, tot een
        OpleidingResultaat. Voortijdige beëindiging zonder resultaat
        heeft een redenUitschrijving uit de sector-specifieke
        codelijst.
    attributes:
      deelnameId:
        identifier: true
        range: Identificatie
        required: true
        description: Interne identificatie van de deelname.
        annotations:
          mim:authentiek: Basisgegeven
          mim:materieleHistorie: false
          mim:formeleHistorie: false
          mim:herkomst: GBO-Kern
      inschrijfdatum:
        range: Datum
        required: true
        description: De datum waarop de deelname is aangevangen.
        annotations:
          mim:authentiek: Basisgegeven
          mim:materieleHistorie: true
          mim:formeleHistorie: true
          mim:herkomst: PvE ROD per sector
      uitschrijfdatum:
        range: Datum
        description: De datum waarop de deelname is geëindigd.
        annotations:
          mim:authentiek: Basisgegeven
          mim:materieleHistorie: true
          mim:formeleHistorie: true
          mim:herkomst: PvE ROD per sector
        comments:
          - Leeg zolang de deelname loopt.
      redenUitschrijving:
        range: CodelijstRedenUitschrijving
        description: De reden waarom de deelname is geëindigd.
        annotations:
          mim:authentiek: Basisgegeven
          mim:materieleHistorie: false
          mim:formeleHistorie: false
          mim:herkomst: PvE ROD per sector
        comments:
          - Sector-specifieke codelijst.
      onderwijssoort:
        range: Onderwijssoort
        required: true
        description: Het soort onderwijs binnen de sector.
        annotations:
          mim:authentiek: Basisgegeven
          mim:materieleHistorie: false
          mim:formeleHistorie: false
          mim:herkomst: PvE ROD per sector
      leerweg:
        range: Leerweg
        description: >-
          De leerweg waarbinnen de deelname valt, voor zover de
          sector dit hanteert.
        annotations:
          mim:authentiek: Basisgegeven
          mim:materieleHistorie: false
          mim:formeleHistorie: false
          mim:herkomst: PvE ROD MBO en VO
      cohort:
        range: Numeriek
        description: Het instroomjaar waarmee de deelname is gestart.
        annotations:
          mim:authentiek: Basisgegeven
          mim:materieleHistorie: false
          mim:formeleHistorie: false
          mim:herkomst: PvE ROD MBO en HO
        comments:
          - Wiki-type Geheel; gemodelleerd als Numeriek (geheel getal).
      deelnemer:
        range: NatuurlijkPersoon
        required: true
        description: De persoon die de opleiding volgt.
        annotations:
          mim:authentiek: Basisgegeven
          mim:materieleHistorie: false
          mim:formeleHistorie: true
          mim:kardinaliteit: "1 -> 1"
        comments:
          - Zie deelmodel Personen.
      betreft:
        range: Opleiding
        required: true
        description: De opleiding waarvoor is ingeschreven.
        annotations:
          mim:authentiek: Basisgegeven
          mim:materieleHistorie: false
          mim:formeleHistorie: true
