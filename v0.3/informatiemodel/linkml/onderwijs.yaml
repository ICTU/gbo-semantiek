  OpleidingResultaat:
    description: >-
      Het door een natuurlijk persoon behaalde resultaat voor een
      opleiding of onderdeel daarvan bij een onderwijsinstelling,
      blijkend uit een diploma, certificaat, deelcertificaat of
      vergelijkbaar bewijsstuk.
    exact_mappings:
      - gbobegrip:OpleidingResultaat
    annotations:
      mim:herkomst: Register Onderwijsdeelnemers per sector
      mim:herkomstDefinitie: >-
        WHW art. 7.10a (HO-getuigschrift); WEB art. 7.4.6
        (MBO-diploma); WVO 2020 art. 2.61 (VO-eindexamen); Wet op
        het onderwijsnummer voor de meldingsplicht naar DUO.
      mim:datumOpname: "2026-05-19"
      mim:uniekeAanduiding: resultaatId
      mim:populatie: >-
        Alle resultaten die op grond van de sectorregels in ROD
        worden gemeld: diploma's, certificaten, deelcertificaten en
        in HO afsluitende getuigschriften plus tussentijdse
        propedeuse-uitkomsten.
      mim:kwaliteit: >-
        Resultaatmelding is verplicht na uitreiken. Authenticiteit
        is geborgd doordat alleen erkende instellingen mogen melden
        via Edukoppeling. Een ten onrechte verstrekt diploma kan via
        een terugkoppelmelding worden ingetrokken; de bijhouding
        registreert dat als correctie.
    comments:
      - >-
        OpleidingResultaat ontstaat na succesvolle afronding of bij
        een deelresultaat zoals een propedeuse in HO of een
        deelcertificaat in MBO. Een uitschrijving zonder resultaat
        leidt niet tot een OpleidingResultaat-record. Hetzelfde
        resultaat-record speelt twee rollen in het deelmodel: als
        afsluiting van een OpleidingDeelname via leidtTot en als
        Vooropleiding bij een volgende deelname. In het HO is
        "Getuigschrift" de wettelijke benaming voor het bachelor- of
        master-bewijsstuk; dat is een voorkomen met
        resultaatsoort = Getuigschrift.
    attributes:
      resultaatId:
        identifier: true
        range: Identificatie
        required: true
        description: Interne identificatie van het resultaat.
        annotations:
          mim:authentiek: Basisgegeven
          mim:materieleHistorie: false
          mim:formeleHistorie: false
          mim:herkomst: GBO-Kern
      behaaldatum:
        range: Datum
        required: true
        description: De datum waarop het resultaat is behaald.
        annotations:
          mim:authentiek: Basisgegeven
          mim:materieleHistorie: true
          mim:formeleHistorie: true
          mim:herkomst: PvE ROD per sector
      diplomasoort:
        range: CodelijstDiplomasoort
        description: De aanduiding van het diploma of bewijsstuk.
        annotations:
          mim:authentiek: Basisgegeven
          mim:materieleHistorie: false
          mim:formeleHistorie: false
          mim:herkomst: PvE ROD per sector
        comments:
          - Sector-specifieke codelijst.
      resultaatsoort:
        range: Resultaatsoort
        required: true
        description: Het type resultaat.
        annotations:
          mim:authentiek: Basisgegeven
          mim:materieleHistorie: false
          mim:formeleHistorie: false
          mim:herkomst: PvE ROD per sector
      graad:
        range: Tekst
        description: De academische graad bij HO-resultaten.
        annotations:
          mim:authentiek: Basisgegeven
          mim:materieleHistorie: false
          mim:formeleHistorie: false
          mim:herkomst: PvE ROD HO
        comments:
          - Bachelor, Master of Associate degree.
      specialisatie:
        range: Tekst
        description: >-
          De afstudeerrichting of track binnen de opleiding.
        annotations:
          mim:authentiek: Basisgegeven
          mim:materieleHistorie: false
          mim:formeleHistorie: false
          mim:herkomst: PvE ROD HO
      behaaldDoor:
        range: NatuurlijkPersoon
        required: true
        description: De persoon aan wie het resultaat is uitgereikt.
        annotations:
          mim:authentiek: Basisgegeven
          mim:materieleHistorie: false
          mim:formeleHistorie: true
          mim:kardinaliteit: "1 -> 1"
        comments:
          - Zie deelmodel Personen.
      voorOpleiding:
        range: Opleiding
        required: true
        description: >-
          De opleiding waarop het resultaat betrekking heeft.
