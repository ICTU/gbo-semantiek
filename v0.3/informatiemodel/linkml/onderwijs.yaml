  VerzuimMelding:
    description: >-
      Een wettelijk verplichte melding door een onderwijsinstelling
      van ongeoorloofd verzuim van een leerplichtige of
      kwalificatieplichtige leerling, of van verzuim van een
      achttienplus-deelnemer dat langer dan vier weken
      aaneengesloten duurt.
    exact_mappings:
      - gbobegrip:VerzuimMelding
    annotations:
      mim:herkomst: Register Onderwijsdeelnemers, clusters VO en MBO
      mim:herkomstDefinitie: >-
        Leerplichtwet 1969 art. 21a (meldingsplicht ongeoorloofd
        verzuim); WEB art. 8.1.7 (kwalificatieplicht en verzuim
        achttienplus); WVO 2020 art. 8.6.4.
      mim:datumOpname: "2026-05-19"
      mim:uniekeAanduiding: meldingId
      mim:populatie: >-
        Alle door scholen en MBO-instellingen aan DUO gemelde
        verzuim-incidenten die voldoen aan de wettelijke drempel.
      mim:kwaliteit: >-
        Aanlevering binnen wettelijke termijn (zeven dagen na
        constatering) bepaalt of de melding rechtsgeldig in ROD
        staat.
    comments:
      - >-
        VerzuimMelding zit niet in het PO-koppelvlak; het
        verzuimregime begint in het voortgezet onderwijs vanaf de
        leerplicht-leeftijd en loopt door tot achttien jaar via de
        kwalificatieplicht. Drie regimes: leerplicht voor leeftijd
        vijf tot zestien jaar, kwalificatieplicht voor zestien tot
        achttien jaar zonder startkwalificatie, en
        achttienplus-verzuim in MBO. DUO routeert de melding op
        grond van leeftijd en regime naar de leerplicht-ambtenaar
        van de gemeente of naar het Regionaal Meld- en
        Coördinatiepunt (RMC). Geoorloofd verzuim, zoals ziekte of
        vakantie met toestemming, valt niet onder de wettelijke
        meldingsplicht en daarmee niet onder dit objecttype.
    attributes:
      meldingId:
        identifier: true
        range: Identificatie
        required: true
        description: Identificatie van de melding.
        annotations:
          mim:authentiek: Basisgegeven
          mim:materieleHistorie: false
          mim:formeleHistorie: false
          mim:herkomst: PvE ROD VO en MBO
      begindatum:
        range: Datum
        required: true
        description: De eerste verzuim-dag.
        annotations:
          mim:authentiek: Basisgegeven
          mim:materieleHistorie: true
          mim:formeleHistorie: true
          mim:herkomst: PvE ROD VO en MBO
      einddatum:
        range: Datum
        description: De einddatum van het verzuim.
        annotations:
          mim:authentiek: Basisgegeven
          mim:materieleHistorie: true
          mim:formeleHistorie: true
          mim:herkomst: PvE ROD VO en MBO
        comments:
          - Leeg zolang het verzuim voortduurt.
      grondslag:
        range: Grondslag
        required: true
        description: Het regime waaronder de melding valt.
        annotations:
          mim:authentiek: Basisgegeven
          mim:materieleHistorie: false
          mim:formeleHistorie: false
          mim:herkomst: PvE ROD VO en MBO
      omvang:
        range: Tekst
        description: Het aantal lesuren of aaneengesloten dagen.
        annotations:
          mim:authentiek: Basisgegeven
          mim:materieleHistorie: false
          mim:formeleHistorie: false
          mim:herkomst: PvE ROD VO en MBO
        comments:
          - Eenheid hangt af van het regime.
      betreft:
        range: NatuurlijkPersoon
        required: true
        description: >-
          De persoon waarop het verzuim betrekking heeft.
        annotations:
          mim:authentiek: Basisgegeven
          mim:materieleHistorie: false
          mim:formeleHistorie: true
          mim:kardinaliteit: "1 -> 1"
        comments:
          - Zie deelmodel Personen.
      gemeldDoor:
        range: OnderwijsInstelling
        required: true
        description: De instelling die de melding heeft gedaan.
        annotations:
          mim:authentiek: Basisgegeven
          mim:materieleHistorie: false
          mim:formeleHistorie: true
          mim:kardinaliteit: "1 -> 1"

  Vooropleiding:
    is_a: OpleidingResultaat
    description: >-
      Een eerder behaald opleidingsresultaat dat bij een volgende
      onderwijsdeelname wordt aangereikt als bewijs voor de
      toelating tot of de instroompositionering in een opleiding.
    exact_mappings:
      - gbobegrip:Vooropleiding
    annotations:
      mim:herkomst: Register Onderwijsdeelnemers per sector
      mim:herkomstDefinitie: >-
        WHW art. 7.24 en volgende (toelatingseisen HO); WEB
        art. 8.2.1 (toelating MBO); WVO 2020 voor doorstroomeisen
        binnen VO.
      mim:datumOpname: "2026-05-19"
      mim:uniekeAanduiding: >-
        Combinatie van persoon, diplomasoort, behaaldatum en
        verstrekkende instelling.
      mim:populatie: >-
        Alle door instellingen geregistreerde vooropleidingen bij
        ROD-inschrijvingen, inclusief in het buitenland behaalde
        gelijkstellingen.
      mim:kwaliteit: >-
        ROD valideert de combinatie persoon-vooropleiding tegen het
        bestaande OpleidingResultaat-record waar aanwezig.
        Buitenlandse vooropleidingen worden aangereikt zonder
        ROD-tegenpaar; de instelling staat in voor de
        gelijkstelling.
    comments:
      - >-
        Vooropleiding is hetzelfde objecttype als
        OpleidingResultaat, ingezet in een tweede rol. Een
        MBO-deelname met een HAVO-diploma als vooropleiding wordt in
        ROD doorgegeven met een verwijzing naar het
        VO-OpleidingResultaat; analoog voor een HO-deelname met een
        MBO-niveau-4-diploma als instroom. Buitenlandse
        vooropleidingen worden niet door ROD geverifieerd tegen een
        binnenlands resultaat; de instelling beoordeelt de
        gelijkstelling, doorgaans op basis van een
        gelijkwaardigheidsverklaring (door DUO of Nuffic afgegeven).
    unique_keys:
      vooropleidingAanduiding:
        unique_key_slots:
          - behaaldDoor
          - diplomasoort
          - behaaldatum
          - verstrekkendeInstellingscode
        description: >-
          MIM unieke aanduiding; resultaatId (geërfd van
          OpleidingResultaat) blijft de technische identifier.
    attributes:
      behaaldatum:
        range: Datum
        required: true
        description: De datum waarop de vooropleiding is behaald.
        annotations:
          mim:authentiek: Basisgegeven
          mim:materieleHistorie: true
          mim:formeleHistorie: true
          mim:herkomst: PvE ROD per sector
        comments:
          - Geërfd van OpleidingResultaat.
      diplomasoort:
        range: CodelijstDiplomasoort
        required: true
        description: De aanduiding van het instroom-bewijs.
        annotations:
          mim:authentiek: Basisgegeven
          mim:materieleHistorie: false
          mim:formeleHistorie: false
          mim:herkomst: PvE ROD per sector
      verstrekkendeInstellingscode:
        range: Tekst
        description: >-
          De BRIN of, voor buitenlandse vooropleidingen, een
          landcode.
        annotations:
          mim:authentiek: Basisgegeven
          mim:materieleHistorie: true
          mim:formeleHistorie: true
          mim:herkomst: PvE ROD per sector
      landVerwerving:
        range: CodelijstISO3166
        description: Het land waar de vooropleiding is behaald.
        annotations:
          mim:authentiek: Basisgegeven
          mim:materieleHistorie: false
          mim:formeleHistorie: false
          mim:herkomst: PvE ROD per sector
        comments:
          - NL bij binnenlandse vooropleiding.
      isBaseerd:
        range: OpleidingResultaat
        description: >-
          De binnenlandse resultaatregistratie waarop deze
          vooropleiding teruggrijpt, voor zover aanwezig.
        annotations:
          mim:authentiek: Basisgegeven
          mim:materieleHistorie: false
          mim:formeleHistorie: true
          mim:kardinaliteit: "1 -> 0..1"
        comments:
          - >-
            Relatienaam letterlijk uit de wiki; vermoedelijk is
            "isGebaseerd" bedoeld.
      toelatingsbewijsBij:
        range: OpleidingDeelname
        required: true
        description: >-
          De volgende deelname die op grond van deze vooropleiding
          is toegestaan.
        annotations:
          mim:authentiek: Basisgegeven
          mim:materieleHistorie: false
          mim:formeleHistorie: true
          mim:kardinaliteit: "1 -> 1"

  # --- DUO-administraties zonder formele registratie --------------------------
  # Studiefinanciering en studielening worden door DUO geadministreerd
  # maar vallen niet onder een wettelijk register zoals ROD of RIO.
  # Voor beide geldt: geen publiek B2B-koppelvlak. Derden zijn
  # afhankelijk van inzage door de (oud-)student via Mijn DUO of via
  # een door de student gemachtigde dienstverlening.

  StudieFinanciering:
    description: >-
      Een door DUO aan een student toegekende tegemoetkoming in de
      kosten van levensonderhoud en studie, in de vorm van een
      basisbeurs, aanvullende beurs, studentenreisproduct of
      bestuursbeurs.
    exact_mappings:
      - gbobegrip:StudieFinanciering
    annotations:
      mim:herkomst: DUO-administratie studiefinanciering
      mim:herkomstDefinitie: >-
        Wet studiefinanciering 2000 (WSF 2000); voor onderdelen MBO
        en VO ook de Wet tegemoetkoming onderwijsbijdrage en
        schoolkosten (WTOS).
      mim:datumOpname: "2026-05-19"
      mim:uniekeAanduiding: >-
        Combinatie van persoon, beurssoort en periode.
      mim:populatie: >-
        Personen die op grond van WSF 2000 of WTOS aanspraak maken
        op tegemoetkoming, beperkt tot HBO-, WO- en (voor
        reisproduct en aanvullende toelage) MBO-studenten.
      mim:kwaliteit: >-
        DUO is autoritatief; status (toegekend, ingetrokken, omgezet
        in gift) wordt door DUO bijgehouden. Bevestiging aan derden
        alleen via gewaarmerkte burgerinzage of een door de student
        gemachtigde dienstverlening.
    comments:
      - >-
        StudieFinanciering omvat de beurscomponent en het
        reisproduct, niet de leencomponent (zie StudieLening). Een
        basisbeurs is forfaitair en voor HO-studenten; sinds het
        studiejaar 2023-2024 is deze terug na de leenstelsel-periode
        2015 tot 2023. Een aanvullende beurs is inkomensafhankelijk.
        Het studentenreisproduct is een OV-product op werkdagen of
        weekenden. Een bestuursbeurs ondersteunt bestuurlijke
        activiteiten aan een HO-instelling. Voor MBO geldt deels de
        WTOS voor jongeren tot achttien en deels de WSF 2000 boven
        achttien.
      - >-
        De MIM unieke aanduiding (combinatie van persoon, beurssoort
        en periode) is niet als unique_key uitgedrukt omdat
        "periode" geen enkelvoudig attribuut is; zie annotatie
        mim:uniekeAanduiding.
    attributes:
      beurssoort:
        range: Beurssoort
        required: true
        description: De vorm van de tegemoetkoming.
        annotations:
          mim:authentiek: Basisgegeven
          mim:materieleHistorie: false
          mim:formeleHistorie: false
          mim:herkomst: DUO
      toekenningsbedragMaand:
        range: Bedrag
        description: Het maandelijks toegekende bedrag.
        annotations:
          mim:authentiek: Basisgegeven
          mim:materieleHistorie: true
          mim:formeleHistorie: true
          mim:herkomst: DUO
        comments:
          - Niet van toepassing voor reisproduct.
      ingangsdatum:
        range: Datum
        required: true
        description: >-
          De datum waarop de tegemoetkoming is ingegaan.
        annotations:
          mim:authentiek: Basisgegeven
          mim:materieleHistorie: true
          mim:formeleHistorie: true
          mim:herkomst: DUO
      einddatum:
        range: Datum
        description: >-
          De datum waarop de tegemoetkoming is geëindigd.
        annotations:
          mim:authentiek: Basisgegeven
          mim:materieleHistorie: true
          mim:formeleHistorie: true
          mim:herkomst: DUO
      status:
        range: Tekst
        required: true
        description: Administratieve status van de toekenning.
        annotations:
          mim:authentiek: Basisgegeven
          mim:materieleHistorie: true
          mim:formeleHistorie: true
          mim:herkomst: DUO
        comments:
          - Toegekend, Ingetrokken, OmgezetInGift.
      ontvanger:
        range: NatuurlijkPersoon
        required: true
        description: >-
          De persoon aan wie de tegemoetkoming is toegekend.
        annotations:
          mim:authentiek: Basisgegeven
          mim:materieleHistorie: false
          mim:formeleHistorie: true
          mim:kardinaliteit: "1 -> 1"
        comments:
          - Zie deelmodel Personen.
      voorOpleiding:
        range: Opleiding
        required: true
        description: >-
          De opleiding waarbinnen de tegemoetkoming is toegekend.
        annotations:
          mim:authentiek: Basisgegeven
          mim:materieleHistorie: false
          mim:formeleHistorie: true
          mim:kardinaliteit: "0..1 -> 1"

  StudieLening:
    description: >-
      Het door een (oud-)student bij DUO opgebouwde renteloze of
      laagrentende leningbedrag op grond van de Wet
      studiefinanciering 2000, samen met de aflosregeling waaronder
      het bedrag moet worden terugbetaald.
    exact_mappings:
      - gbobegrip:StudieLening
    annotations:
      mim:herkomst: DUO-administratie studielening
      mim:herkomstDefinitie: >-
        WSF 2000 hoofdstuk 6 (lening en terugbetaling); aanvullende
        regelingen rond aflosregimes per leenstelsel-cohort.
      mim:datumOpname: "2026-05-19"
      mim:uniekeAanduiding: Per persoon één lening-administratie.
      mim:populatie: >-
        Alle (oud-)studenten met een uitstaande studieschuld bij
        DUO, ongeacht aflosfase.
      mim:kwaliteit: >-
        DUO is autoritatief; aflosregeling-cohort bepaalt
        aflostermijn en renteregime. Gegevenskwaliteit voor derden
        is afhankelijk van de gebruikte alternatieve route.
    comments:
      - >-
        Het aflosregime hangt af van het leenstelsel-cohort
        waaronder de lening is opgebouwd. In de oude regeling,
        geldend tot 2015-2016, geldt een aflostermijn van vijftien
        jaar. In het leenstelsel, geldend tussen 2015-2016 en
        2022-2023, geldt een aflostermijn van vijfendertig jaar met
        prestatiebeurs-elementen. In de hervormde regeling vanaf
        2023-2024 is de basisbeurs teruggekeerd en blijft de
        aflostermijn voor het leen-deel vijfendertig jaar. Een
        OV-schuld kan ontstaan wanneer een studentenreisproduct niet
        binnen de gestelde termijn in een gift wordt omgezet
        (afhankelijk van het behalen van een diploma binnen tien
        jaar).
      - >-
        Beschikbaarheid voor derden: DUO biedt geen publiek
        B2B-koppelvlak voor studielening-data. Dit is geen
        tijdelijke beperking maar een vastgestelde lijn, bevestigd
        in een Kamerbrief uit 2019 (kenmerk 2019Z18615) nadat de
        Tweede Kamer per motie verzocht de in ontwikkeling zijnde
        "Blauwe Knop", een gewaarmerkte digitale schuldverklaring,
        niet uit te rollen. DUO heeft die ontwikkeling stopgezet. De
        facto-routes waarlangs derden, bijvoorbeeld
        hypotheekverstrekkers in het kader van een woonlastentoets
        onder de Wet op het financieel toezicht art. 4:34,
        studielening-gegevens kunnen ontvangen, zijn: inzage door de
        student zelf via Mijn DUO (handmatige download van een
        gewaarmerkt overzicht), of een door de student gemachtigde
        dienstverlening die Mijn DUO uitleest. De wettelijke
        verplichting om studieschuld in de kredietbeoordeling mee te
        wegen bestaat dus zonder een verplichte bron.
    unique_keys:
      schuldenaar:
        unique_key_slots: [schuldenaar]
        description: >-
          MIM unieke aanduiding: per persoon één
          lening-administratie.
    attributes:
      openstaandSaldo:
        range: Bedrag
        required: true
        description: >-
          Het bedrag dat nog openstaat ter terugbetaling.
        annotations:
          mim:authentiek: Basisgegeven
          mim:materieleHistorie: true
          mim:formeleHistorie: true
          mim:herkomst: DUO via burgerinzage
        comments:
          - Per peildatum.
      maandelijkseAflossing:
        range: Bedrag
        description: Het maandelijkse aflosbedrag.
        annotations:
          mim:authentiek: Basisgegeven
          mim:materieleHistorie: true
          mim:formeleHistorie: true
          mim:herkomst: DUO via burgerinzage
        comments:
          - Pas relevant na aanvang aflosfase.
      aflostermijnTotaalMaanden:
        range: Numeriek
        required: true
        description: De volledige aflostermijn in maanden.
        annotations:
          mim:authentiek: Basisgegeven
          mim:materieleHistorie: false
          mim:formeleHistorie: false
          mim:herkomst: Afgeleid uit leenstelsel-cohort
        comments:
          - >-
            180 voor de oude regeling, 420 voor het leenstelsel en
            de hervormde regeling.
          - Wiki-type Geheel; gemodelleerd als Numeriek (geheel getal).
      aflostermijnRestantMaanden:
        range: Numeriek
        description: De resterende aflostermijn in maanden.
        annotations:
          mim:authentiek: Basisgegeven
          mim:materieleHistorie: true
          mim:formeleHistorie: true
          mim:herkomst: DUO via burgerinzage
        comments:
          - Pas relevant na aanvang aflosfase.
          - Wiki-type Geheel; gemodelleerd als Numeriek (geheel getal).
      leenstelselCohort:
        range: LeenstelselCohort
        required: true
        description: >-
          Het regime waaronder de lening is opgebouwd.
        annotations:
          mim:authentiek: Basisgegeven
          mim:materieleHistorie: false
          mim:formeleHistorie: false
          mim:herkomst: DUO
      renteregime:
        range: Tekst
        description: >-
          Het renteregime dat op de lening van toepassing is.
        annotations:
          mim:authentiek: Basisgegeven
          mim:materieleHistorie: false
          mim:formeleHistorie: false
          mim:herkomst: DUO
        comments:
          - Vast of variabel, cohort-afhankelijk.
      schuldenaar:
        range: NatuurlijkPersoon
        required: true
        description: >-
          De (oud-)student aan wie de lening is toegekend.
        annotations:
          mim:authentiek: Basisgegeven
          mim:materieleHistorie: false
          mim:formeleHistorie: true
          mim:kardinaliteit: "1 -> 1"
        comments:
          - Zie deelmodel Personen.

enums:

  Beurssoort:
    description: >-
      Type tegemoetkoming binnen de Wet studiefinanciering 2000 en
      de Wet tegemoetkoming onderwijsbijdrage en schoolkosten.
    exact_mappings:
      - gbobegrip:Beurssoort
    annotations:
      mim:herkomst: WSF 2000 en WTOS
      mim:herkomstDefinitie: >-
        WSF 2000 hoofdstuk 3 (beurzen) en art. 3.7
        (studentenreisproduct); WTOS voor de MBO-toelage.
      mim:datumOpname: "2026-05-19"
    comments:
      - >-
        De keuzelijst onderscheidt de hoofdvormen van beurs en
        reisproduct. De leencomponent is geen waarde in deze lijst;
        die wordt op het zelfstandige objecttype StudieLening
        bijgehouden.
    permissible_values:
      Basisbeurs:
        description: Forfaitaire maandbeurs voor HO-studenten.
        comments:
          - Sinds studiejaar 2023-2024 weer ingevoerd.
      AanvullendeBeurs:
        description: Inkomensafhankelijke maandbeurs.
        comments:
          - Hoogte afhankelijk van ouderlijk inkomen.
      Studentenreisproduct:
        description: OV-product voor werkdagen of weekenden.
        comments:
          - >-
            Niet uitgedrukt als maandbedrag in
            toekenningsbedragMaand.
      Bestuursbeurs:
        description: >-
          Tegemoetkoming voor bestuurlijke activiteiten aan een
          HO-instelling.

  Codestelsel:
    description: >-
      Identificatiestelsel waarvan een opleidingscode deel uitmaakt.
    exact_mappings:
      - gbobegrip:Codestelsel
    annotations:
      mim:herkomst: GBO-Kern
      mim:herkomstDefinitie: >-
        GBO-Kern, op basis van de sectorpraktijk in RIO en de PvE
        ROD per sector.
      mim:datumOpname: "2026-05-19"
    comments:
      - >-
        Het stelsel bepaalt vorm en betekenis van de opleidingscode.
        CROHO geldt voor het hoger onderwijs, CREBO voor het
        middelbaar beroepsonderwijs; voor PO en VO is er geen unieke
        nationale opleidingscode, daar werkt het deelmodel met een
        schoolsoort-code.
    permissible_values:
      CROHO:
        description: Centraal Register Opleidingen Hoger Onderwijs.
        comments:
          - Voor HO.
      CREBO:
        description: Centraal Register Beroepsopleidingen.
        comments:
          - Voor MBO en VAVO.
      SchoolsoortPO:
        description: Sectorlijst voor primair onderwijs.
        comments:
          - Geen unieke opleidingscode op landelijk niveau.
      SchoolsoortVO:
        description: Sectorlijst voor voortgezet onderwijs.
        comments:
          - VMBO met leerweg, HAVO, VWO.

  Grondslag:
    description: >-
      Het regime op grond waarvan een VerzuimMelding moet worden
      gedaan.
    exact_mappings:
      - gbobegrip:GrondslagVerzuim
    annotations:
      mim:herkomst: Leerplichtwet 1969; WEB
      mim:herkomstDefinitie: >-
        Leerplichtwet 1969 (leerplicht en kwalificatieplicht); WEB
        art. 8.1.7 (verzuim achttienplus).
      mim:datumOpname: "2026-05-19"
    comments:
      - >-
        Een melding valt onder precies één regime. Het regime
        bepaalt naar welke partij DUO de melding routeert (gemeente
        voor leerplicht, RMC voor kwalificatieplicht en
        achttienplus).
    permissible_values:
      Leerplicht:
        description: Verzuim van een leerplichtige leerling.
        comments:
          - >-
            Vijf tot zestien jaar; melddrempel zestien lesuren in
            vier weken.
      Kwalificatieplicht:
        description: Verzuim van een kwalificatieplichtige leerling.
        comments:
          - Zestien tot achttien jaar zonder startkwalificatie.
      Achttienplus:
        description: >-
          Verzuim van een MBO-deelnemer van achttien jaar of ouder.
        comments:
          - Melddrempel langer dan vier weken aaneengesloten.

  LeenstelselCohort:
    description: >-
      Het studiefinancieringsregime waaronder een studielening is
      opgebouwd.
    exact_mappings:
      - gbobegrip:LeenstelselCohort
    annotations:
      mim:herkomst: WSF 2000
      mim:herkomstDefinitie: >-
        WSF 2000 met de aanpassingen van het leenstelsel (Wet
        studievoorschot hoger onderwijs, 2015) en van de hervorming
        basisbeurs (Wet hervorming studiefinanciering, 2023).
      mim:datumOpname: "2026-05-19"
    comments:
      - >-
        Het cohort bepaalt aflostermijn en regelingen rond
        prestatiebeurs-omzetting. Een student die zowel in een oud
        als in een nieuw regime heeft geleend kan over meer dan één
        cohort beschikken in zijn lening-administratie; in dit
        deelmodel geldt per studielening het hoofdcohort, met de
        overige cohorten als toelichting bij DUO zelf.
    permissible_values:
      OudeRegeling:
        description: >-
          Studiefinanciering uit de periode tot 2015-2016.
        comments:
          - Aflostermijn vijftien jaar.
      Leenstelsel:
        description: >-
          Studiefinanciering uit de periode 2015-2016 tot 2022-2023.
        comments:
          - >-
            Aflostermijn vijfendertig jaar;
            prestatiebeurs-elementen.
      Hervormd:
        description: Studiefinanciering vanaf 2023-2024.
        comments:
          - >-
            Basisbeurs terug; aflostermijn vijfendertig jaar voor
            leen-deel.

  Leerweg:
    description: >-
      De manier waarop een onderwijsdeelname is ingericht, voor
      zover de sectorregels die onderscheiden.
    exact_mappings:
      - gbobegrip:Leerweg
    annotations:
      mim:herkomst: WEB; WVO 2020
      mim:herkomstDefinitie: >-
        WEB voor het MBO (BOL en BBL); WVO 2020 voor de
        VMBO-leerwegen.
      mim:datumOpname: "2026-05-19"
    comments:
      - >-
        Leerweg is alleen relevant in het MBO en in VMBO-deelnames;
        voor andere sectoren blijft het attribuut leeg.
    permissible_values:
      BOL:
        description: Beroepsopleidende leerweg in het MBO.
        comments:
          - >-
            Onderwijs op school met BPV-aandeel doorgaans twintig
            tot zestig procent.
      BBL:
        description: Beroepsbegeleidende leerweg in het MBO.
        comments:
          - >-
            Werken bij een leerbedrijf met schoolbegeleiding;
            BPV-aandeel ten minste zestig procent.
      BB:
        description: Basisberoepsgerichte leerweg VMBO.
      KB:
        description: Kaderberoepsgerichte leerweg VMBO.
      GL:
        description: Gemengde leerweg VMBO.
      TL:
        description: Theoretische leerweg VMBO.

  Onderwijssector:
    description: >-
      De onderwijssector in het Nederlandse stelsel waaronder een
      opleiding of instelling valt.
    exact_mappings:
      - gbobegrip:Onderwijssector
    annotations:
      mim:herkomst: Sectorwetten WPO, WVO 2020, WEB, WHW
      mim:herkomstDefinitie: >-
        Wet op het onderwijsnummer; sectorwetten WPO, WVO 2020, WEB
        en WHW.
      mim:datumOpname: "2026-05-19"
    comments:
      - >-
        Een instelling kan in meerdere sectoren actief zijn (een ROC
        bedient typisch MBO en VAVO; een AOC ook VO). Een opleiding
        hoort altijd tot precies één sector.
    permissible_values:
      PO:
        description: Primair onderwijs.
        comments:
          - WPO.
      VO:
        description: Voortgezet onderwijs.
        comments:
          - WVO 2020.
      VAVO:
        description: Voortgezet algemeen volwassenenonderwijs.
        comments:
          - Onder de WEB belegd.
      MBO:
        description: Middelbaar beroepsonderwijs.
        comments:
          - WEB.
      HBO:
        description: Hoger beroepsonderwijs.
        comments:
          - WHW.
      WO:
        description: Wetenschappelijk onderwijs.
        comments:
          - WHW.

  Onderwijssoort:
    description: Het soort onderwijs binnen een onderwijssector.
    exact_mappings:
      - gbobegrip:Onderwijssoort
    annotations:
      mim:herkomst: PvE ROD per sector
      mim:herkomstDefinitie: >-
        Sector-specifieke aanduiding in PvE ROD per sector.
      mim:datumOpname: "2026-05-19"
    comments:
      - >-
        Onderwijssoort verfijnt de sector waar de sectorregels dat
        vragen: BOL of BBL in het MBO, voltijd-deeltijd-duaal in het
        HO, schoolsoort-aanduidingen in PO en VO.
    permissible_values:
      BOL:
        description: Beroepsopleidende leerweg MBO.
        comments:
          - >-
            Idem als waarde in Leerweg; in MBO worden onderwijssoort
            en leerweg samen gehanteerd.
      BBL:
        description: Beroepsbegeleidende leerweg MBO.
      Voltijd:
        description: Voltijds HO-onderwijs.
      Deeltijd:
        description: Deeltijds HO-onderwijs.
      Duaal:
        description: >-
          Duaal HO-onderwijs (combinatie werken en studeren).
      Basisonderwijs:
        description: Regulier primair onderwijs.
        comments:
          - WPO.
      SpeciaalBasisonderwijs:
        description: >-
          Primair onderwijs voor leerlingen met extra
          ondersteuningsbehoefte.
        comments:
          - WPO.
      VMBO:
        description: Voortgezet onderwijs op het VMBO-niveau.
        comments:
          - Met leerweg-attribuut voor de verfijning.
      HAVO:
        description: Voortgezet onderwijs op het HAVO-niveau.
      VWO:
        description: Voortgezet onderwijs op het VWO-niveau.
        comments:
          - Atheneum of gymnasium.

  Resultaatsoort:
    description: >-
      Het type onderwijsresultaat dat in ROD wordt geregistreerd.
    exact_mappings:
      - gbobegrip:Resultaatsoort
    annotations:
      mim:herkomst: WHW; WEB; WVO 2020
      mim:herkomstDefinitie: >-
        WHW art. 7.10a (HO-getuigschrift); WEB art. 7.4.6
        (MBO-diploma en deelcertificaat); WVO 2020 art. 2.61
        (VO-diploma).
      mim:datumOpname: "2026-05-19"
    comments:
      - >-
        Resultaatsoort onderscheidt het zelfstandig bewijsstuk
        (diploma, getuigschrift) van een tussenresultaat
        (certificaat, deelcertificaat, propedeuse).
    permissible_values:
      Diploma:
        description: Afsluitend bewijsstuk in PO, VO en MBO.
      Getuigschrift:
        description: >-
          Afsluitend bewijsstuk in HO (bachelor, master, associate
          degree).
        comments:
          - WHW-terminologie.
      Certificaat:
        description: Tussenliggend bewijsstuk in MBO.
        comments:
          - Onderdeel van een diploma-uitkering.
      Deelcertificaat:
        description: >-
          Bewijsstuk voor een afgerond deel van een MBO-opleiding.
      Propedeuse:
        description: Tussentijds resultaat in HO.
        comments:
          - >-
            Markeert succesvolle afronding van het propedeutisch
            jaar.

  Resultaatstatus:
    description: >-
      Uitkomststatus van een moduledeelname in het hoger onderwijs.
    exact_mappings:
      - gbobegrip:Resultaatstatus
    annotations:
      mim:herkomst: PvE ROD HO
      mim:herkomstDefinitie: >-
        PvE ROD HO; uitexaminerings-praktijk per HO-instelling.
      mim:datumOpname: "2026-05-19"
    comments:
      - >-
        De status zegt of de student de onderwijseenheid heeft
        afgerond. Een numeriek of pass/fail-cijfer staat in
        ModuleInschrijving.cijfer; de status hier dient als
        koppelbare samenvatting.
    permissible_values:
      Behaald:
        description: Module met succes afgerond.
      NietBehaald:
        description: Module niet succesvol afgerond.
      Vrijstelling:
        description: >-
          Module vrijgesteld op grond van eerdere prestaties.

types:

  # --- «Codelijst»-typen: deelmodel-specifiek ---------------------------------
  # De sector-codelijsten worden beheerd door DUO (RIO en de PvE ROD
  # per sector); NLQF door NCP-NLQF.

  CodelijstCROHO:
    typeof: string
    aliases: ["Codelijst~CROHO"]
    description: >-
      Opleidingscode conform het CROHO Opleidingsaanbod HO (Centraal
      Register Opleidingen Hoger Onderwijs), beheerd door DUO en
      RIO; gebruikt voor Opleiding.opleidingscode voor HO.
      Mutatieritme: per studiejaar.
    see_also:
      - https://www.rio-onderwijs.nl/
    annotations:
      mim:stereotype: Codelijst

  CodelijstCREBO:
    typeof: string
    aliases: ["Codelijst~CREBO"]
    description: >-
      Opleidingscode conform CREBO Beroepsopleidingen (Centraal
      Register Beroepsopleidingen), beheerd door DUO en RIO;
      gebruikt voor Opleiding.opleidingscode voor MBO.
      Mutatieritme: per studiejaar.
    see_also:
      - https://www.rio-onderwijs.nl/
    annotations:
      mim:stereotype: Codelijst

  CodelijstNLQF:
    typeof: string
    aliases: ["Codelijst~NLQF"]
    description: >-
      NLQF Kwalificatieniveaus, beheerd door NCP-NLQF; gebruikt voor
      Opleiding.opleidingsniveau. Mutatieritme: sporadisch.
    see_also:
      - https://www.nlqf.nl/
    annotations:
      mim:stereotype: Codelijst

  CodelijstBRIN:
    typeof: string
    aliases: ["Codelijst~BRIN"]
    description: >-
      BRIN Onderwijsinstellingen, beheerd door DUO; gebruikt als
      validatie van OnderwijsInstelling.brincode. Mutatieritme:
      continu (bij elke nieuwe instelling).
    see_also:
      - https://duo.nl/
    annotations:
      mim:stereotype: Codelijst

  CodelijstDiplomasoort:
    typeof: string
    aliases: ["Codelijst~Diplomasoort"]
    description: >-
      Diplomasoort per sector, beheerd door DUO via PvE ROD per
      sector; gebruikt voor OpleidingResultaat.diplomasoort en
      Vooropleiding.diplomasoort. Mutatieritme: sporadisch, per
      sectorwet-aanpassing.
    see_also:
      - https://duo.nl/
    annotations:
      mim:stereotype: Codelijst

  CodelijstRedenUitschrijving:
    typeof: string
    aliases: ["Codelijst~RedenUitschrijving"]
    description: >-
      RedenUitschrijving per sector, beheerd door DUO via PvE ROD
      per sector; gebruikt voor
      OpleidingDeelname.redenUitschrijving. Mutatieritme:
      sporadisch.
    see_also:
      - https://duo.nl/
    annotations:
      mim:stereotype: Codelijst

  CodelijstVBT:
    typeof: string
    aliases: ["Codelijst~VBT"]
    description: >-
      Verblijfstitelcode (VBT) MBO, beheerd door DUO via PvE ROD
      MBO; gebruikt voor het bekostigingsrecht achttienplus in MBO
      (niet als hoofd-attribuut in dit deelmodel). Mutatieritme: per
      IND-beleidswijziging.
    see_also:
      - https://duo.nl/
    annotations:
      mim:stereotype: Codelijst
