# =============================================================================
# GBO — Deelmodel Belastingen
# Bron (leidend): docs/informatiemodel/gbo-kern/deelmodellen/belastingen.md
#
# Belastingaangiften, vermogen, aftrekposten en toeslagen op grond van
# de Nederlandse fiscale wetgeving, plus de loonaangifteketen die de
# input vormt voor het authentieke inkomen van de Belastingdienst.
#
# Verwijzingen naar andere deelmodellen (NatuurlijkPersoon, Onderneming,
# KadastraalOnroerendeZaak, InkomensOndersteuning) worden opgelost via
# gbo.yaml; valideer dus altijd via gbo.yaml.
#
# Aandachtspunten bij deze conversie:
# - De wiki bevat geen relatietabellen; de relatiesoorten komen uit het
#   PlantUML-diagram van de pagina en dragen daarom alleen
#   mim:kardinaliteit (en mim:relatienaam waar hernoemd).
# - Het wiki-type "Geheel" bestaat niet in datatypes.yaml; hier is
#   overal Numeriek (geheel getal) gebruikt.
# - Het MIM-veld "Notation" uit de wiki-tabellen is vastgelegd als
#   annotatie skos:notation.
# - Alle deelmodel-specifieke codelijsten van deze pagina zijn
#   inline-enums; dit bestand definieert daarom geen «Codelijst»-typen.
#   De enige externe codelijst (Codelijst~ISO3166) is stelselbreed en
#   staat in datatypes.yaml.
# =============================================================================
id: https://lod.gbo-semantiek.nl/informatiemodel/belastingen
name: gbo-belastingen
title: "GBO deelmodel: Belastingen"
description: >-
  Belastingaangiften, vermogen, aftrekposten en toeslagen die op grond
  van de Nederlandse fiscale wetgeving worden vastgelegd, plus de
  loonaangifteketen die de input vormt voor het authentieke inkomen
  van de Belastingdienst. De Belastingdienst is wettelijk eigenaar van
  de definities; operationeel verloopt de loonketen via UWV en het
  Stelsel van Gemeentelijke Registratie, maar inhoudelijk hoort de
  keten in dit deelmodel.
license: https://joinup.ec.europa.eu/collection/eupl/eupl-text-eupl-12

prefixes:
  linkml: https://w3id.org/linkml/
  gbo: https://lod.gbo-semantiek.nl/
  gbobegrip: https://begrippen.gbo-semantiek.nl/id/begrip/
  mim: https://lod.gbo-semantiek.nl/def/mim#
  skos: http://www.w3.org/2004/02/skos/core#
default_prefix: gbo
default_range: string

imports:
  - linkml:types
  - datatypes
  - hoofdmodel

classes:

  # --- Aangiften --------------------------------------------------------------

  BelastingAangifte:
    abstract: true
    description: >-
      Een door of namens een belastingplichtige aan de Belastingdienst
      ingediende opgave waarmee de grondslag voor een specifieke
      belastingsoort en periode wordt vastgesteld.
    exact_mappings:
      - gbobegrip:BelastingAangifte
    annotations:
      mim:herkomst: AWR; SBR-NT NT20
      mim:herkomstDefinitie: >-
        Algemene wet inzake rijksbelastingen art. 6 tot en met 9;
        SBR-NT NT20.
      mim:datumOpname: "2026-05-19"
      mim:populatie: >-
        Alle door of namens belastingplichtigen ingediende aangiften
        voor een specifieke belastingsoort en periode.
    comments:
      - >-
        Dit is de algemene categorie die alle aangifteconcepten
        groepeert. De jaargang-gebonden variant is
        BelastingjaarAangifte; aangiften zonder vaste jaargang (zoals
        BTW) zijn voor toekomstige uitbreiding.
    attributes:
      aangifteIdentificatie:
        range: Tekst
        required: true
        description: Identificatie van de aangifte.
        annotations:
          mim:herkomst: AWR
      indieningsdatum:
        range: Datum
        description: Datum van feitelijke indiening.
        annotations:
          mim:herkomst: AWR art. 9
      status:
        range: Tekst
        required: true
        description: Bijvoorbeeld Ingediend, Aangeslagen, Bezwaar lopend.
        annotations:
          mim:herkomst: AWR

  BelastingjaarAangifte:
    is_a: BelastingAangifte
    abstract: true
    description: >-
      Een belastingaangifte die op een specifiek belastingjaar
      betrekking heeft en die de grondslag voor de aanslag over dat
      jaar vaststelt.
    exact_mappings:
      - gbobegrip:BelastingjaarAangifte
    annotations:
      mim:herkomst: SBR-NT NT20
      mim:herkomstDefinitie: >-
        AWR art. 9 jo. de materiele belastingwetten; SBR-NT NT20
        entrypoints per belastingsoort en jaar.
      mim:datumOpname: "2026-05-19"
      mim:populatie: >-
        Alle belastingaangiften die op een specifiek belastingjaar
        betrekking hebben, ongeacht de belastingsoort (IH, Schenk,
        Erf).
    comments:
      - >-
        Drie concrete varianten zijn opgenomen: AangifteIH (Wet IB),
        AangifteSchenk en AangifteErf (Successiewet 1956).
        Vennootschapsbelasting valt onder de bredere SBR-NT NT20 maar
        is voor de eerste batch buiten scope.
    attributes:
      belastingjaar:
        range: Numeriek
        required: true
        description: Het jaar waarop de aangifte betrekking heeft.
        annotations:
          mim:herkomst: SBR-NT
      belastingsoort:
        range: Tekst
        required: true
        description: IH, Schenk, Erf.
        annotations:
          mim:herkomst: SBR-NT
      ingangsdatumAangifte:
        range: Datum
        description: Begin van de aangifteperiode.
        annotations:
          mim:herkomst: AWR
      einddatumAangifte:
        range: Datum
        description: Einde van de aangifteperiode.
        annotations:
          mim:herkomst: AWR
      ingediendDoor:
        range: NatuurlijkPersoon
        required: true
        description: >-
          De natuurlijk persoon door of namens wie de aangifte is
          ingediend.
        annotations:
          mim:kardinaliteit: "0..* -> 1"
        comments:
          - Zie deelmodel Personen.

  AangifteIH:
    is_a: BelastingjaarAangifte
    description: >-
      De jaaraangifte inkomstenbelasting van een natuurlijk persoon
      waarin het verzamelinkomen over een belastingjaar wordt
      opgegeven, opgebouwd uit Box 1 (werk en woning), Box 2
      (aanmerkelijk belang) en Box 3 (sparen en beleggen).
    exact_mappings:
      - gbobegrip:AangifteIH
    annotations:
      skos:notation: IH
      mim:herkomst: SBR-NT NT20
      mim:herkomstDefinitie: >-
        Wet IB 2001; SBR-NT NT20 entrypoint Aangifte
        inkomstenbelasting 2025.
      mim:datumOpname: "2026-05-19"
      mim:populatie: >-
        Alle door of namens een natuurlijk persoon ingediende
        jaaraangiften inkomstenbelasting (Box 1, Box 2 en Box 3).
    comments:
      - >-
        Drie-boxenstelsel uit Wet IB 2001. De vooringevulde aangifte
        trekt veel data uit de loonaangifteketen en uit
        renseigneringen door derden. De definitieve aanslag levert het
        authentieke inkomen voor de Basisregistratie Inkomen.
    attributes:
      verzamelinkomen:
        range: Bedrag
        description: Som van Box 1, Box 2 en Box 3, na aftrek.
        annotations:
          mim:herkomst: Wet IB art. 2.18
      box1Inkomen:
        range: Bedrag
        description: Inkomen uit werk en woning.
        annotations:
          mim:herkomst: Wet IB hoofdstuk 3
      box2Inkomen:
        range: Bedrag
        description: Inkomen uit aanmerkelijk belang.
        annotations:
          mim:herkomst: Wet IB hoofdstuk 4
      box3Inkomen:
        range: Bedrag
        description: Inkomen uit sparen en beleggen.
        annotations:
          mim:herkomst: Wet IB hoofdstuk 5
      boxCategorie:
        range: BoxCategorie
        multivalued: true
        description: Toepasselijke boxen.
        annotations:
          mim:herkomst: Wet IB

  AangifteSchenk:
    is_a: BelastingjaarAangifte
    description: >-
      De aangifte schenkbelasting waarin een schenking met haar
      fiscale waarde, betrokken personen, vrijstellingen en eventuele
      schenking-op-papier-constructie wordt opgegeven.
    exact_mappings:
      - gbobegrip:AangifteSchenk
    annotations:
      skos:notation: Schenk
      mim:herkomst: SBR-NT NT20
      mim:herkomstDefinitie: Successiewet 1956; SBR-NT NT20 1e extensie.
      mim:datumOpname: "2026-05-19"
      mim:populatie: >-
        Alle ingediende aangiften schenkbelasting per schenking,
        inclusief schenking-op-papier-constructies.
    comments:
      - >-
        Schenking op papier (waarbij de schenker het bedrag schuldig
        blijft aan de begiftigde) ontstaat doorgaans uit estate
        planning. Aan de schenker-zijde ontstaat een formele schuld in
        Box 3; aan de begiftigde-zijde een vordering.
    attributes:
      schenkingsdatum:
        range: Datum
        required: true
        description: Datum van de schenking.
        annotations:
          mim:herkomst: Successiewet 1956
      schenkingsbedrag:
        range: Bedrag
        required: true
        description: Fiscale waarde.
        annotations:
          mim:herkomst: Successiewet 1956
      schenkingOpPapier:
        range: Indicatie
        description: Schuldig-gebleven schenking.
        annotations:
          mim:herkomst: Successiewet 1956
      vrijstellingToegepast:
        range: Bedrag
        description: Toegepaste vrijstelling.
        annotations:
          mim:herkomst: Successiewet 1956

  AangifteErf:
    is_a: BelastingjaarAangifte
    description: >-
      De aangifte erfbelasting waarin de nalatenschap van een
      overledene en de verdeling daarvan over de erfgenamen wordt
      opgegeven.
    exact_mappings:
      - gbobegrip:AangifteErf
    annotations:
      skos:notation: Erf
      mim:herkomst: SBR-NT NT20
      mim:herkomstDefinitie: Successiewet 1956; SBR-NT NT20 1e extensie.
      mim:datumOpname: "2026-05-19"
      mim:populatie: >-
        Alle ingediende aangiften erfbelasting per nalatenschap, met
        de verdeling van die nalatenschap over de erfgenamen.
    comments:
      - >-
        Aangifte per nalatenschap; een aangifte beschrijft de
        verdeling over meerdere erfgenamen plus de toepasselijke
        vrijstellingen.
    attributes:
      overlijdensdatum:
        range: Datum
        required: true
        description: Datum van overlijden.
        annotations:
          mim:herkomst: Successiewet 1956
      omvangNalatenschap:
        range: Bedrag
        required: true
        description: Fiscale waarde van de nalatenschap.
        annotations:
          mim:herkomst: Successiewet 1956
      aantalErfgenamen:
        range: Numeriek
        required: true
        description: Aantal erfgenamen.
        annotations:
          mim:herkomst: Successiewet 1956

  # --- Fiscale feiten: Box 3-vermogen en aftrekposten -------------------------

  FiscaalFeit:
    abstract: true
    description: >-
      Een fiscaal relevant gegeven over een belastingplichtige dat in
      een specifiek belastingjaar als component in een
      belastingaangifte verschijnt, zoals een vermogensbestanddeel,
      een aftrekpost of een inkomensbestanddeel.
    exact_mappings:
      - gbobegrip:FiscaalFeit
    annotations:
      mim:herkomst: SBR-NT NT20
      mim:herkomstDefinitie: >-
        SBR-NT NT20; Wet IB 2001 en Successiewet 1956 voor de
        inhoudelijke grondslag.
      mim:datumOpname: "2026-05-19"
      mim:populatie: >-
        Alle fiscaal relevante componenten die in een belastingjaar
        als onderdeel van een belastingaangifte voorkomen:
        vermogensbestanddelen, aftrekposten en vergelijkbare
        inkomensbestanddelen.
    comments:
      - >-
        Twee concrete families: VermogensBestanddeel (Box 3, peildatum
        1 januari) en Aftrekpost (Box 1, gedurende belastingjaar).
    attributes:
      peildatum:
        range: Datum
        description: Voor Box-3-bestanddelen 1 januari.
        annotations:
          mim:herkomst: Wet IB art. 5.2
      belastingjaar:
        range: Numeriek
        required: true
        description: Het belastingjaar van toepassing.
        annotations:
          mim:herkomst: Wet IB
      categorie:
        range: Tekst
        required: true
        description: Categorie-aanduiding per concreet subtype.
        annotations:
          mim:herkomst: SBR-NT

  VermogensBestanddeel:
    is_a: FiscaalFeit
    abstract: true
    description: >-
      Een bezitting of schuld die op de peildatum 1 januari onder
      Box 3 van de inkomstenbelasting valt en als zelfstandige post in
      de aangifte wordt opgevoerd.
    exact_mappings:
      - gbobegrip:VermogensBestanddeel
    annotations:
      mim:herkomst: SBR-NT NT20
      mim:herkomstDefinitie: Wet IB 2001 hoofdstuk 5; SBR-NT NT20.
      mim:datumOpname: "2026-05-19"
      mim:populatie: >-
        Alle bezittingen en schulden die op peildatum 1 januari onder
        Box 3 vallen en als zelfstandige post in een IH-aangifte
        worden opgevoerd.
    comments:
      - >-
        Abstract. Vijf concrete categorieen: bank- of spaartegoed,
        belegging, cryptovaluta, onroerende zaak overig bezit en
        schuld. Per categorie gelden eigen waarderings-regels.
    attributes:
      waardePeildatum:
        range: Bedrag
        required: true
        description: Waarde op peildatum 1 januari.
        annotations:
          mim:herkomst: Wet IB art. 5.2
      categorie:
        range: VermogensBestanddeelCategorie
        required: true
        description: Categorie-aanduiding.
        annotations:
          mim:herkomst: SBR-NT
        comments:
          - >-
            Verbijzondert FiscaalFeit.categorie (Tekst) naar een
            enum-range, conform de wiki.
      houderVan:
        range: NatuurlijkPersoon
        required: true
        description: >-
          De natuurlijk persoon die houder is van het
          vermogensbestanddeel.
        annotations:
          mim:kardinaliteit: "0..* -> 1"
        comments:
          - Zie deelmodel Personen.

  BankSpaartegoed:
    is_a: VermogensBestanddeel
    description: >-
      Een bank- of spaartegoed dat een natuurlijk persoon op de
      peildatum 1 januari aanhoudt bij een Nederlandse of buitenlandse
      financiele instelling en dat in Box 3 wordt opgegeven.
    exact_mappings:
      - gbobegrip:BankSpaartegoed
    annotations:
      skos:notation: BS
      mim:herkomst: SBR-NT NT20
      mim:herkomstDefinitie: Wet IB 2001 art. 5.3; SBR-NT NT20.
      mim:datumOpname: "2026-05-19"
      mim:populatie: >-
        Alle in Box 3 opgegeven bank- en spaartegoeden van een
        natuurlijk persoon op peildatum 1 januari, bij Nederlandse of
        buitenlandse financiele instellingen.
    comments:
      - >-
        Banktegoeden worden gewaardeerd tegen saldo per 1 januari, in
        euro. Buitenlandse banktegoeden hebben aanvullende
        rapportage-eisen onder de CRS.
    attributes:
      iban:
        range: Tekst
        description: Internationaal banknummer.
        annotations:
          mim:herkomst: SBR-NT
      valuta:
        range: Tekst
        required: true
        description: Valuta-code.
        annotations:
          mim:herkomst: SBR-NT
      saldoPeildatum:
        range: Bedrag
        required: true
        description: Saldo op 1 januari belastingjaar.
        annotations:
          mim:herkomst: Wet IB art. 5.3
      land:
        range: CodelijstISO3166
        required: true
        description: Land van de bankvestiging.
        annotations:
          mim:herkomst: SBR-NT

  Belegging:
    is_a: VermogensBestanddeel
    description: >-
      Een in Box 3 op te geven vermogensbestanddeel dat bestaat uit
      aandelen, obligaties, beleggingsfondsen, derivaten of
      vergelijkbare effecten, vastgesteld op marktwaarde per peildatum
      1 januari.
    exact_mappings:
      - gbobegrip:Belegging
    annotations:
      skos:notation: BE
      mim:herkomst: SBR-NT NT20
      mim:herkomstDefinitie: Wet IB 2001 art. 5.3; SBR-NT NT20.
      mim:datumOpname: "2026-05-19"
      mim:populatie: >-
        Alle in Box 3 opgegeven beleggingen van een natuurlijk persoon
        op peildatum 1 januari, in de vorm van aandelen, obligaties,
        beleggingsfondsen of derivaten.
    attributes:
      categorieEffect:
        range: Tekst
        required: true
        description: Aandelen, obligaties, fondsen of derivaten.
        annotations:
          mim:herkomst: SBR-NT
      marktwaardePeildatum:
        range: Bedrag
        required: true
        description: Marktwaarde op 1 januari.
        annotations:
          mim:herkomst: Wet IB art. 5.3
      valuta:
        range: Tekst
        required: true
        description: Valuta-code.
        annotations:
          mim:herkomst: SBR-NT

  Cryptovaluta:
    is_a: VermogensBestanddeel
    description: >-
      Een in Box 3 op te geven vermogensbestanddeel dat bestaat uit
      een digitale valuta of cryptotegoed, vastgesteld op marktwaarde
      per peildatum 1 januari.
    exact_mappings:
      - gbobegrip:Cryptovaluta
    annotations:
      skos:notation: CR
      mim:herkomst: SBR-NT NT20
      mim:herkomstDefinitie: Wet IB 2001 art. 5.3; SBR-NT NT20.
      mim:datumOpname: "2026-05-19"
      mim:populatie: >-
        Alle in Box 3 opgegeven cryptotegoeden van een natuurlijk
        persoon op peildatum 1 januari (Bitcoin, Ether, stablecoins en
        vergelijkbare digitale tokens).
    comments:
      - >-
        Onder cryptovaluta vallen Bitcoin, Ether, stablecoins en
        vergelijkbare digitale tokens.
    attributes:
      tokenSymbool:
        range: Tekst
        required: true
        description: Bijvoorbeeld BTC, ETH, USDC.
        annotations:
          mim:herkomst: SBR-NT
      marktwaardePeildatum:
        range: Bedrag
        required: true
        description: Marktwaarde op 1 januari in euro.
        annotations:
          mim:herkomst: Wet IB art. 5.3

  OnroerendeZaakOverigBezit:
    is_a: VermogensBestanddeel
    description: >-
      Een in Box 3 op te geven onroerende zaak die niet de eigen
      woning is, zoals een tweede woning, een verhuurd pand of grond,
      vastgesteld op WOZ-waarde of marktwaarde per peildatum
      1 januari.
    exact_mappings:
      - gbobegrip:OnroerendeZaakOverigBezit
    annotations:
      skos:notation: OZ-overig
      mim:herkomst: SBR-NT NT20
      mim:herkomstDefinitie: Wet IB 2001 art. 5.3; SBR-NT NT20.
      mim:datumOpname: "2026-05-19"
      mim:populatie: >-
        Alle in Box 3 opgegeven onroerende zaken die niet de eigen
        woning zijn: tweede woningen, verhuurde panden, grond en
        vergelijkbare bezittingen, gewaardeerd op WOZ- of marktwaarde
        per peildatum 1 januari.
    comments:
      - >-
        Waardering doorgaans op WOZ-waarde voor woningen. Voor
        verhuurde objecten gelden leegwaarde-ratios. Onderscheid met
        EigenWoning gaat op grond van bewoning door de
        belastingplichtige.
    attributes:
      wozWaarde:
        range: Bedrag
        description: Gemeentelijke WOZ-vaststelling.
        annotations:
          mim:herkomst: Wet WOZ
      marktwaardePeildatum:
        range: Bedrag
        description: Marktwaarde voor zover relevant.
        annotations:
          mim:herkomst: Wet IB art. 5.3
      isVerhuurd:
        range: Indicatie
        description: Aanduiding verhuurd of niet.
        annotations:
          mim:herkomst: SBR-NT
      gekoppeldAan:
        # Wiki schrijft KadastraalOnroerendeZaak; de canonieke naam in
        # het deelmodel Onroerende zaken is KadastraleOnroerendeZaak.
        range: KadastraleOnroerendeZaak
        required: true
        description: >-
          De kadastraal onroerende zaak waaraan dit bezit is
          gekoppeld.
        annotations:
          mim:kardinaliteit: "0..1 -> 1"
        comments:
          - Zie deelmodel Onroerende zaken.

  Schuld:
    is_a: VermogensBestanddeel
    description: >-
      Een in Box 3 op te geven schuld van een natuurlijk persoon die
      boven de schulddrempel uitkomt en die op peildatum 1 januari het
      Box-3-vermogen vermindert.
    exact_mappings:
      - gbobegrip:Schuld
    annotations:
      skos:notation: SC
      mim:herkomst: SBR-NT NT20
      mim:herkomstDefinitie: >-
        Wet IB 2001 art. 5.3 jo. art. 5.5 (schulddrempel); SBR-NT
        NT20.
      mim:datumOpname: "2026-05-19"
      mim:populatie: >-
        Alle in Box 3 opgegeven schulden van een natuurlijk persoon
        die boven de schulddrempel uitkomen en op peildatum 1 januari
        het Box-3-vermogen verminderen.
    comments:
      - >-
        Box-3-Schuld is een fiscaal-administratief concept dat niet
        gelijk is aan KredietOvereenkomst in het deelmodel Krediet.
        Voorbeelden: onderhandse leningen, leningen bij familie,
        schenking-op-papier-schulden, SVn-leningen voor zover in Box 3
        vallend.
    attributes:
      schuldsoort:
        range: Tekst
        required: true
        description: Familie, schenking op papier, SVn, overig.
        annotations:
          mim:herkomst: SBR-NT
      openstaandSaldoPeildatum:
        range: Bedrag
        required: true
        description: Saldo op 1 januari belastingjaar.
        annotations:
          mim:herkomst: Wet IB art. 5.3
      rentepercentage:
        range: Decimaal
        description: Op de schuld toepasselijke rente.
        annotations:
          mim:herkomst: SBR-NT
      einddatumRentevasteperiode:
        range: Datum
        description: Datum waarop rentevasteperiode eindigt.
        annotations:
          mim:herkomst: SBR-NT

  Aftrekpost:
    is_a: FiscaalFeit
    abstract: true
    description: >-
      Een door de belastingplichtige in de IH-aangifte op te voeren
      betaalde uitgave die op grond van Wet IB 2001 het belastbaar
      inkomen verlaagt.
    exact_mappings:
      - gbobegrip:Aftrekpost
    annotations:
      mim:herkomst: SBR-NT NT20
      mim:herkomstDefinitie: >-
        Wet IB 2001 hoofdstuk 6 (persoonsgebonden aftrek) en
        hoofdstuk 3 (eigenwoning); SBR Nederlandse Taxonomie NT20.
      mim:datumOpname: "2026-05-19"
      mim:populatie: >-
        Alle in een IH-aangifte opgevoerde aftrekposten die het
        belastbaar inkomen verlagen, inclusief hypotheekrente,
        partneralimentatie, lijfrente en giften.
    comments:
      - >-
        Abstract. Vier concrete categorieen: hypotheekrente,
        alimentatie, lijfrente en giften.
    attributes:
      bedragJaar:
        range: Bedrag
        required: true
        description: Bedrag van de aftrek in het belastingjaar.
        annotations:
          mim:herkomst: Wet IB hoofdstuk 6
      categorie:
        range: AftrekpostCategorie
        required: true
        description: Categorie-aanduiding.
        annotations:
          mim:herkomst: SBR-NT
        comments:
          - >-
            Verbijzondert FiscaalFeit.categorie (Tekst) naar een
            enum-range, conform de wiki.

  Hypotheekrenteaftrek:
    is_a: Aftrekpost
    description: >-
      De op grond van Wet IB 2001 art. 3.120 in Box 1 aftrekbare rente
      die de belastingplichtige in een belastingjaar heeft betaald
      voor een eigenwoningschuld op zijn eigen woning, voor zover het
      eigenwoning-regime van toepassing is.
    exact_mappings:
      - gbobegrip:Hypotheekrenteaftrek
    annotations:
      mim:herkomst: SBR-NT NT20
      mim:herkomstDefinitie: Wet IB 2001 art. 3.120; SBR-NT NT20.
      mim:datumOpname: "2026-05-19"
      mim:populatie: >-
        Alle in een belastingjaar in Box 1 aftrekbare rentebetalingen
        op de eigenwoningschuld van de belastingplichtige binnen het
        eigenwoning-regime.
    comments:
      - >-
        Het eigenwoning-regime kent voorwaarden zoals een annuitaire
        of lineaire aflossingsverplichting voor leningen die na 2013
        zijn aangegaan. Overgangsrecht geldt voor oudere leningen.
    attributes:
      renteJaar:
        range: Bedrag
        required: true
        description: Betaalde rente in het belastingjaar.
        annotations:
          mim:herkomst: Wet IB art. 3.120
      eigenwoningSchuldSaldoStart:
        range: Bedrag
        description: Schuld bij begin van het jaar.
        annotations:
          mim:herkomst: SBR-NT
      eigenwoningSchuldSaldoEinde:
        range: Bedrag
        description: Schuld bij einde van het jaar.
        annotations:
          mim:herkomst: SBR-NT
      aflossingsschema:
        range: Tekst
        description: Annuitair, lineair of overgangsrecht.
        annotations:
          mim:herkomst: Wet IB
      betreft:
        range: EigenWoning
        required: true
        description: De eigen woning waarop de renteaftrek betrekking heeft.
        annotations:
          mim:kardinaliteit: "0..* -> 1"

  AlimentatieAftrek:
    is_a: Aftrekpost
    description: >-
      De op grond van Wet IB 2001 art. 6.3 aftrekbare
      partneralimentatie die de belastingplichtige in een
      belastingjaar aan een gewezen partner heeft betaald.
    exact_mappings:
      - gbobegrip:AlimentatieAftrek
    annotations:
      mim:herkomst: SBR-NT NT20
      mim:herkomstDefinitie: Wet IB 2001 art. 6.3 jo. art. 6.4; SBR-NT NT20.
      mim:datumOpname: "2026-05-19"
      mim:populatie: >-
        Alle in een belastingjaar door de belastingplichtige aan een
        gewezen partner betaalde aftrekbare partneralimentatie.
    comments:
      - >-
        Kinderalimentatie is sinds 2015 niet meer aftrekbaar en valt
        buiten dit objecttype. Een ontvangen partneralimentatie is wel
        belast bij de ontvanger.
    attributes:
      bedragJaar:
        range: Bedrag
        required: true
        description: Het betaalde bedrag.
        annotations:
          mim:herkomst: Wet IB art. 6.3
      ontvangendePartner:
        range: Tekst
        description: Aanduiding van de gewezen partner.
        annotations:
          mim:herkomst: SBR-NT

  LijfrenteAftrek:
    is_a: Aftrekpost
    description: >-
      De op grond van Wet IB 2001 art. 3.124 aftrekbare
      lijfrente-premies en stortingen op bancaire lijfrente-rekeningen
      die de belastingplichtige in een belastingjaar heeft betaald
      binnen de jaarruimte- of reserveringsruimte.
    exact_mappings:
      - gbobegrip:LijfrenteAftrek
    annotations:
      mim:herkomst: SBR-NT NT20
      mim:herkomstDefinitie: >-
        Wet IB 2001 art. 3.124 tot en met 3.130; SBR-NT NT20.
      mim:datumOpname: "2026-05-19"
      mim:populatie: >-
        Alle in een belastingjaar binnen jaarruimte of
        reserveringsruimte aftrekbare lijfrente-premies en stortingen
        op bancaire lijfrente-rekeningen.
    comments:
      - >-
        De derde pensioenpijler. Aftrek is begrensd door jaarruimte
        (op basis van pensioentekort uit de tweede pijler) en
        reserveringsruimte over zeven voorafgaande jaren.
    attributes:
      bedragJaar:
        range: Bedrag
        required: true
        description: Betaalde lijfrente-premie.
        annotations:
          mim:herkomst: Wet IB art. 3.124
      jaarruimte:
        range: Bedrag
        description: Maximaal aftrekbaar in dit jaar.
        annotations:
          mim:herkomst: Wet IB
      reserveringsruimte:
        range: Bedrag
        description: Maximaal benutbaar uit voorgaande zeven jaar.
        annotations:
          mim:herkomst: Wet IB

  GiftenAftrek:
    is_a: Aftrekpost
    description: >-
      De op grond van Wet IB 2001 art. 6.32 aftrekbare giften die de
      belastingplichtige in een belastingjaar heeft gedaan aan een
      algemeen nut beogende instelling of culturele instelling, voor
      zover binnen de drempel- en plafondbedragen.
    exact_mappings:
      - gbobegrip:GiftenAftrek
    annotations:
      mim:herkomst: SBR-NT NT20
      mim:herkomstDefinitie: Wet IB 2001 art. 6.32 en 6.33; SBR-NT NT20.
      mim:datumOpname: "2026-05-19"
      mim:populatie: >-
        Alle in een belastingjaar aan ANBI's en culturele instellingen
        gedane aftrekbare giften, zowel periodieke als eenmalige
        giften binnen drempel- en plafondbedragen.
    comments:
      - >-
        Periodieke giften zijn aftrekbaar zonder drempel of plafond;
        eenmalige giften kennen drempel-bedrag van 1% van het
        drempelinkomen en plafond van 10% van het drempelinkomen.
    attributes:
      bedragJaar:
        range: Bedrag
        required: true
        description: Het gegeven bedrag in het belastingjaar.
        annotations:
          mim:herkomst: Wet IB art. 6.32
      isPeriodiekeGift:
        range: Indicatie
        required: true
        description: Periodiek (geen drempel of plafond) of eenmalig.
        annotations:
          mim:herkomst: Wet IB
      begunstigdeAnbi:
        range: Tekst
        description: Naam van de ANBI.
        annotations:
          mim:herkomst: SBR-NT

  # --- Eigenwoning en fiscaal partnerschap ------------------------------------

  EigenWoning:
    description: >-
      Een onroerende zaak die op grond van Wet IB 2001 art. 3.111 als
      hoofdverblijf van de belastingplichtige of zijn fiscale partner
      wordt aangemerkt en daarmee binnen het eigenwoning-regime van
      Box 1 valt.
    exact_mappings:
      - gbobegrip:EigenWoning
    annotations:
      mim:herkomst: SBR-NT NT20
      mim:herkomstDefinitie: >-
        Wet IB 2001 art. 3.111 en volgende; SBR-NT NT20.
      mim:datumOpname: "2026-05-19"
      mim:populatie: >-
        Alle onroerende zaken die als hoofdverblijf van de
        belastingplichtige of zijn fiscale partner binnen het
        eigenwoning-regime van Box 1 vallen.
    comments:
      - >-
        Het eigenwoning-regime kent een eigen aftrek- en
        bijtellings-stelsel: hypotheekrenteaftrek en
        eigenwoning-forfait. Een tweede woning valt niet onder het
        regime maar onder Onroerende Zaak Overig Bezit.
    attributes:
      wozWaarde:
        range: Bedrag
        required: true
        description: Door de gemeente vastgestelde WOZ-waarde.
        annotations:
          mim:herkomst: Wet WOZ
      eigenwoningForfait:
        range: Bedrag
        description: Forfaitaire bijtelling.
        annotations:
          mim:herkomst: Wet IB art. 3.112
      eigenwoningSchuldSaldo:
        range: Bedrag
        description: Schuldsaldo binnen het eigenwoning-regime.
        annotations:
          mim:herkomst: Wet IB art. 3.119a
      ingangsdatumRegime:
        range: Datum
        description: Datum waarop de eigenwoning-status is ingegaan.
        annotations:
          mim:herkomst: Wet IB
      gekoppeldAan:
        # Wiki schrijft KadastraalOnroerendeZaak; de canonieke naam in
        # het deelmodel Onroerende zaken is KadastraleOnroerendeZaak.
        range: KadastraleOnroerendeZaak
        required: true
        description: >-
          De kadastraal onroerende zaak waaraan de eigen woning is
          gekoppeld; precies een per eigen woning.
        annotations:
          mim:kardinaliteit: "1 -> 1"
        comments:
          - Zie deelmodel Onroerende zaken.

  FiscalePartner:
    description: >-
      Een relatie tussen twee natuurlijke personen die op grond van
      Wet IB 2001 art. 5a fiscaal als partners worden aangemerkt en
      gezamenlijk gemeenschappelijke inkomensbestanddelen en
      aftrekposten kunnen toedelen tussen de boxen.
    exact_mappings:
      - gbobegrip:FiscalePartner
    annotations:
      mim:herkomst: SBR-NT NT20
      mim:herkomstDefinitie: Wet IB 2001 art. 5a; SBR-NT NT20.
      mim:datumOpname: "2026-05-19"
      mim:populatie: >-
        Alle in een belastingjaar geldende
        fiscaal-partnerschapsrelaties tussen twee natuurlijke personen
        op grond van Wet IB 2001 art. 5a.
    comments:
      - >-
        Fiscaal partnerschap ontstaat automatisch bij huwelijk of
        geregistreerd partnerschap; bij samenwoners is een notarieel
        samenlevingscontract met partnerverklaring, of een gedeeld
        kind, vaak de trigger. Het partnerschap geldt per
        belastingjaar.
    attributes:
      belastingjaar:
        range: Numeriek
        required: true
        description: Per belastingjaar vastgesteld.
        annotations:
          mim:herkomst: Wet IB
      grondslag:
        range: Tekst
        required: true
        description: >-
          Huwelijk, GP, notarieel contract, gemeenschappelijk kind.
        annotations:
          mim:herkomst: Wet IB art. 5a
      begindatum:
        range: Datum
        description: Aanvang van het partnerschap.
        annotations:
          mim:herkomst: Wet IB
      einddatum:
        range: Datum
        description: Einde van het partnerschap.
        annotations:
          mim:herkomst: Wet IB
      tussenPersonen:
        range: NatuurlijkPersoon
        multivalued: true
        required: true
        description: >-
          De twee natuurlijke personen tussen wie het fiscaal
          partnerschap geldt.
        annotations:
          mim:kardinaliteit: "0..* -> 2"
        comments:
          - >-
            Precies 2 personen; LinkML kent geen exacte kardinaliteit,
            zie annotatie mim:kardinaliteit.
          - Zie deelmodel Personen.

  # --- Authentiek inkomen (BRI) -----------------------------------------------

  AuthentiekInkomen:
    description: >-
      Het door de Belastingdienst vastgestelde verzamelinkomen of
      belastbaar loon van een natuurlijk persoon over een
      belastingjaar, aangewezen als authentiek gegeven in de
      Basisregistratie Inkomen.
    exact_mappings:
      - gbobegrip:AuthentiekInkomen
    annotations:
      mim:herkomst: BRI; Stelselcatalogus
      mim:herkomstDefinitie: >-
        Wet basisregistratie inkomen; Stelselcatalogus BRI, begrip
        authentiek_inkomen_gegeven.
      mim:datumOpname: "2026-05-19"
      mim:populatie: >-
        Alle door de Belastingdienst vastgestelde authentieke
        inkomensgegevens per natuurlijk persoon per belastingjaar,
        opgenomen in de Basisregistratie Inkomen.
    comments:
      - >-
        De BRI is een register met een enkel authentiek gegeven: het
        inkomen per persoon per belastingjaar. De waarde komt uit een
        definitief vastgestelde IH-aangifte, of, voor personen zonder
        IH-aangifte, uit de loonaangifteketen. Afnemers van
        inkomensgegevens in inkomensafhankelijke regelingen zijn
        verplicht het BRI-inkomen te gebruiken.
    attributes:
      inkomenBedrag:
        range: Bedrag
        required: true
        description: Verzamelinkomen of belastbaar loon.
        annotations:
          mim:herkomst: Wet BRI art. 4
      belastingjaar:
        range: Numeriek
        required: true
        description: Het jaar waarop het inkomen betrekking heeft.
        annotations:
          mim:herkomst: Wet BRI
      vaststellingsdatum:
        range: Datum
        required: true
        description: Datum van authentieke vaststelling.
        annotations:
          mim:herkomst: Wet BRI
      vaststellingsbron:
        range: Tekst
        required: true
        description: IH-aangifte of loonaangifte.
        annotations:
          mim:herkomst: Wet BRI
      gegrondvestOp:
        range: NatuurlijkPersoon
        required: true
        description: >-
          De natuurlijk persoon op wie het authentieke inkomen is
          gegrondvest.
        annotations:
          mim:kardinaliteit: "0..* -> 1"
        comments:
          - Zie deelmodel Personen.

  # --- Toeslagen (Awir) -------------------------------------------------------

  Toeslag:
    # InkomensOndersteuning is gedefinieerd in het deelmodel Werk en
    # inkomen; belastingen.md documenteert hetzelfde objecttype.
    is_a: InkomensOndersteuning
    abstract: true
    description: >-
      Een inkomensafhankelijke bijdrage die op grond van de Algemene
      wet inkomensafhankelijke regelingen door Belastingdienst en
      Toeslagen aan een natuurlijk persoon wordt toegekend voor een
      specifiek doel.
    exact_mappings:
      - gbobegrip:Toeslag
    annotations:
      mim:herkomst: Awir
      mim:herkomstDefinitie: >-
        Awir; per toeslag de materiele wet (Wet op de huurtoeslag,
        Zorgverzekeringswet, Wet kinderopvang, Wet op het kindgebonden
        budget); SBR-NT NT20 Servicebericht Toeslagen.
      mim:datumOpname: "2026-05-19"
      mim:populatie: >-
        Alle door Belastingdienst en Toeslagen aan natuurlijke
        personen toegekende inkomensafhankelijke bijdragen op grond
        van de Awir: huurtoeslag, zorgtoeslag, kinderopvangtoeslag en
        kindgebonden budget.
    comments:
      - >-
        Vier concrete varianten: huurtoeslag, zorgtoeslag,
        kinderopvangtoeslag en kindgebonden budget. Toekenning
        verloopt in twee fasen: voorlopige beschikking op basis van
        geschat inkomen, en definitieve vaststelling na vaststelling
        van het authentieke inkomen voor het betreffende jaar.
        Verschillen leiden tot bijbetaling of terugvordering.
    attributes:
      toeslagSoort:
        range: ToeslagSoort
        required: true
        description: Welke toeslag.
        annotations:
          mim:herkomst: Awir
      ingangsdatum:
        range: Datum
        required: true
        description: Aanvang van de toekenning.
        annotations:
          mim:herkomst: Awir
      einddatum:
        range: Datum
        description: Einde van de toekenning.
        annotations:
          mim:herkomst: Awir
      bedragMaand:
        range: Bedrag
        required: true
        description: Maandelijks bedrag.
        annotations:
          mim:herkomst: Awir
      isVoorlopig:
        range: Indicatie
        required: true
        description: Voorlopig of definitief vastgesteld.
        annotations:
          mim:herkomst: Awir
      toegekendAan:
        range: NatuurlijkPersoon
        required: true
        description: De natuurlijk persoon aan wie de toeslag is toegekend.
        annotations:
          mim:kardinaliteit: "0..* -> 1"
        comments:
          - Zie deelmodel Personen.

  Huurtoeslag:
    is_a: Toeslag
    description: >-
      Een inkomensafhankelijke toeslag op grond van de Wet op de
      huurtoeslag, toegekend aan huurders met een laag inkomen ter
      tegemoetkoming in de woonlasten.
    exact_mappings:
      - gbobegrip:Huurtoeslag
    annotations:
      skos:notation: HT
      mim:herkomst: Awir
      mim:herkomstDefinitie: >-
        Wet op de huurtoeslag; Algemene wet inkomensafhankelijke
        regelingen; SBR-NT NT20 Servicebericht Toeslagen.
      mim:datumOpname: "2026-05-19"
      mim:populatie: >-
        Alle aan huurders toegekende huurtoeslagen op grond van de Wet
        op de huurtoeslag, ter tegemoetkoming in de woonlasten.
    comments:
      - >-
        Hoogte hangt af van huurprijs, inkomen, vermogen en
        gezinssituatie.
    attributes:
      rekenhuur:
        range: Bedrag
        required: true
        description: Genormeerde huurprijs voor de berekening.
        annotations:
          mim:herkomst: Wht art. 5

  Zorgtoeslag:
    is_a: Toeslag
    description: >-
      Een inkomensafhankelijke tegemoetkoming in de premie van de
      basiszorgverzekering, toegekend op grond van de Wet op de
      zorgtoeslag.
    exact_mappings:
      - gbobegrip:Zorgtoeslag
    annotations:
      skos:notation: ZT
      mim:herkomst: Awir
      mim:herkomstDefinitie: >-
        Wet op de zorgtoeslag; Awir; SBR-NT NT20 Servicebericht
        Toeslagen.
      mim:datumOpname: "2026-05-19"
      mim:populatie: >-
        Alle aan natuurlijke personen toegekende zorgtoeslagen op
        grond van de Wet op de zorgtoeslag, ter tegemoetkoming in de
        premie van de basiszorgverzekering.
    comments:
      - >-
        Hoogte hangt af van inkomen, vermogen en eventuele
        partner-status.
      - >-
        Geen eigen attributen op GBO-Kern-niveau; alle eigenschappen
        geërfd van Toeslag.

  KinderopvangToeslag:
    is_a: Toeslag
    description: >-
      Een inkomensafhankelijke tegemoetkoming in de kosten van formele
      kinderopvang, toegekend op grond van de Wet kinderopvang.
    exact_mappings:
      - gbobegrip:KinderopvangToeslag
    annotations:
      skos:notation: KOT
      mim:herkomst: Awir
      mim:herkomstDefinitie: >-
        Wet kinderopvang; Awir; SBR-NT NT20 Servicebericht Toeslagen.
      mim:datumOpname: "2026-05-19"
      mim:populatie: >-
        Alle toegekende kinderopvangtoeslagen op grond van de Wet
        kinderopvang, ter tegemoetkoming in de kosten van formele
        kinderopvang.
    comments:
      - >-
        Hoogte hangt af van inkomen, aantal gewerkte uren van beide
        ouders, aantal uren opvang en uurtarief.
    attributes:
      aantalUrenOpvang:
        range: Numeriek
        required: true
        description: Aantal opvang-uren in de periode.
        annotations:
          mim:herkomst: Wet kinderopvang
      uurtariefOpvang:
        range: Bedrag
        required: true
        description: Tarief per uur kinderopvang.
        annotations:
          mim:herkomst: Wet kinderopvang
      opvanginstelling:
        range: Tekst
        required: true
        description: Aanduiding van de erkende opvang-instelling.
        annotations:
          mim:herkomst: Wet kinderopvang

  KindgebondenBudget:
    is_a: Toeslag
    description: >-
      Een inkomensafhankelijke tegemoetkoming in de kosten voor de
      opvoeding en het levensonderhoud van kinderen, toegekend op
      grond van de Wet op het kindgebonden budget.
    exact_mappings:
      - gbobegrip:KindgebondenBudget
    annotations:
      skos:notation: KGB
      mim:herkomst: Awir
      mim:herkomstDefinitie: >-
        Wet op het kindgebonden budget; Awir; SBR-NT NT20
        Servicebericht Toeslagen.
      mim:datumOpname: "2026-05-19"
      mim:populatie: >-
        Alle toegekende kindgebonden budgetten op grond van de Wet op
        het kindgebonden budget, ter tegemoetkoming in opvoeding- en
        levensonderhoudskosten van kinderen.
    comments:
      - >-
        Onderscheid met kinderbijslag (uitgevoerd door SVB):
        kinderbijslag is niet-inkomensafhankelijk; kindgebonden budget
        is inkomensafhankelijk en wordt door Belastingdienst en
        Toeslagen uitgevoerd.
    attributes:
      aantalKinderen:
        range: Numeriek
        required: true
        description: Aantal kinderen onder de regeling.
        annotations:
          mim:herkomst: Wet KGB
      leeftijdJongste:
        range: Numeriek
        description: Leeftijd jongste kind.
        annotations:
          mim:herkomst: Wet KGB

  # --- Loonaangifteketen ------------------------------------------------------

  Inkomstenverhouding:
    description: >-
      De administratieve relatie tussen een inhoudingsplichtige en een
      natuurlijk persoon op grond waarvan over een doorlopende periode
      loon wordt uitbetaald, sociale-zekerheids-premies worden
      ingehouden en aangifte loonheffingen wordt gedaan.
    exact_mappings:
      - gbobegrip:Inkomstenverhouding
    annotations:
      mim:herkomst: Loonheffingen 2026
      mim:herkomstDefinitie: >-
        Wet LB 1964; Wfsv; Besluit SUWI art. 5.1;
        Gegevensspecificaties aangifte loonheffingen 2026.
      mim:datumOpname: "2026-05-19"
      mim:populatie: >-
        Alle administratieve relaties tussen een inhoudingsplichtige
        en een natuurlijk persoon waarover doorlopend loon wordt
        uitbetaald en aangifte loonheffingen wordt gedaan.
    comments:
      - >-
        Spil van de loonaangifteketen. Een inkomstenverhouding per
        combinatie van werkgever en werknemer; bij meerdere parallelle
        banen bestaan meerdere inkomstenverhoudingen.
    attributes:
      nummerInkomstenverhouding:
        range: Tekst
        required: true
        description: Uniek nummer voor de IKV.
        annotations:
          mim:herkomst: Loonheffingen rubriek 010300
      begindatumIkv:
        range: Datum
        required: true
        description: Begindatum van de IKV.
        annotations:
          mim:herkomst: Loonheffingen
      einddatumIkv:
        range: Datum
        description: Einddatum van de IKV.
        annotations:
          mim:herkomst: Loonheffingen
      codeAardArbeidsverhouding:
        range: CodeAardArbeidsverhouding
        required: true
        description: Aard van de arbeidsverhouding.
        annotations:
          mim:herkomst: Loonheffingen bijlage
      codeSoortInkomstenverhouding:
        range: CodeSoortInkomstenverhouding
        required: true
        description: Soort IKV.
        annotations:
          mim:herkomst: Loonheffingen bijlage
      codeRedenEinde:
        range: CodeRedenEindeArbeidsverhouding
        description: Reden van einde IKV.
        annotations:
          mim:herkomst: Loonheffingen bijlage
      tussenPersoon:
        range: NatuurlijkPersoon
        required: true
        description: De natuurlijk persoon (werknemer) in de IKV.
        annotations:
          mim:kardinaliteit: "0..* -> 1"
        comments:
          - Zie deelmodel Personen.
      tussenWerkgever:
        # Wiki-diagram zegt Onderneming; dat is de HR/KVK-alias van
        # MaatschappelijkeActiviteit (zie deelmodel Bedrijven en
        # instellingen).
        range: MaatschappelijkeActiviteit
        required: true
        description: De onderneming (werkgever) in de IKV.
        annotations:
          mim:kardinaliteit: "0..* -> 1"
        comments:
          - Zie deelmodel Bedrijven en instellingen.

  Inkomstenopgave:
    description: >-
      De aggregatie van loongegevens van een werknemer binnen een
      aangifte loonheffingen over een aangifteperiode, opgebouwd uit
      een of meer inkomstenperioden en alle daarop horende
      loonbestanddelen.
    exact_mappings:
      - gbobegrip:Inkomstenopgave
    annotations:
      mim:herkomst: Loonheffingen 2026
      mim:herkomstDefinitie: >-
        Gegevensspecificaties aangifte loonheffingen 2026.
      mim:datumOpname: "2026-05-19"
      mim:populatie: >-
        Alle aggregaties van loongegevens van een werknemer binnen een
        aangifte loonheffingen over een aangifteperiode (typisch
        maand, vier weken of week).
    comments:
      - >-
        Per inkomstenverhouding en per aangifteperiode is er een
        inkomstenopgave. De aangifteperiode is doorgaans een maand,
        vier weken of week, afhankelijk van de loonperiode van de
        inhoudingsplichtige.
    attributes:
      aangifteperiode:
        range: Tekst
        required: true
        description: Bijvoorbeeld 2026-M01, 2026-W04.
        annotations:
          mim:herkomst: Loonheffingen
      loonHuidigPeriodeBedrag:
        range: Bedrag
        description: Bruto loon in de aangifteperiode.
        annotations:
          mim:herkomst: Loonheffingen rubriek 100100
      loonSvBedrag:
        range: Bedrag
        description: Loon voor sociale verzekeringen.
        annotations:
          mim:herkomst: Loonheffingen
      ingehoudenLoonheffing:
        range: Bedrag
        description: Ingehouden loonheffing.
        annotations:
          mim:herkomst: Loonheffingen
      binnenInkomstenverhouding:
        range: Inkomstenverhouding
        required: true
        description: >-
          De inkomstenverhouding waarbinnen deze inkomstenopgave valt.
        annotations:
          mim:relatienaam: binnen
          mim:kardinaliteit: "0..* -> 1"

  Inkomstenperiode:
    description: >-
      Een tijdvak binnen een inkomstenopgave waarin specifieke
      loongegevens gelden, zoals een week, een vier-weken-periode of
      een maand, met daarbinnen gewerkte uren, loonbestanddelen en
      eventuele afwijkingen.
    exact_mappings:
      - gbobegrip:Inkomstenperiode
    annotations:
      mim:herkomst: Loonheffingen 2026
      mim:herkomstDefinitie: >-
        Gegevensspecificaties aangifte loonheffingen 2026.
      mim:datumOpname: "2026-05-19"
      mim:populatie: >-
        Alle tijdvakken binnen een inkomstenopgave waarin specifieke
        loongegevens gelden, met gewerkte uren, loonbestanddelen en
        eventuele afwijkingen.
    comments:
      - >-
        Binnen een aangifteperiode kunnen meerdere inkomstenperioden
        voorkomen, bijvoorbeeld bij wijziging van contractuele uren of
        looncorrecties.
    attributes:
      begindatum:
        range: Datum
        required: true
        description: Startdatum van de periode.
        annotations:
          mim:herkomst: Loonheffingen
      einddatum:
        range: Datum
        required: true
        description: Einddatum van de periode.
        annotations:
          mim:herkomst: Loonheffingen
      aantalSvDagen:
        range: Numeriek
        description: Aantal SV-dagen.
        annotations:
          mim:herkomst: Loonheffingen rubriek 100400
      aantalContractUren:
        range: Decimaal
        description: Contracturen in de periode.
        annotations:
          mim:herkomst: Loonheffingen rubriek 100200
      binnenInkomstenopgave:
        range: Inkomstenopgave
        required: true
        description: >-
          De inkomstenopgave waarbinnen deze inkomstenperiode valt.
        annotations:
          mim:relatienaam: binnen
          mim:kardinaliteit: "0..* -> 1"

  LoonBestanddeel:
    description: >-
      Een afzonderlijke component van het loon binnen een
      inkomstenopgave, gecodeerd volgens de soort-inkomen-codelijst en
      met een eigen bedrag, herkomst en fiscale behandeling.
    exact_mappings:
      - gbobegrip:LoonBestanddeel
    annotations:
      mim:herkomst: Loonheffingen 2026
      mim:herkomstDefinitie: >-
        Gegevensspecificaties aangifte loonheffingen 2026.
      mim:datumOpname: "2026-05-19"
      mim:populatie: >-
        Alle afzonderlijke loon-componenten binnen een
        inkomstenopgave: bruto loon, vakantiegeld, dertiende maand,
        toeslagen, bonus, bijtelling, pensioenpremie-eigen-bijdrage en
        vergelijkbare bestanddelen.
    comments:
      - >-
        Loonbestanddelen dekken bruto loon, vakantiegeld, dertiende
        maand, eindejaarsuitkering, structurele toeslagen, bonus,
        provisie, overwerk, bijtelling auto van de zaak,
        fietsleaseplan, pensioenpremie-eigen-bijdrage en meer. Per
        soort gelden eigen fiscale regels.
    attributes:
      codeSoortInkomen:
        range: CodeSoortInkomen
        required: true
        description: Aanduiding van het loonbestanddeel-type.
        annotations:
          mim:herkomst: Loonheffingen bijlage
      bedrag:
        range: Bedrag
        required: true
        description: Bedrag van het loonbestanddeel.
        annotations:
          mim:herkomst: Loonheffingen
      omschrijving:
        range: Tekst
        description: Vrije omschrijving.
        annotations:
          mim:herkomst: Loonheffingen
      valuta:
        range: Tekst
        required: true
        description: Valuta-code.
        annotations:
          mim:herkomst: Loonheffingen
      onderdeelVan:
        range: Inkomstenopgave
        required: true
        description: >-
          De inkomstenopgave waarvan dit loonbestanddeel onderdeel is.
        annotations:
          mim:kardinaliteit: "0..* -> 1"

  LoonAangifte:
    description: >-
      De periodieke aangifte loonheffingen die een inhoudingsplichtige
      op grond van de Wet LB 1964 indient bij de Belastingdienst over
      een aangifteperiode, met alle inkomsten-verhoudingen en de
      daaruit voortvloeiende loonbestanddelen en in te houden
      bedragen.
    exact_mappings:
      - gbobegrip:LoonAangifte
    annotations:
      mim:herkomst: Loonheffingen 2026
      mim:herkomstDefinitie: >-
        Wet LB 1964 art. 28; Wfsv; Gegevens-specificaties aangifte
        loonheffingen 2026.
      mim:datumOpname: "2026-05-19"
      mim:populatie: >-
        Alle periodieke aangiften loonheffingen die
        inhoudingsplichtigen indienen bij de Belastingdienst over een
        aangifteperiode, inclusief reguliere en correctie-aangiften.
    comments:
      - >-
        Spil van de aanlever-kant van de loonketen. Een loonaangifte
        bevat alle inkomstenopgaven van een inhoudingsplichtige over
        een aangifteperiode. UWV ontvangt aangiften via Digipoort en
        levert ze door aan Belastingdienst.
    attributes:
      aangifteperiode:
        range: Tekst
        required: true
        description: Aangifteperiode-aanduiding.
        annotations:
          mim:herkomst: Loonheffingen
      totaalLoonHeffingenBedrag:
        range: Bedrag
        description: Totaal in te houden loonheffingen.
        annotations:
          mim:herkomst: Loonheffingen
      totaalPremieBedrag:
        range: Bedrag
        description: Totaal in te houden premies werknemersverzekeringen.
        annotations:
          mim:herkomst: Loonheffingen
      isCorrectieAangifte:
        range: Indicatie
        required: true
        description: Reguliere aangifte of correctie op een eerdere.
        annotations:
          mim:herkomst: Loonheffingen
      ingediendDoor:
        # Wiki-diagram zegt Onderneming; dat is de HR/KVK-alias van
        # MaatschappelijkeActiviteit (zie deelmodel Bedrijven en
        # instellingen).
        range: MaatschappelijkeActiviteit
        required: true
        description: >-
          De onderneming (inhoudingsplichtige) die de loonaangifte
          heeft ingediend.
        annotations:
          mim:kardinaliteit: "0..* -> 1"
        comments:
          - Zie deelmodel Bedrijven en instellingen.

  # --- Renseignering ----------------------------------------------------------

  Renseignering:
    description: >-
      Een melding die een renseigneringsplichtige derde, zoals een
      bank, verzekeraar of pensioenuitvoerder, op grond van AWR
      art. 53 aan de Belastingdienst doet over gegevens die relevant
      zijn voor de belastingheffing van een natuurlijk persoon.
    exact_mappings:
      - gbobegrip:Renseignering
    annotations:
      mim:herkomst: ODB; AWR art. 53
      mim:herkomstDefinitie: >-
        Algemene wet inzake rijksbelastingen art. 53; Ondersteunend
        Dossier Bestand Belastingdienst.
      mim:datumOpname: "2026-05-19"
      mim:populatie: >-
        Alle door renseigneringsplichtige derden (banken,
        verzekeraars, pensioenuitvoerders) aan de Belastingdienst
        gemelde gegevens die relevant zijn voor de belastingheffing
        van een natuurlijk persoon.
    comments:
      - >-
        Renseigneringen vormen de voornaamste vulling van de
        vooringevulde aangifte. De Belastingdienst publiceert per
        renseigneringssoort een specificatie. Detail-specs zijn echter
        gated achter een ondersteuningsabonnement; voor het
        GBO-Kern-model is dat geen blokkade.
    attributes:
      renseigneringsjaar:
        range: Numeriek
        required: true
        description: Het belastingjaar waarop de renseignering ziet.
        annotations:
          mim:herkomst: AWR art. 53
      aanleversoort:
        range: Tekst
        required: true
        description: >-
          Bankproduct, verzekeringsproduct of pensioenproduct.
        annotations:
          mim:herkomst: ODB
      renseigneringsdatum:
        range: Datum
        required: true
        description: Datum van aanlevering.
        annotations:
          mim:herkomst: ODB
      aangeleverdDoor:
        # Wiki-diagram zegt Onderneming; dat is de HR/KVK-alias van
        # MaatschappelijkeActiviteit (zie deelmodel Bedrijven en
        # instellingen).
        range: MaatschappelijkeActiviteit
        required: true
        description: >-
          De renseigneringsplichtige onderneming die de melding heeft
          aangeleverd.
        annotations:
          mim:kardinaliteit: "0..* -> 1"
        comments:
          - Zie deelmodel Bedrijven en instellingen.

