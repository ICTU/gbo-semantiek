# =============================================================================
# GBO — Deelmodel Werk en inkomen
# Bron (leidend): docs/informatiemodel/gbo-kern/deelmodellen/werk-en-inkomen.md
#
# Uitkeringen onder werknemers- en volksverzekeringen, beslissingen,
# dagloon, arbeidsongeschiktheidspercentage, arbeidsverhouding en
# arbeidsverleden, ontsloten via het Suwi Gegevensregister.
#
# Dit bestand definieert het cross-domein objecttype
# InkomensOndersteuning canoniek; Toeslag (deelmodel Belastingen)
# deelt dit supertype.
#
# Verwijzingen naar andere deelmodellen (NatuurlijkPersoon,
# Onderneming, Inkomstenverhouding, Inkomstenopgave) en naar de
# loonketen-codelijsten (CodeAardArbeidsverhouding,
# CodeRedenEindeArbeidsverhouding, eigendom van Belastingen) worden
# opgelost via gbo.yaml; valideer dus altijd via gbo.yaml.
# =============================================================================
id: https://lod.gbo-semantiek.nl/informatiemodel/werk-en-inkomen
name: gbo-werk-en-inkomen
title: "GBO deelmodel: Werk en inkomen"
description: >-
  Uitkeringsrelaties, arbeidsverhoudingen en daaraan gekoppelde
  besluitvorming op grond van de Wet SUWI en de afzonderlijke
  werknemers- en volksverzekeringswetten. Operationele ontsluiting via
  het Suwi Gegevensregister, beheerd door BKWI namens UWV; uitvoering
  door UWV (werknemersverzekeringen plus Wajong en WIA) of SVB (AOW
  en ANW).
license: https://joinup.ec.europa.eu/collection/eupl/eupl-text-eupl-12

prefixes:
  linkml: https://w3id.org/linkml/
  gbo: https://lod.gbo-semantiek.nl/
  gbobegrip: https://begrippen.gbo-semantiek.nl/id/begrip/
  mim: https://lod.gbo-semantiek.nl/def/mim#
  skos: http://www.w3.org/2004/02/skos/core#
default_prefix: gbo
default_range: string

imports:
  - linkml:types
  - datatypes
  - hoofdmodel

classes:

  # --- Objecttypen: inkomensondersteuning en uitkeringen ----------------------

  InkomensOndersteuning:
    abstract: true
    description: >-
      Een door of namens de overheid aan een natuurlijk persoon
      verstrekte financiele bijdrage met als doel
      inkomensondersteuning, in de vorm van een inkomensafhankelijke
      regeling of een sociale-zekerheidsuitkering.
    exact_mappings:
      - gbobegrip:InkomensOndersteuning
    annotations:
      mim:herkomst: Cross-domein abstractie
      mim:herkomstDefinitie: >-
        Algemene wet inkomensafhankelijke regelingen (Awir) voor
        toeslagen; Wet SUWI en de afzonderlijke werknemers- en
        volksverzekeringswetten voor uitkeringen; GBO-Kern-abstractie.
      mim:datumOpname: "2026-05-19"
      mim:populatie: >-
        Alle door of namens de overheid aan natuurlijke personen
        verstrekte financiele bijdragen met als doel
        inkomensondersteuning, omvattende zowel toeslagen (Awir) als
        sociale-zekerheidsuitkeringen (werknemers- en
        volksverzekeringen).
    comments:
      - >-
        Cross-domein algemene categorie boven Toeslag (in Belastingen)
        en Uitkering (in dit deelmodel). Beide takken delen de
        basis-eigenschappen rechthebbende natuurlijk persoon,
        toekenningsperiode, bedrag en grondslag-beschikking; de
        varianten verschillen in juridische basis,
        uitvoerings-organisatie en aanvraagprocedure.
      - >-
        belastingen.md documenteert ditzelfde objecttype zonder
        attributen; de wiki-pagina's moeten nog worden geharmoniseerd
        (zie ook Toeslag in het deelmodel Belastingen, dat dit
        supertype deelt).
    attributes:
      identificatie:
        identifier: true
        range: Identificatie
        required: true
        description: Interne identificatie.
        annotations:
          mim:herkomst: GBO-Kern
      ingangsdatum:
        range: Datum
        required: true
        description: Aanvang van de toekenning.
        annotations:
          mim:herkomst: Awir / Wet SUWI
      einddatum:
        range: Datum
        description: Einde van de toekenning.
        annotations:
          mim:herkomst: Awir / Wet SUWI
      bedragPeriode:
        range: Bedrag
        required: true
        description: Bedrag per periode.
        annotations:
          mim:herkomst: per regeling

  Uitkering:
    is_a: InkomensOndersteuning
    abstract: true
    description: >-
      Een door of namens de overheid aan een natuurlijk persoon
      toegekende periodieke uitkering op grond van een
      werknemersverzekering of volksverzekering, ter vervanging of
      aanvulling van loon.
    exact_mappings:
      - gbobegrip:Uitkering
    annotations:
      mim:herkomst: SGR cluster Uitkering
      mim:herkomstDefinitie: >-
        Wet SUWI plus de afzonderlijke werknemers- en
        volksverzekeringswetten (Werkloosheidswet, Ziektewet, Wet WIA,
        Wajong, AOW).
      mim:datumOpname: "2026-05-19"
      mim:populatie: >-
        Alle aan natuurlijke personen toegekende periodieke
        uitkeringen op grond van een werknemersverzekering (WW, ZW,
        WIA, IVA, WGA, Wajong) of volksverzekering (AOW), uitgevoerd
        door UWV of SVB.
    comments:
      - >-
        Zeven concrete varianten, uitgevoerd door UWV (WW, ZW, WIA,
        IVA, WGA, Wajong) of SVB (AOW).
    attributes:
      soortUitkering:
        range: SoortUitkering
        required: true
        description: Welke uitkering.
        annotations:
          mim:herkomst: SGR
      ingangsdatum:
        range: Datum
        required: true
        description: Aanvang van de uitkering.
        annotations:
          mim:herkomst: SGR
      einddatum:
        range: Datum
        description: Einde van de uitkering.
        annotations:
          mim:herkomst: SGR
      bedragMaand:
        range: Bedrag
        description: Maandelijks bedrag.
        annotations:
          mim:herkomst: SGR
      redenEinde:
        range: RedenEindeUitkering
        description: Reden van einde van de uitkering.
        annotations:
          mim:herkomst: SGR
      toegekendAan:
        range: NatuurlijkPersoon
        required: true
        description: >-
          De natuurlijk persoon aan wie de uitkering is toegekend (de
          uitkeringsgerechtigde).
        annotations:
          mim:kardinaliteit: "0..* -> 1"
        comments:
          - Zie deelmodel Personen.
      gegrondvestOp:
        range: Beslissing
        required: true
        description: >-
          De beslissing (beschikking) die de juridische grondslag
          onder de uitkering vormt.
        annotations:
          mim:kardinaliteit: "n -> 1"
        comments:
          - >-
            Het wiki-diagram noteert de bron-kardinaliteit als "n";
            hier letterlijk overgenomen in mim:kardinaliteit.
      basisVoor:
        range: Dagloon
        required: true
        description: >-
          Het dagloon dat als grondslag dient voor de hoogte van de
          uitkering.
        annotations:
          mim:kardinaliteit: "0..* -> 1"
        comments:
          - >-
            Relatienaam letterlijk uit het wiki-diagram; de naam leest
            semantisch omgekeerd (het dagloon vormt de grondslag voor
            de uitkeringshoogte, niet andersom).

  UitkeringWW:
    is_a: Uitkering
    description: >-
      Een door UWV aan een werkloze werknemer toegekende periodieke
      uitkering op grond van de Werkloosheidswet, ter vervanging van
      het weggevallen loon.
    exact_mappings:
      - gbobegrip:UitkeringWW
    annotations:
      mim:herkomst: SGR cluster Uitkering
      mim:herkomstDefinitie: Werkloosheidswet hoofdstukken II en III.
      mim:datumOpname: "2026-05-19"
      skos:notation: WW
      mim:populatie: >-
        Alle door UWV aan werkloze werknemers toegekende
        WW-uitkeringen ter vervanging van weggevallen loon, op grond
        van de Werkloosheidswet.
    comments:
      - >-
        Hoogte gebaseerd op het dagloon vermenigvuldigd met een
        percentage dat in de tijd kan dalen. Duur afhankelijk van
        arbeidsverledenjaren (basis-WW plus eventueel verlengde
        uitkering).
    attributes:
      dagloonBedrag:
        range: Bedrag
        required: true
        description: Berekeningsbasis.
        annotations:
          mim:herkomst: SGR
      uitkeringspercentage:
        range: Decimaal
        required: true
        description: Aanvankelijk 75%, daarna 70%.
        annotations:
          mim:herkomst: WW art. 47
      arbeidsverledenJaren:
        range: Numeriek
        description: Bepaalt duur uitkering.
        annotations:
          mim:herkomst: SGR
        comments:
          - >-
            De wiki noemt het type Geheel; dat datatype ontbreekt in
            datatypes.yaml, daarom Numeriek (geheel getal) gebruikt.

  UitkeringZW:
    is_a: Uitkering
    description: >-
      Een door UWV aan een zieke werknemer of vangnetter toegekende
      periodieke uitkering op grond van de Ziektewet, ter vervanging
      van het door ziekte weggevallen loon.
    exact_mappings:
      - gbobegrip:UitkeringZW
    annotations:
      mim:herkomst: SGR cluster Uitkering
      mim:herkomstDefinitie: Ziektewet.
      mim:datumOpname: "2026-05-19"
      skos:notation: ZW
      mim:populatie: >-
        Alle door UWV toegekende ZW-uitkeringen aan zieke werknemers
        en vangnetters (uitzendkrachten, oproepkrachten, werklozen,
        werknemers zonder doorbetalingsplichtige werkgever) ter
        vervanging van weggevallen loon.
    comments:
      - >-
        ZW dekt het vangnet-deel van de ziektevoorziening:
        uitzendkrachten, oproepkrachten, werklozen en werknemers
        zonder doorbetalingsplichtige werkgever. Werknemers met een
        doorbetalingsplichtige werkgever krijgen loondoorbetaling van
        die werkgever en vallen niet onder ZW.
    attributes:
      dagloonBedrag:
        range: Bedrag
        required: true
        description: Berekeningsbasis.
        annotations:
          mim:herkomst: SGR
      uitkeringspercentage:
        range: Decimaal
        required: true
        description: Doorgaans 70%.
        annotations:
          mim:herkomst: ZW art. 29

  UitkeringWIA:
    is_a: Uitkering
    description: >-
      Een door UWV op grond van de Wet werk en inkomen naar
      arbeidsvermogen toegekende periodieke uitkering aan een
      werknemer die na een wachttijd van twee jaar van ziekte
      gedeeltelijk of volledig arbeidsongeschikt is.
    exact_mappings:
      - gbobegrip:UitkeringWIA
    annotations:
      mim:herkomst: SGR cluster Uitkering
      mim:herkomstDefinitie: Wet WIA.
      mim:datumOpname: "2026-05-19"
      skos:notation: WIA
      mim:populatie: >-
        Alle door UWV toegekende WIA-uitkeringen aan werknemers die na
        de wachttijd van twee jaar ziekte gedeeltelijk of volledig
        arbeidsongeschikt zijn; concreet uitgesplitst naar
        UitkeringIVA en UitkeringWGA.
    comments:
      - >-
        De WIA splitst zich in IVA (volledig duurzaam
        arbeidsongeschikt) en WGA (gedeeltelijk of niet-duurzaam
        arbeidsongeschikt). UitkeringWIA is in dit deelmodel de
        gemeenschappelijke aanwijzing; concrete varianten zijn
        UitkeringIVA en UitkeringWGA.
    attributes:
      dagloonBedrag:
        range: Bedrag
        required: true
        description: Berekeningsbasis.
        annotations:
          mim:herkomst: SGR
      arbeidsongeschiktheidspercentage:
        range: Decimaal
        required: true
        description: Vastgesteld door UWV.
        annotations:
          mim:herkomst: WIA-beschikking

  UitkeringIVA:
    is_a: UitkeringWIA
    description: >-
      De Inkomensvoorziening Volledig Arbeidsongeschikten op grond van
      de WIA, toegekend aan werknemers die duurzaam minder dan twintig
      procent van hun oude loon kunnen verdienen.
    exact_mappings:
      - gbobegrip:UitkeringIVA
    annotations:
      mim:herkomst: SGR cluster Uitkering
      mim:herkomstDefinitie: Wet WIA hoofdstuk IV (IVA-regeling).
      mim:datumOpname: "2026-05-19"
      skos:notation: IVA
      mim:populatie: >-
        Alle door UWV toegekende IVA-uitkeringen aan werknemers die
        duurzaam minder dan twintig procent van hun oude loon kunnen
        verdienen, op grond van hoofdstuk IV van de Wet WIA.
    comments:
      - >-
        IVA-criterium: minder dan 20% van het oude loon kunnen
        verdienen en geen herstel verwacht. De uitkering is hoger en
        stabieler dan WGA omdat het duurzaamheids-criterium is
        gehaald.
    attributes:
      dagloonBedrag:
        range: Bedrag
        required: true
        description: Berekeningsbasis.
        annotations:
          mim:herkomst: SGR
      uitkeringspercentage:
        range: Decimaal
        required: true
        description: 75% van dagloon.
        annotations:
          mim:herkomst: Wet WIA

  UitkeringWGA:
    is_a: UitkeringWIA
    description: >-
      De Werkhervatting Gedeeltelijk Arbeidsongeschikten op grond van
      de WIA, toegekend aan werknemers die vijfendertig procent tot
      tachtig procent arbeidsongeschikt zijn, of volledig
      arbeidsongeschikt maar niet duurzaam.
    exact_mappings:
      - gbobegrip:UitkeringWGA
    annotations:
      mim:herkomst: SGR cluster Uitkering
      mim:herkomstDefinitie: Wet WIA hoofdstuk VII (WGA-regeling).
      mim:datumOpname: "2026-05-19"
      skos:notation: WGA
      mim:populatie: >-
        Alle door UWV toegekende WGA-uitkeringen aan werknemers die 35
        tot 80 procent arbeidsongeschikt zijn, of volledig maar niet
        duurzaam, verdeeld over de fasen LGU, LAU en VVU.
    comments:
      - >-
        Drie fasen: LGU (loongerelateerde uitkering, op basis van
        arbeidsverleden), LAU (loonaanvullingsuitkering, wanneer de
        uitkering minus resterende verdiencapaciteit boven een drempel
        uitkomt) en VVU (vervolguitkering, gerelateerd aan
        minimumloon-percentages).
    attributes:
      dagloonBedrag:
        range: Bedrag
        required: true
        description: Berekeningsbasis.
        annotations:
          mim:herkomst: SGR
      arbeidsongeschiktheidspercentage:
        range: Decimaal
        required: true
        description: Bepaalt fase en hoogte.
        annotations:
          mim:herkomst: WIA-beschikking
      wgaFase:
        range: Tekst
        description: LGU, LAU of VVU.
        annotations:
          mim:herkomst: SGR

  UitkeringWajong:
    is_a: Uitkering
    description: >-
      Een door UWV op grond van de Wet
      arbeidsongeschiktheidsvoorziening jonggehandicapten toegekende
      periodieke uitkering aan jonggehandicapten die door
      arbeidsongeschiktheid niet of beperkt kunnen werken.
    exact_mappings:
      - gbobegrip:UitkeringWajong
    annotations:
      mim:herkomst: SGR cluster Uitkering
      mim:herkomstDefinitie: >-
        Wajong (drie generaties: oude Wajong, Wajong 2010,
        Wajong 2015).
      mim:datumOpname: "2026-05-19"
      skos:notation: Wajong
      mim:populatie: >-
        Alle door UWV toegekende Wajong-uitkeringen aan
        jonggehandicapten, verdeeld over de drie generaties oude
        Wajong (toekenningen voor 2010), Wajong 2010 en Wajong 2015.
    comments:
      - >-
        Drie historische generaties met eigen voorwaarden: oude Wajong
        (toekenningen voor 2010), Wajong 2010 (instroom 2010-2014, met
        werkregeling) en Wajong 2015 (vanaf 2015, uitsluitend voor
        duurzaam volledig arbeidsongeschikten).
    attributes:
      wajongGeneratie:
        range: Tekst
        required: true
        description: OudeWajong, Wajong2010 of Wajong2015.
        annotations:
          mim:herkomst: SGR
      arbeidsongeschiktheidspercentage:
        range: Decimaal
        description: Bij relevante generatie.
        annotations:
          mim:herkomst: Wajong-beschikking

  UitkeringAOW:
    is_a: Uitkering
    description: >-
      Een door SVB op grond van de Algemene Ouderdomswet toegekende
      periodieke uitkering aan personen vanaf de AOW-gerechtigde
      leeftijd, gebaseerd op de in Nederland opgebouwde verzekerde
      jaren.
    exact_mappings:
      - gbobegrip:UitkeringAOW
    annotations:
      mim:herkomst: SGR (ontsluiting); SVB (uitvoering)
      mim:herkomstDefinitie: Algemene Ouderdomswet (AOW).
      mim:datumOpname: "2026-05-19"
      skos:notation: AOW
      mim:populatie: >-
        Alle door SVB op grond van de Algemene Ouderdomswet toegekende
        periodieke uitkeringen aan natuurlijke personen vanaf de
        AOW-gerechtigde leeftijd.
    comments:
      - >-
        Anders dan de overige uitkeringen, die UWV uitvoert, wordt AOW
        uitgevoerd door SVB. Het Suwi Gegevensregister ontsluit een
        deel van de AOW-administratie voor afnemers in het
        SUWI-stelsel; voor het volledige beeld is mogelijk een directe
        SVB-aansluiting nodig.
    attributes:
      aowGerechtigdeLeeftijd:
        range: Numeriek
        required: true
        description: Ingangsleeftijd voor deze persoon.
        annotations:
          mim:herkomst: AOW
        comments:
          - >-
            De wiki noemt het type Geheel; dat datatype ontbreekt in
            datatypes.yaml, daarom Numeriek (geheel getal) gebruikt.
      opgebouwdeVerzekerdeJaren:
        range: Numeriek
        description: Maximaal 50; bepaalt 100%-opbouw.
        annotations:
          mim:herkomst: SVB
        comments:
          - >-
            De wiki noemt het type Geheel; dat datatype ontbreekt in
            datatypes.yaml, daarom Numeriek (geheel getal) gebruikt.
      aowHoogteCategorie:
        range: Tekst
        description: Alleenstaande, gehuwd of samenwonend.
        annotations:
          mim:herkomst: SVB

  # --- Objecttypen: arbeid en besluitvorming ----------------------------------

  Arbeidsverhouding:
    description: >-
      De juridische en feitelijke relatie tussen een natuurlijk
      persoon als werknemer en een werkgever op grond waarvan arbeid
      wordt verricht tegen beloning, gedurende een bepaalde of
      onbepaalde periode.
    exact_mappings:
      - gbobegrip:Arbeidsverhouding
    annotations:
      mim:herkomst: SGR cluster Arbeidsverhouding
      mim:herkomstDefinitie: >-
        Burgerlijk Wetboek Boek 7 titel 10 (arbeidsovereenkomst); Wet
        SUWI voor het SUWI-aspect.
      mim:datumOpname: "2026-05-19"
      mim:populatie: >-
        Alle juridische en feitelijke arbeidsrelaties tussen een
        natuurlijk persoon als werknemer en een onderneming als
        werkgever die zichtbaar zijn in het Suwi Gegevensregister.
    comments:
      - >-
        Arbeidsverhouding ligt boven Inkomstenverhouding in
        Belastingen: één arbeidsverhouding kan in de tijd meerdere
        inkomstenverhoudingen genereren (na contractvernieuwing of bij
        wisseling van loonperiode-type). De
        Arbeidsverhouding-attributen leggen de afspraak vast; de
        bijbehorende inkomstenverhoudingen leggen de uitvoering en de
        aangifte loonheffingen vast.
    attributes:
      soortDienstverband:
        range: CodeAardArbeidsverhouding
        required: true
        description: Aard van de arbeidsverhouding.
        annotations:
          mim:herkomst: SGR + Loonheffingen
        comments:
          - >-
            Codelijst CodeAardArbeidsverhouding; zie deelmodel
            Belastingen (eigenaar van de loonketen-codelijsten).
      ingangsdatum:
        range: Datum
        required: true
        description: Begindatum dienstverband.
        annotations:
          mim:herkomst: SGR
      einddatum:
        range: Datum
        description: Einddatum dienstverband.
        annotations:
          mim:herkomst: SGR
      proeftijdEinddatum:
        range: Datum
        description: Einde proeftijd.
        annotations:
          mim:herkomst: SGR
      beroep:
        range: Tekst
        description: Functie of vakgebied.
        annotations:
          mim:herkomst: SGR
      codeRedenEinde:
        range: CodeRedenEindeArbeidsverhouding
        description: Reden van einde.
        annotations:
          mim:herkomst: Loonheffingen bijlage
        comments:
          - >-
            Codelijst CodeRedenEindeArbeidsverhouding; zie deelmodel
            Belastingen (eigenaar van de loonketen-codelijsten).
      overnameIndicatie:
        range: Indicatie
        description: Onderneming in overnameproces.
        annotations:
          mim:herkomst: SGR
      heeftWerknemer:
        range: NatuurlijkPersoon
        required: true
        description: >-
          De natuurlijk persoon die als werknemer in de
          arbeidsverhouding staat.
        annotations:
          mim:kardinaliteit: "0..* -> 1"
        comments:
          - Zie deelmodel Personen.
      heeftWerkgever:
        # Wiki-diagram zegt Onderneming; dat is de HR/KVK-alias van
        # MaatschappelijkeActiviteit (zie deelmodel Bedrijven en
        # instellingen).
        range: MaatschappelijkeActiviteit
        required: true
        description: >-
          De onderneming die als werkgever in de arbeidsverhouding
          staat.
        annotations:
          mim:kardinaliteit: "0..* -> 1"
        comments:
          - Zie deelmodel Bedrijven en instellingen.
      komtTotUitingIn:
        range: Inkomstenverhouding
        multivalued: true
        description: >-
          De inkomstenverhoudingen waarin deze arbeidsverhouding
          operationeel tot uiting komt in de loonaangifteketen.
        annotations:
          mim:kardinaliteit: "1 -> 0..*"
        comments:
          - Zie deelmodel Belastingen.

  ArbeidsverledenFeit:
    description: >-
      Een afzonderlijk feit in het arbeids- of inkomensverleden van
      een natuurlijk persoon, zoals een periode in dienst, een periode
      met uitkering of een leerwerk-periode, dat relevant is voor de
      berekening van werknemersverzekerings-rechten.
    exact_mappings:
      - gbobegrip:ArbeidsverledenFeit
    annotations:
      mim:herkomst: SGR cluster Arbeidsverhouding
      mim:herkomstDefinitie: >-
        Werkloosheidswet (refertes 26-uit-36-weken en 4-uit-5-jaren);
        SGR cluster Arbeidsverhouding.
      mim:datumOpname: "2026-05-19"
      mim:populatie: >-
        Alle afzonderlijke feiten in het arbeids- of inkomensverleden
        van een natuurlijk persoon (dienstverband, uitkeringsperiode,
        leerwerk-periode of periode zelfstandig werk) die relevant
        zijn voor de berekening van werknemersverzekerings-rechten.
    comments:
      - >-
        Arbeidsverleden bepaalt onder andere de WW-duur.
        ArbeidsverledenFeit dient als bouwsteen waarmee UWV een
        arbeidsverleden-overzicht kan opstellen, met feit-typen voor
        dienstverband, uitkeringsperiode, leerwerk-periode en periode
        van zelfstandig werk.
    attributes:
      soortFeit:
        range: Tekst
        required: true
        description: Dienstverband, Uitkering, Leerwerk of ZelfstandigWerk.
        annotations:
          mim:herkomst: SGR
      begindatum:
        range: Datum
        required: true
        description: Aanvang van het feit.
        annotations:
          mim:herkomst: SGR
      einddatum:
        range: Datum
        description: Einde van het feit.
        annotations:
          mim:herkomst: SGR
      sv-loonbedrag:
        range: Bedrag
        description: Cumulatief SV-loon over de periode.
        annotations:
          mim:herkomst: Loonaangifteketen
        comments:
          - >-
            Attribuutnaam letterlijk uit de wiki overgenomen; wijkt af
            van de camelCase-conventie (koppelteken).
      betreft:
        range: NatuurlijkPersoon
        required: true
        description: >-
          De natuurlijk persoon op wiens arbeids- of inkomensverleden
          het feit betrekking heeft.
        annotations:
          mim:kardinaliteit: "0..* -> 1"
        comments:
          - Zie deelmodel Personen.

  Beslissing:
    description: >-
      Een door een uitvoerings-instelling in het SUWI-stelsel genomen
      besluit over het recht op, de hoogte van of de beeindiging van
      een uitkering of een andere voorziening voor een natuurlijk
      persoon.
    exact_mappings:
      - gbobegrip:Beslissing
    annotations:
      mim:herkomst: SGR cluster Beslissing
      mim:herkomstDefinitie: >-
        Wet SUWI; Algemene wet bestuursrecht (Awb) hoofdstuk 4
        (beschikking); de afzonderlijke werknemers- en
        volksverzekeringswetten.
      mim:datumOpname: "2026-05-19"
      mim:populatie: >-
        Alle door een SUWI-uitvoeringsinstelling (UWV, SVB) genomen
        besluiten over het recht op, de hoogte van of de beeindiging
        van een uitkering of voorziening voor een natuurlijk persoon.
    comments:
      - >-
        Beslissing is de juridische grondslag onder een uitkering. Een
        uitkering bestaat alleen als er een geldige beschikking onder
        ligt. Wijzigingen (verhoging, verlaging, beeindiging) zijn elk
        afzonderlijke beschikkingen.
    attributes:
      beschikkingsnummer:
        range: Tekst
        required: true
        description: Identifier van de beschikking.
        annotations:
          mim:herkomst: SGR
      beschikkingsdatum:
        range: Datum
        required: true
        description: Datum van de beschikking.
        annotations:
          mim:herkomst: SGR
      beslissingSoort:
        range: BeslissingSoort
        required: true
        description: Toekenning, herziening of beeindiging.
        annotations:
          mim:herkomst: SGR
      betrefftSoortUitkering:
        range: SoortUitkering
        description: Op welke uitkering de beschikking ziet.
        annotations:
          mim:herkomst: SGR
        comments:
          - >-
            Attribuutnaam letterlijk uit de wiki overgenomen,
            inclusief vermoedelijke spelfout (betrefft).
      betreft:
        range: NatuurlijkPersoon
        required: true
        description: >-
          De natuurlijk persoon op wie het besluit betrekking heeft.
        annotations:
          mim:kardinaliteit: "0..* -> 1"
        comments:
          - Zie deelmodel Personen.
      genomenDoor:
        # Wiki-diagram zegt Onderneming; dat is de HR/KVK-alias van
        # MaatschappelijkeActiviteit (zie deelmodel Bedrijven en
        # instellingen).
        range: MaatschappelijkeActiviteit
        required: true
        description: >-
          De uitvoerings-instelling die het besluit heeft genomen.
        annotations:
          mim:kardinaliteit: "0..* -> 1"
        comments:
          - Zie deelmodel Bedrijven en instellingen.
          - >-
            Het wiki-diagram richt deze relatie op Onderneming; de
            sectie Stelselkoppelingen noemt UWV en SVB echter
            NietNatuurlijkPersoon-instanties. Harmonisatie van de
            wiki-pagina is een openstaand punt.

  Dagloon:
    description: >-
      Het op grond van de Dagloonregels werknemersverzekeringen voor
      een specifieke uitkering vastgestelde dagloon, dat dient als
      grondslag voor de hoogte van de uitkering en wordt berekend op
      basis van de inkomstenopgaven over de referteperiode.
    exact_mappings:
      - gbobegrip:Dagloon
    annotations:
      mim:herkomst: SGR cluster Uitkering
      mim:herkomstDefinitie: >-
        Dagloonregels werknemersverzekeringen 2015 (ministeriele
        regeling); Werkloosheidswet, Ziektewet en Wet WIA.
      mim:datumOpname: "2026-05-19"
      mim:populatie: >-
        Alle door UWV vastgestelde daglonen die als grondslag dienen
        voor de hoogte van een werknemersverzekerings-uitkering,
        berekend uit de inkomstenopgaven over de referteperiode.
    comments:
      - >-
        Het dagloon wordt door UWV berekend uit de
        loonaangifteketen-data (Inkomstenopgave-records in de
        referteperiode, doorgaans een jaar). Het wordt gemaximeerd op
        het wettelijk maximumdagloon, jaarlijks door SZW vastgesteld.
    attributes:
      dagloonBedrag:
        range: Bedrag
        required: true
        description: Het vastgestelde dagloon.
        annotations:
          mim:herkomst: Dagloonregels
      peildatum:
        range: Datum
        required: true
        description: Peilmoment voor de berekening.
        annotations:
          mim:herkomst: SGR
      referteperiodeStart:
        range: Datum
        required: true
        description: Aanvang van de referteperiode.
        annotations:
          mim:herkomst: Dagloonregels art. 2
      referteperiodeEinde:
        range: Datum
        required: true
        description: Einde van de referteperiode.
        annotations:
          mim:herkomst: Dagloonregels art. 2
      maximumDagloon:
        range: Bedrag
        description: Wettelijk maximum-dagloon op de peildatum.
        annotations:
          mim:herkomst: SZW jaartabel
      berekendOp:
        range: Inkomstenopgave
        multivalued: true
        required: true
        description: >-
          De inkomstenopgaven over de referteperiode waarop het
          dagloon is berekend.
        annotations:
          mim:kardinaliteit: "0..* -> 1..*"
        comments:
          - Zie deelmodel Belastingen.

  Arbeidsongeschiktheidspercentage:
    description: >-
      Het door een verzekeringsarts en arbeidsdeskundige vastgestelde
      percentage waarmee de verdiencapaciteit van een werknemer ten
      opzichte van zijn oude loon is verminderd, op grond waarvan de
      WIA-uitkering wordt geclassificeerd in IVA of WGA met hun fasen.
    exact_mappings:
      - gbobegrip:Arbeidsongeschiktheidspercentage
    annotations:
      mim:herkomst: SGR cluster Beslissing
      mim:herkomstDefinitie: >-
        Schattingsbesluit arbeidsongeschiktheidswetten; Wet werk en
        inkomen naar arbeidsvermogen.
      mim:datumOpname: "2026-05-19"
      mim:populatie: >-
        Alle door UWV vastgestelde arbeidsongeschiktheidspercentages
        die de basis vormen voor classificatie van een WIA-uitkering
        in IVA of WGA, inclusief herzieningen.
    comments:
      - >-
        Het percentage bepaalt de uitkeringstak: 80% of meer duurzaam
        geeft IVA; 35% tot 80% of 80% of meer niet-duurzaam geeft WGA;
        minder dan 35% geeft geen recht op WIA. Een herziening kan
        leiden tot een wijziging van uitkeringssoort en hoogte.
    attributes:
      percentage:
        range: Decimaal
        required: true
        description: Het AO-percentage.
        annotations:
          mim:herkomst: WIA-beschikking
      vaststellingsdatum:
        range: Datum
        required: true
        description: Datum waarop het percentage is vastgesteld.
        annotations:
          mim:herkomst: SGR
      duurzaamIndicatie:
        range: Indicatie
        required: true
        description: Bepaalt IVA versus WGA bij volledig AO.
        annotations:
          mim:herkomst: Schattingsbesluit
      bepaaldDoor:
        range: Beslissing
        required: true
        description: >-
          De beslissing waarbij het arbeidsongeschiktheidspercentage
          is vastgesteld.
        annotations:
          mim:kardinaliteit: "0..* -> 1"

enums:

  BeslissingSoort:
    description: >-
      De soorten besluit die in het SUWI-stelsel door UWV of SVB
      kunnen worden genomen over uitkeringen en voorzieningen.
    exact_mappings:
      - gbobegrip:BeslissingSoort
    annotations:
      mim:herkomst: SGR
      mim:herkomstDefinitie: SGR cluster Beslissing.
      mim:datumOpname: "2026-05-19"
    comments:
      - >-
        De waardenset onderscheidt de juridisch relevante
        beslissoorten die een uitkering doen ontstaan, wijzigen of
        laten eindigen, plus de procedurele soorten afwijzing,
        beslissing op bezwaar en sanctie. Per uitkering kan een keten
        van Beslissingen bestaan, beginnend bij een Toekenning en
        eventueel gevolgd door Herziening of Beeindiging.
      - "Gebruikt door: Beslissing.beslissingSoort."
    permissible_values:
      Toekenning:
        title: Toekenning uitkering
        description: >-
          Besluit waarbij een nieuwe uitkering wordt toegekend.
        comments:
          - Eerste beschikking onder een uitkering.
      Herziening:
        title: Herziening uitkering
        description: >-
          Besluit waarbij hoogte of grondslag van een lopende
          uitkering wijzigt.
        comments:
          - >-
            Bij wijziging van AO-percentage, dagloon of relevante
            feiten.
      Beeindiging:
        title: Beeindiging uitkering
        description: Besluit waarbij een lopende uitkering eindigt.
        comments:
          - >-
            Bij werkhervatting, einde wachttijd, AOW-leeftijd of
            overlijden.
      Afwijzing:
        title: Afwijzing aanvraag
        description: >-
          Besluit waarbij een aanvraag voor een uitkering wordt
          afgewezen.
        comments:
          - Geen uitkering ontstaat.
      Bezwaar:
        title: Beslissing op bezwaar
        description: >-
          Heroverweging van een eerder besluit na een ingediend
          bezwaarschrift.
        comments:
          - Awb hoofdstuk 7.
      Sanctie:
        title: Sanctie-besluit
        description: >-
          Besluit waarbij een korting of maatregel wordt opgelegd
          wegens niet-nakomen van verplichtingen.
        comments:
          - >-
            Bijvoorbeeld bij weigering passende arbeid of niet-melden
            van inkomsten.

  RedenEindeUitkering:
    description: >-
      De redenen waarom een uitkering kan eindigen op grond van de
      werknemers- of volksverzekeringswetten.
    exact_mappings:
      - gbobegrip:RedenEindeUitkering
    annotations:
      mim:herkomst: SGR
      mim:herkomstDefinitie: SGR cluster Uitkering.
      mim:datumOpname: "2026-05-19"
    comments:
      - >-
        Top 10 weergegeven; volledige set te bevestigen tegen
        SGR-publicatie.
      - "Gebruikt door: Uitkering.redenEinde."
    permissible_values:
      WerkHervat:
        title: Werk hervat
        description: >-
          Uitkering eindigt omdat de rechthebbende weer aan het werk
          is.
        comments:
          - Meest voorkomende reden bij WW en ZW.
      TermijnVerstreken:
        title: Maximale uitkeringsduur bereikt
        description: >-
          Uitkering eindigt omdat de wettelijke maximumduur is
          verstreken.
        comments:
          - Bij WW gerelateerd aan arbeidsverleden.
      Herkeuring:
        title: Herkeuring leidt tot beeindiging
        description: >-
          Uitkering eindigt na een nieuwe medische of arbeidskundige
          beoordeling.
        comments:
          - Bij WIA en Wajong.
      BereiktAOW:
        title: AOW-leeftijd bereikt
        description: >-
          Uitkering eindigt omdat de rechthebbende de AOW-gerechtigde
          leeftijd heeft bereikt.
        comments:
          - Overgang naar AOW.
      Overlijden:
        title: Persoon is overleden
        description: >-
          Uitkering eindigt door overlijden van de rechthebbende.
        comments:
          - Trigger via BRP cat 06.
      Emigratie:
        title: Persoon is gemigreerd
        description: >-
          Uitkering eindigt omdat de rechthebbende naar het buitenland
          is vertrokken.
        comments:
          - Tenzij export-recht van toepassing is.
      Sanctie:
        title: Sanctie wegens niet-nakomen verplichtingen
        description: >-
          Uitkering eindigt als gevolg van een sanctie-besluit.
        comments:
          - Zie BeslissingSoort = Sanctie.
      Detentie:
        title: Persoon zit in detentie
        description: >-
          Uitkering eindigt omdat de rechthebbende in detentie
          verblijft.
        comments:
          - Uitsluitingsgrond op grond van de SV-wetgeving.
      WeigeringMedewerking:
        title: Weigering medewerking re-integratie
        description: >-
          Uitkering eindigt na vastgestelde weigering om mee te werken
          aan re-integratie.
        comments:
          - Bij WW, ZW en WIA.
      BeeindigingDoorWerknemer:
        title: Vrijwillige beeindiging
        description: >-
          Uitkering eindigt op verzoek van de rechthebbende zelf.
        comments:
          - Bijvoorbeeld bij start eigen bedrijf.

  SoortUitkering:
    description: >-
      De soorten uitkering die in het deelmodel Werk en Inkomen worden
      onderscheiden, gebaseerd op de werknemers- en
      volksverzekeringswetten.
    exact_mappings:
      - gbobegrip:SoortUitkering
    annotations:
      mim:herkomst: SGR
      mim:herkomstDefinitie: SGR cluster Uitkering.
      mim:datumOpname: "2026-05-19"
    comments:
      - >-
        De waardenset dekt de zeven concrete uitkerings-takken die
        binnen het SUWI-stelsel worden uitgevoerd door UWV (WW, ZW,
        WIA, IVA, WGA, Wajong) of SVB (AOW). De codes komen overeen
        met de gangbare juridische afkortingen van de onderliggende
        wetten.
      - "Gebruikt door: Uitkering.soortUitkering."
    permissible_values:
      WW:
        title: Werkloosheidsuitkering
        description: >-
          Uitkering aan werkloze werknemer ter vervanging van
          weggevallen loon.
        comments:
          - "Wettelijke basis: Werkloosheidswet."
          - Uitgevoerd door UWV.
      ZW:
        title: Ziektewet-uitkering
        description: >-
          Uitkering aan zieke werknemer of vangnetter ter vervanging
          van door ziekte weggevallen loon.
        comments:
          - "Wettelijke basis: Ziektewet."
          - Uitgevoerd door UWV.
      WIA:
        title: WIA-uitkering
        description: >-
          Uitkering aan werknemer die na wachttijd van twee jaar
          ziekte arbeidsongeschikt is.
        comments:
          - "Wettelijke basis: Wet WIA."
          - Verzamel-aanduiding; concrete tak IVA of WGA.
      IVA:
        title: IVA-uitkering
        description: >-
          Uitkering aan werknemer die duurzaam minder dan 20% van zijn
          oude loon kan verdienen.
        comments:
          - "Wettelijke basis: Wet WIA hoofdstuk IV."
          - WIA-subvorm; hoger en stabieler dan WGA.
      WGA:
        title: WGA-uitkering
        description: >-
          Uitkering aan werknemer die 35-80% arbeidsongeschikt is, of
          volledig maar niet duurzaam.
        comments:
          - "Wettelijke basis: Wet WIA hoofdstuk VII."
          - WIA-subvorm; drie fasen (LGU, LAU, VVU).
      Wajong:
        title: Wajong-uitkering
        description: >-
          Uitkering aan jonggehandicapte die door
          arbeidsongeschiktheid niet of beperkt kan werken.
        comments:
          - "Wettelijke basis: Wajong."
          - >-
            Drie generaties (oude Wajong, Wajong 2010, Wajong 2015).
      AOW:
        title: AOW-uitkering
        description: >-
          Uitkering aan persoon vanaf de AOW-gerechtigde leeftijd op
          basis van opgebouwde verzekerde jaren.
        comments:
          - "Wettelijke basis: Algemene Ouderdomswet."
          - Uitgevoerd door SVB.
