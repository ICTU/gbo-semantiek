# =============================================================================
# GBO — Deelmodel Waarde onroerende zaken
# Bron (leidend): docs/informatiemodel/gbo-kern/deelmodellen/waarde-onroerende-zaken.md
#
# WOZ-objecten als fiscale eenheid voor de Wet WOZ en hun waarden per
# peildatum: WOZ-objecten, WOZ-waarden, deelobjecten en belanghebbenden
# (eigenaar/gebruiker). Kadastrale eigendom valt buiten dit deelmodel
# (zie Onroerende zaken); het fysieke gebouw zelf hoort bij Adressen en
# gebouwen.
#
# Het Core-model is rijker dan HC-WOZ op een aantal punten:
# WOZDeelobject, volledige peildatum-historie en gebruikscode/status;
# voor die data blijft StUF-WOZ naast HC bestaan.
#
# Verwijzingen naar andere deelmodellen (AdresseerbaarObject, Perceel)
# en het hoofdmodel (Partij) worden opgelost via gbo.yaml; valideer dus
# altijd via gbo.yaml.
# =============================================================================
id: https://lod.gbo-semantiek.nl/informatiemodel/waarde-onroerende-zaken
name: gbo-waarde-onroerende-zaken
title: "GBO deelmodel: Waarde onroerende zaken"
description: >-
  WOZ-objecten als fiscale eenheid voor de Wet WOZ en hun waarden per
  peildatum. Een WOZ-object is een samenstelling, niet identiek aan
  één pand of één perceel. Kadastrale eigendom valt buiten dit
  deelmodel (zie deelmodel Onroerende zaken); het fysieke gebouw zelf
  hoort bij het deelmodel Adressen en gebouwen.
license: https://joinup.ec.europa.eu/collection/eupl/eupl-text-eupl-12

prefixes:
  linkml: https://w3id.org/linkml/
  gbo: https://lod.gbo-semantiek.nl/
  gbobegrip: https://begrippen.gbo-semantiek.nl/id/begrip/
  mim: https://lod.gbo-semantiek.nl/def/mim#
default_prefix: gbo
default_range: string

imports:
  - linkml:types
  - datatypes
  - hoofdmodel

classes:

  # --- Objecttypen ------------------------------------------------------------

  Belanghebbende:
    description: >-
      De geregistreerde rechtsbetrekking tussen een partij en een
      WOZ-object, waarbij de partij voor de Wet WOZ als eigenaar,
      gebruiker of beide rollen heeft en daarom de WOZ-beschikking
      ontvangt voor het object.
    exact_mappings:
      - gbobegrip:Belanghebbende
    annotations:
      mim:herkomst: WOZ
      mim:herkomstDefinitie: >-
        Wet WOZ art. 24 e.v. (bekendmaking beschikking), Algemene wet
        bestuursrecht art. 1:2 (algemeen belanghebbende-begrip) en de
        LV-WOZ-catalogus.
      mim:datumOpname: "2026-04-28"
      mim:uniekeAanduiding: >-
        Samengesteld uit (Partij, WOZObject, rolBelanghebbende,
        datumIngang)
      mim:populatie: >-
        Alle in de LV-WOZ geregistreerde belanghebbende-relaties:
        eigenaars en gebruikers van WOZ-objecten, inclusief
        historische rollen.
    comments:
      - >-
        Belanghebbende is de fiscale tegenpartij die de
        WOZ-beschikking ontvangt en aanslagontvanger is voor afgeleide
        heffingen. De relatie kan afwijken van de BRK-tenaamstelling
        (juridisch eigenaar uit het Kadaster) bij erfpacht of opstal,
        en van de BAG-bewoner (feitelijk gebruiker uit BRP) die niet
        altijd fiscaal-gebruiker is. GBO gebruikt één relatie met een
        rol-aanduiding (Eigenaar, Gebruiker, EigenaarEnGebruiker), in
        plaats van twee afzonderlijke velden op het WOZ-object zoals
        in HC-WOZ.
    unique_keys:
      samengesteldeAanduiding:
        unique_key_slots: [isPartij, vanWOZObject, rolBelanghebbende, datumIngang]
        description: >-
          MIM unieke aanduiding; samengesteld uit (Partij, WOZObject,
          rolBelanghebbende, datumIngang).
    attributes:
      rolBelanghebbende:
        range: RolBelanghebbende
        required: true
        description: >-
          Hoedanigheid van de belanghebbende ten aanzien van het
          WOZ-object.
        annotations:
          mim:authentiek: Authentiek
          mim:indicatieMaterieleHistorie: true
          mim:indicatieFormeleHistorie: true
          mim:herkomst: LV-WOZ-catalogus
        comments:
          - Eigenaar, Gebruiker, EigenaarEnGebruiker.
      aandeel:
        range: Breuk
        description: >-
          Het breukdeel waarmee de partij in de rol deelneemt.
        annotations:
          mim:authentiek: Authentiek
          mim:indicatieMaterieleHistorie: true
          mim:indicatieFormeleHistorie: true
          mim:herkomst: LV-WOZ-catalogus
        comments:
          - Analoog aan Tenaamstelling.aandeel.
      datumIngang:
        range: Datum
        required: true
        description: Datum waarop de rol is ingegaan.
        annotations:
          mim:authentiek: Authentiek
          mim:indicatieMaterieleHistorie: true
          mim:indicatieFormeleHistorie: true
          mim:herkomst: LV-WOZ-catalogus
      datumEinde:
        range: Datum
        description: Datum waarop de rol is geëindigd.
        annotations:
          mim:authentiek: Authentiek
          mim:indicatieMaterieleHistorie: true
          mim:indicatieFormeleHistorie: true
          mim:herkomst: LV-WOZ-catalogus
        comments:
          - Leeg betekent lopend.
      vanWOZObject:
        range: WOZObject
        required: true
        description: WOZ-object waarop de rol betrekking heeft.
        annotations:
          mim:relatienaam: van
          mim:authentiek: Authentiek
          mim:indicatieMaterieleHistorie: true
          mim:indicatieFormeleHistorie: true
          mim:kardinaliteit: "* -> 1"
      isPartij:
        range: Partij
        required: true
        description: >-
          Partij die de rol vervult; direct op Partij, niet via
          Tenaamstelling. Geldt ook voor de gebruiker zonder
          kadastraal recht.
        annotations:
          mim:relatienaam: is
          mim:authentiek: Authentiek
          mim:indicatieMaterieleHistorie: true
          mim:indicatieFormeleHistorie: true
          mim:kardinaliteit: "* -> 1"
        comments:
          - Zie hoofdmodel (Partij-supertype).

  WOZDeelobject:
    description: >-
      Een afzonderlijk gewaardeerd onderdeel binnen een WOZ-object,
      dat een eigen gebruik of eigen waardering kent ten opzichte van
      het samengestelde hoofdobject.
    exact_mappings:
      - gbobegrip:WOZDeelobject
    annotations:
      mim:herkomst: WOZ
      mim:herkomstDefinitie: >-
        Uitvoeringsregeling instructie waardebepaling Wet WOZ en de
        Waarderingsinstructie van de Waarderingskamer.
      mim:datumOpname: "2026-04-28"
      mim:uniekeAanduiding: deelobjectnummer binnen WOZObject
      mim:populatie: >-
        Alle in de LV-WOZ via StUF-WOZ geregistreerde deelobjecten
        binnen WOZ-objecten met gedifferentieerde waardering.
    comments:
      - >-
        Deelobjecten komen voor bij gemengd gebruik of
        gedifferentieerde waardering binnen één fiscale eenheid,
        bijvoorbeeld wonen en bedrijf in één pand. Deelobjecten zijn
        niet in scope van HC-WOZ v1.0; alleen via StUF-WOZ
        beschikbaar. In dit deelmodel staat de klasse opgenomen voor
        bron-compatibiliteit; verdere attribuut-uitwerking volgt bij
        een concrete use-case.
      - >-
        De unieke aanduiding (deelobjectnummer binnen WOZObject) is in
        LinkML niet uitdrukbaar: deelobjectnummer is alleen uniek
        binnen het omvattende WOZ-object en de relatie naar WOZObject
        is inkomend (WOZObject.bevat); zie annotatie
        mim:uniekeAanduiding.
    attributes:
      deelobjectnummer:
        range: Numeriek
        required: true
        description: >-
          Volgnummer van het deelobject binnen het WOZ-object.
        annotations:
          mim:authentiek: Basisgegeven
          mim:indicatieMaterieleHistorie: false
          mim:indicatieFormeleHistorie: false
          mim:herkomst: LV-WOZ (StUF-WOZ)
      omschrijving:
        range: Tekst
        description: Korte beschrijving van het deelobject.
        annotations:
          mim:authentiek: Basisgegeven
          mim:indicatieMaterieleHistorie: false
          mim:indicatieFormeleHistorie: false
          mim:herkomst: LV-WOZ (StUF-WOZ)
      kentWOZWaarde:
        range: WOZWaarde
        multivalued: true
        description: >-
          Waarden die specifiek aan het deelobject worden toegekend.
        annotations:
          mim:relatienaam: kent
          mim:authentiek: Basisgegeven
          mim:indicatieMaterieleHistorie: false
          mim:indicatieFormeleHistorie: false
          mim:kardinaliteit: "1 -> 0..*"

  WOZObject:
    mixins:
      - Voorkomen
    description: >-
      De fiscale eenheid van onroerende zaak waarop de Wet waardering
      onroerende zaken van toepassing is: het kleinste samengestelde
      geheel dat als één eenheid wordt gewaardeerd voor de
      onroerendezaakbelasting en andere op de WOZ-waarde gebaseerde
      heffingen.
    exact_mappings:
      - gbobegrip:WOZObject
    annotations:
      mim:herkomst: WOZ
      mim:herkomstDefinitie: >-
        Wet WOZ art. 16 (object-afbakening), Uitvoeringsbesluit Wet
        WOZ en de LV-WOZ-catalogus.
      mim:datumOpname: "2026-04-28"
      mim:uniekeAanduiding: >-
        aanduiding (gestandaardiseerde gemeentecode + wozObjectnummer)
      mim:populatie: >-
        Alle in Nederland door gemeenten of belastingsamenwerkingen in
        de Landelijke Voorziening WOZ geregistreerde WOZ-objecten,
        inclusief actuele en historische objecten.
    comments:
      - >-
        WOZ-object is een derde werkelijkheid naast de juridische
        (BRK-perceel of appartementsrecht) en de fysieke (BAG-pand of
        verblijfsobject) werkelijkheid. Een WOZ-object kan uit
        meerdere percelen en/of meerdere adresseerbare objecten zijn
        samengesteld, bijvoorbeeld kantoor met parkeerplaats, of juist
        uit een deel daarvan. Het wozObjectnummer is niet uniek tussen
        gemeenten; aanduiding (gestandaardiseerde gemeentecode plus
        objectnummer) of de combinatie met verantwoordelijkeGemeente
        levert de stabiele globale aanduiding.
      - >-
        Draagt het Voorkomen-mixin (bitemporeel patroon; zie
        hoofdmodel, sectie Patronen).
    attributes:
      wozObjectnummer:
        range: Numeriek
        required: true
        description: WOZ-eigen objectnummer binnen een gemeente.
        annotations:
          mim:authentiek: Authentiek
          mim:indicatieMaterieleHistorie: true
          mim:indicatieFormeleHistorie: true
          mim:herkomst: LV-WOZ-catalogus
        comments:
          - Niet uniek tussen gemeenten.
      aanduiding:
        identifier: true
        required: true
        range: ObjectAanduiding
        description: >-
          Gestandaardiseerde aanduiding bestaande uit gemeentecode en
          objectnummer.
        annotations:
          mim:authentiek: Authentiek
          mim:indicatieMaterieleHistorie: true
          mim:indicatieFormeleHistorie: true
          mim:herkomst: LV-WOZ-catalogus
        comments:
          - HC-conform; stabiele globale aanduiding.
      verantwoordelijkeGemeente:
        range: CodelijstLT33
        required: true
        description: >-
          Gemeente die verantwoordelijk is voor de waardering.
        annotations:
          mim:authentiek: Authentiek
          mim:indicatieMaterieleHistorie: true
          mim:indicatieFormeleHistorie: true
          mim:herkomst: LV-WOZ-catalogus
        comments:
          - >-
            Essentieel wegens niet-uniciteit wozObjectnummer over
            gemeenten.
      grondoppervlakte:
        range: Numeriek
        description: >-
          Oppervlakte van de bij het object behorende grond in m².
        annotations:
          mim:authentiek: Basisgegeven
          mim:indicatieMaterieleHistorie: true
          mim:indicatieFormeleHistorie: true
          mim:herkomst: LV-WOZ-catalogus
      gebruikscode:
        range: CodelijstWOZ
        description: Type gebruik van het object.
        annotations:
          mim:authentiek: Basisgegeven
          mim:indicatieMaterieleHistorie: true
          mim:indicatieFormeleHistorie: true
          mim:herkomst: LV-WOZ-catalogus
        comments:
          - Woning, winkel, kantoor en dergelijke.
      statusWOZObject:
        range: StatusWOZObject
        required: true
        description: Levenscyclus-status van het WOZ-object.
        annotations:
          mim:authentiek: Basisgegeven
          mim:indicatieMaterieleHistorie: true
          mim:indicatieFormeleHistorie: true
          mim:herkomst: LV-WOZ-catalogus
        comments:
          - Actief, VervallenVoorWOZ.
      kentWOZWaarde:
        range: WOZWaarde
        required: true
        multivalued: true
        description: >-
          Vastgestelde waarden door de tijd; één per
          peildatum-instantie.
        annotations:
          mim:relatienaam: kent
          mim:authentiek: Authentiek
          mim:indicatieMaterieleHistorie: true
          mim:indicatieFormeleHistorie: true
          mim:kardinaliteit: "1 -> 1..*"
      bevat:
        range: WOZDeelobject
        multivalued: true
        description: >-
          Afzonderlijk gewaardeerde onderdelen binnen het hoofdobject.
        annotations:
          mim:authentiek: Basisgegeven
          mim:indicatieMaterieleHistorie: true
          mim:indicatieFormeleHistorie: true
          mim:kardinaliteit: "1 -> 0..*"
      refereert:
        range: AdresseerbaarObject
        required: true
        multivalued: true
        description: >-
          Eén of meer BAG-adresseerbare objecten die samen het
          WOZ-object vormen.
        annotations:
          mim:authentiek: Basisgegeven
          mim:indicatieMaterieleHistorie: true
          mim:indicatieFormeleHistorie: true
          mim:kardinaliteit: "1 -> 1..*"
        comments:
          - Zie deelmodel Adressen en gebouwen.
      ligtOp:
        range: Perceel
        required: true
        multivalued: true
        description: >-
          Eén of meer BRK-percelen waarop de fiscale eenheid ligt.
        annotations:
          mim:authentiek: Basisgegeven
          mim:indicatieMaterieleHistorie: true
          mim:indicatieFormeleHistorie: true
          mim:kardinaliteit: "0..* -> 1..*"
        comments:
          - Zie deelmodel Onroerende zaken.

  WOZWaarde:
    aliases: ["Waarde"]
    description: >-
      De op grond van de Wet waardering onroerende zaken vastgestelde
      waarde van een WOZ-object op een waardepeildatum, voor een
      aaneengesloten periode van geldigheid, vastgelegd in een
      WOZ-beschikking.
    exact_mappings:
      - gbobegrip:WOZWaarde
    annotations:
      mim:herkomst: WOZ
      mim:herkomstDefinitie: >-
        Wet WOZ art. 17 en 18 (waardebepaling), art. 22 (beschikking),
        de Uitvoeringsregeling instructie waardebepaling Wet WOZ en de
        LV-WOZ-catalogus.
      mim:datumOpname: "2026-04-28"
      mim:uniekeAanduiding: Samengesteld uit (WOZObject, waardepeildatum)
      mim:populatie: >-
        Alle voor WOZ-objecten in Nederland vastgestelde waarden:
        concept, voorlopig en definitief, inclusief bezwaar- en
        beroep-correcties.
    comments:
      - >-
        WOZ-waarde is een onveranderlijke feitstelling per peildatum:
        gegeven een waardepeildatum en een geldigheidsperiode geldt
        één vastgestelde waarde. Wijziging van die waarde,
        bijvoorbeeld na bezwaar of beroep, leidt tot een nieuwe
        WOZ-waarde, niet tot aanpassing van de bestaande. Eén
        WOZ-object kent door de tijd meerdere WOZ-waarden; historie
        staat centraal. De keten beschikkingsStatussen[]
        (ConceptBeschikking, DefinitieveBeschikking, Bezwaar, Beroep,
        HogerBeroep, Onherroepelijk) legt het procesverloop per
        WOZ-waarde vast.
      - >-
        Op WOZ-waarde wordt geen historie binnen één registratie
        bijgehouden: het tijdsverloop ontstaat door opvolgende
        beschikkingen (nieuwe WOZ-waarden) en via de
        beschikkingsStatussen[]-keten.
      - >-
        WOZWaarde kent geen eigen uitgaande relaties; de relaties zijn
        inkomend vanuit WOZObject.kent en WOZDeelobject.kent.
      - >-
        Alias Waarde is de HC-WOZ-naam zonder WOZ-prefix.
      - >-
        De unieke aanduiding (samengesteld uit WOZObject en
        waardepeildatum) is in LinkML niet als unique_keys
        uitdrukbaar: de relatie naar WOZObject is inkomend; zie
        annotatie mim:uniekeAanduiding.
    attributes:
      vastgesteldeWaarde:
        range: Bedrag
        required: true
        description: >-
          De vastgestelde waarde van het WOZ-object op de peildatum.
        annotations:
          mim:authentiek: Authentiek
          mim:indicatieMaterieleHistorie: false
          mim:indicatieFormeleHistorie: false
          mim:herkomst: LV-WOZ-catalogus
      waardepeildatum:
        range: Datum
        required: true
        description: Datum waarnaar de waarde is bepaald.
        annotations:
          mim:authentiek: Authentiek
          mim:indicatieMaterieleHistorie: false
          mim:indicatieFormeleHistorie: false
          mim:herkomst: LV-WOZ-catalogus
        comments:
          - Typisch 1 januari van het voorgaande jaar.
      ingangsdatum:
        range: Datum
        required: true
        description: Datum vanaf wanneer de waarde geldigheid heeft.
        annotations:
          mim:authentiek: Authentiek
          mim:indicatieMaterieleHistorie: false
          mim:indicatieFormeleHistorie: false
          mim:herkomst: LV-WOZ-catalogus
        comments:
          - Materiële geldigheid.
      einddatum:
        range: Datum
        description: Datum waarop de waarde vervalt.
        annotations:
          mim:authentiek: Basisgegeven
          mim:indicatieMaterieleHistorie: false
          mim:indicatieFormeleHistorie: false
          mim:herkomst: LV-WOZ-catalogus
      beschikkingsnummer:
        range: Identificatie
        description: Identificatie van de WOZ-beschikking.
        annotations:
          mim:authentiek: Authentiek
          mim:indicatieMaterieleHistorie: false
          mim:indicatieFormeleHistorie: false
          mim:herkomst: LV-WOZ-catalogus
      statusWOZWaarde:
        range: StatusWOZWaarde
        required: true
        description: Vaststellingsstatus van de waarde.
        annotations:
          mim:authentiek: Basisgegeven
          mim:indicatieMaterieleHistorie: false
          mim:indicatieFormeleHistorie: false
          mim:herkomst: LV-WOZ-catalogus
        comments:
          - DefinitiefVastgesteld, VoorlopigVastgesteld, Vervallen.
      beschikkingsStatussen:
        range: BeschikkingStatus
        required: true
        multivalued: true
        description: >-
          Chronologische statussen die de beschikking heeft
          doorlopen.
        annotations:
          mim:authentiek: Basisgegeven
          mim:indicatieMaterieleHistorie: false
          mim:indicatieFormeleHistorie: false
          mim:herkomst: LV-WOZ-catalogus
        comments:
          - HC-conforme rijke modellering.
      indicatieBezwaarBeroep:
        range: Indicatie
        required: true
        description: >-
          Geeft aan of een bezwaar of beroep loopt tegen de
          beschikking.
        annotations:
          mim:authentiek: Basisgegeven
          mim:indicatieMaterieleHistorie: false
          mim:indicatieFormeleHistorie: false
          mim:herkomst: LV-WOZ-catalogus

enums:

  BeschikkingStatus:
    description: >-
      Chronologische statussen die een WOZ-beschikking doorloopt vanaf
      concept tot onherroepelijk worden.
    exact_mappings:
      - gbobegrip:BeschikkingStatus
    annotations:
      mim:herkomst: WOZ
      mim:herkomstDefinitie: >-
        Wet WOZ art. 22 en art. 24 e.v. (beschikking en bekendmaking),
        Algemene wet bestuursrecht hoofdstuk 6 en 7 (bezwaar en
        beroep) en de LV-WOZ-catalogus.
      mim:datumOpname: "2026-04-28"
    comments:
      - >-
        De keten legt het procesverloop per WOZ-waarde vast, zodat
        naast de actuele status ook eerdere stadia traceerbaar
        blijven. Een nieuwe beschikkingsstatus voegt een rij toe aan
        de keten en vervangt geen eerdere waarde.
    permissible_values:
      Beroep:
        description: >-
          Tegen de beschikking is beroep ingesteld bij de rechter.
        comments:
          - >-
            Volgt op een afgewezen of gedeeltelijk afgewezen bezwaar.
      Bezwaar:
        description: >-
          Tegen de beschikking is bezwaar gemaakt bij de gemeente.
        comments:
          - Eerste stap van het rechtsmiddelentraject.
      ConceptBeschikking:
        description: >-
          De beschikking is in voorbereiding en nog niet aan de
          belanghebbende bekendgemaakt.
        comments:
          - Interne werkstatus voor de gemeente.
      DefinitieveBeschikking:
        description: >-
          De beschikking is vastgesteld en aan de belanghebbende
          bekendgemaakt.
        comments:
          - >-
            Reguliere eindstatus zolang geen rechtsmiddel wordt
            ingezet.
      HogerBeroep:
        description: >-
          Tegen de uitspraak in beroep is hoger beroep ingesteld.
        comments:
          - Behandeling door het gerechtshof.
      Onherroepelijk:
        description: >-
          De beschikking staat juridisch vast en is niet meer voor
          rechtsmiddelen vatbaar.
        comments:
          - >-
            Bezwaar- en beroepstermijn is verstreken of alle
            rechtsmiddelen zijn uitgeput.

  RolBelanghebbende:
    description: >-
      Hoedanigheid waarin een partij voor de Wet WOZ bij een
      WOZ-object betrokken is.
    exact_mappings:
      - gbobegrip:RolBelanghebbende
    annotations:
      mim:herkomst: WOZ
      mim:herkomstDefinitie: >-
        Wet WOZ art. 24 (bekendmaking beschikking aan belanghebbenden)
        en de LV-WOZ-catalogus.
      mim:datumOpname: "2026-04-28"
    comments:
      - >-
        GBO gebruikt één rol-aanduiding op de Belanghebbende-relatie,
        in plaats van afzonderlijke eigenaars- en gebruikersrelaties
        op het WOZ-object. Eén partij kan tegelijk eigenaar en
        gebruiker zijn; dat wordt met de gecombineerde waarde
        uitgedrukt.
    permissible_values:
      Eigenaar:
        description: >-
          De partij is voor de Wet WOZ eigenaar van het WOZ-object.
        comments:
          - >-
            Ontvangt de eigenaarsbeschikking; basis voor
            onroerendezaakbelasting eigenaarsdeel.
      EigenaarEnGebruiker:
        description: >-
          De partij is voor de Wet WOZ zowel eigenaar als gebruiker
          van het WOZ-object.
        comments:
          - Typisch bij eigenaar-bewoner van een woning.
      Gebruiker:
        description: >-
          De partij is voor de Wet WOZ gebruiker van het WOZ-object.
        comments:
          - >-
            Ontvangt de gebruikersbeschikking; relevant voor
            niet-woningen.

  StatusWOZObject:
    description: >-
      Levenscyclus-status van een WOZ-object binnen de Landelijke
      Voorziening WOZ.
    exact_mappings:
      - gbobegrip:StatusWOZObject
    annotations:
      mim:herkomst: WOZ
      mim:herkomstDefinitie: >-
        LV-WOZ-catalogus en de Waarderingsinstructie van de
        Waarderingskamer.
      mim:datumOpname: "2026-04-28"
    comments:
      - >-
        De status geeft aan of het object nog meedoet in de
        WOZ-administratie of buiten gebruik is gesteld voor de WOZ.
        Een vervallen WOZ-object blijft in de historie aanwezig voor
        terugkijk-bevragingen.
    permissible_values:
      Actief:
        description: >-
          Het WOZ-object is actueel in gebruik voor de waardering.
        comments:
          - Reguliere status voor een lopend object.
      VervallenVoorWOZ:
        description: >-
          Het WOZ-object is voor de WOZ niet langer in gebruik.
        comments:
          - >-
            Bijvoorbeeld na samenvoeging, splitsing of sloop; historie
            blijft beschikbaar.

  StatusWOZWaarde:
    description: >-
      Vaststellingsstatus van een WOZ-waarde voor een waardepeildatum.
    exact_mappings:
      - gbobegrip:StatusWOZWaarde
    annotations:
      mim:herkomst: WOZ
      mim:herkomstDefinitie: >-
        Wet WOZ art. 22 (beschikking), de Uitvoeringsregeling
        instructie waardebepaling Wet WOZ en de LV-WOZ-catalogus.
      mim:datumOpname: "2026-04-28"
    comments:
      - >-
        De status onderscheidt voorlopige van definitief vastgestelde
        waarden en markeert vervallen waarden, zodat afnemers weten
        welke waarde rechtsgeldig is. Een gewijzigde waarde na bezwaar
        of beroep leidt tot een nieuwe WOZ-waarde met een eigen
        status.
    permissible_values:
      DefinitiefVastgesteld:
        description: >-
          De waarde is definitief vastgesteld en is rechtsgeldig.
        comments:
          - >-
            Reguliere status na bekendmaking van de definitieve
            beschikking.
      Vervallen:
        description: De waarde is komen te vervallen.
        comments:
          - >-
            Bijvoorbeeld door correctie via een nieuwe beschikking of
            na herziening na bezwaar of beroep.
      VoorlopigVastgesteld:
        description: >-
          De waarde is voorlopig vastgesteld in afwachting van
          definitieve vaststelling.
        comments:
          - >-
            Wordt gebruikt voorafgaand aan de definitieve beschikking.

types:

  # --- «Codelijst»-typen: deelmodel-specifiek ---------------------------------
  # De WOZ-gebruikscodes worden vastgesteld door de Waarderingskamer en
  # zijn onderdeel van de LV-WOZ-catalogus (gegevensbeschrijving en
  # stuf-/REST-koppelvlak). Mutatieritme: sporadisch.
  # LT 33 Gemeenten (WOZObject.verantwoordelijkeGemeente) is
  # stelselbreed en staat in datatypes.yaml.

  CodelijstWOZ:
    typeof: string
    aliases: ["Codelijst~WOZ"]
    description: >-
      WOZ Gebruikscode conform de LV-WOZ-catalogus: functioneel
      gebruik van het WOZ-object, bijvoorbeeld woning, kantoor,
      agrarisch object. Vastgesteld door de Waarderingskamer.
    see_also:
      - https://www.waarderingskamer.nl/voor-gemeenten/gegevensbeheer
    annotations:
      mim:stereotype: Codelijst
