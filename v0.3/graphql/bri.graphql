  """Datum van authentieke vaststelling."""
  vaststellingsdatum: Datum!
  """IH-aangifte of loonaangifte."""
  vaststellingsbron: String!
  """De natuurlijk persoon op wie het authentieke inkomen is gegrondvest."""
  gegrondvestOp: NatuurlijkPersoon!
}

"""De administratieve relatie tussen een inhoudingsplichtige en een natuurlijk persoon op grond waarvan over een doorlopende periode loon wordt uitbetaald, sociale-zekerheids-premies worden ingehouden en aangifte loonheffingen wordt gedaan."""
type Inkomstenverhouding {
  """Uniek nummer voor de IKV."""
  nummerInkomstenverhouding: String!
