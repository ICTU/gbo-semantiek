  """Reguliere aangifte of correctie op een eerdere."""
  isCorrectieAangifte: Indicatie!
  """De onderneming (inhoudingsplichtige) die de loonaangifte heeft ingediend. (Sleutel-referentie naar MaatschappelijkeActiviteit.)"""
  ingediendDoor: UUID!
}

