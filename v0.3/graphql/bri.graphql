  """De natuurlijk persoon (werknemer) in de IKV."""
  tussenPersoon: NatuurlijkPersoon!
  """De onderneming (werkgever) in de IKV. (Sleutel-referentie naar MaatschappelijkeActiviteit.)"""
  tussenWerkgever: UUID!
}

"""De aggregatie van loongegevens van een werknemer binnen een aangifte loonheffingen over een aangifteperiode, opgebouwd uit een of meer inkomstenperioden en alle daarop horende loonbestanddelen."""
type Inkomstenopgave {
  """Bijvoorbeeld 2026-M01, 2026-W04."""
  aangifteperiode: String!
  """Bruto loon in de aangifteperiode."""
  loonHuidigPeriodeBedrag: Bedrag
  """Loon voor sociale verzekeringen."""
  loonSvBedrag: Bedrag
  """Ingehouden loonheffing."""
  ingehoudenLoonheffing: Bedrag
  """De inkomstenverhouding waarbinnen deze inkomstenopgave valt."""
  binnenInkomstenverhouding: Inkomstenverhouding!
}

"""Een tijdvak binnen een inkomstenopgave waarin specifieke loongegevens gelden, zoals een week, een vier-weken-periode of een maand, met daarbinnen gewerkte uren, loonbestanddelen en eventuele afwijkingen."""
type Inkomstenperiode {
  """Startdatum van de periode."""
  begindatum: Datum!
  """Einddatum van de periode."""
  einddatum: Datum!
  """Aantal SV-dagen."""
  aantalSvDagen: Int
  """Contracturen in de periode."""
  aantalContractUren: Float
  """De inkomstenopgave waarbinnen deze inkomstenperiode valt."""
  binnenInkomstenopgave: Inkomstenopgave!
}

"""Een afzonderlijke component van het loon binnen een inkomstenopgave, gecodeerd volgens de soort-inkomen-codelijst en met een eigen bedrag, herkomst en fiscale behandeling."""
type LoonBestanddeel {
  """Aanduiding van het loonbestanddeel-type."""
  codeSoortInkomen: CodeSoortInkomen!
  """Bedrag van het loonbestanddeel."""
  bedrag: Bedrag!
  """Vrije omschrijving."""
  omschrijving: String
  """Valuta-code."""
  valuta: String!
  """De inkomstenopgave waarvan dit loonbestanddeel onderdeel is."""
  onderdeelVan: Inkomstenopgave!
}

"""De periodieke aangifte loonheffingen die een inhoudingsplichtige op grond van de Wet LB 1964 indient bij de Belastingdienst over een aangifteperiode, met alle inkomsten-verhoudingen en de daaruit voortvloeiende loonbestanddelen en in te houden bedragen."""
type LoonAangifte {
  """Aangifteperiode-aanduiding."""
