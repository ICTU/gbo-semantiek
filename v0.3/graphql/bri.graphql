  """Einddatum van de IKV."""
  einddatumIkv: Datum
  """Aard van de arbeidsverhouding."""
  codeAardArbeidsverhouding: CodeAardArbeidsverhouding!
  """Soort IKV."""
  codeSoortInkomstenverhouding: CodeSoortInkomstenverhouding!
  """Reden van einde IKV."""
