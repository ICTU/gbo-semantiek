# =============================================================================
# GBO — Datatypes en stelselbrede codelijsten
# Bron (leidend): docs/informatiemodel/gbo-kern/datatypes-en-codelijsten.md
#
# - Simpele datatypes: MIM 1.2-primitieven met hun Nederlandse alias als
#   typenaam (de alias wordt in de attribuut-tabellen van de wiki gebruikt).
# - Aanvullende datatypes: gestructureerd of domeinspecifiek.
# - «Codelijst»-typen: extern beheerde value-sets, gemodelleerd als
#   string-type met see_also naar de beheerder (geen enum: de lijst is
#   open en wordt extern onderhouden).
# - Indicatie is conform de wiki een DRIE-waardige keuzelijst
#   (Ja/Nee/Onbekend), dus een enum en geen boolean.
# =============================================================================
id: https://lod.gbo-semantiek.nl/informatiemodel/datatypes
name: gbo-datatypes
title: GBO datatypes en stelselbrede codelijsten
license: https://joinup.ec.europa.eu/collection/eupl/eupl-text-eupl-12

prefixes:
  linkml: https://w3id.org/linkml/
  gbo: https://lod.gbo-semantiek.nl/
  mim: https://lod.gbo-semantiek.nl/def/mim#
default_prefix: gbo
default_range: string

imports:
  - linkml:types

types:

  # --- Simpele datatypes (MIM 1.2-primitieven) -------------------------------

  Tekst:
    typeof: string
    description: Reeks Unicode-tekens.
    aliases: ["CharacterString"]
    annotations:
      mim:herkomst: MIM 1.2

  Tekst24:
    typeof: Tekst
    description: Reeks Unicode-tekens van maximaal 24 tekens.
    pattern: "^.{0,24}$"

  Alfanumeriek:
    typeof: Tekst
    description: >-
      Reeks tekens uit het alfabet en de cijfers, zonder leestekens.
    pattern: "^[A-Za-z0-9]*$"

  Alfanumeriek10:
    typeof: Alfanumeriek
    description: Alfanumerieke reeks van maximaal 10 tekens.
    pattern: "^[A-Za-z0-9]{0,10}$"

  AN40:
    typeof: Alfanumeriek
    description: Alfanumerieke reeks van maximaal 40 tekens.
    pattern: "^[A-Za-z0-9]{0,40}$"

  AN80:
    typeof: Alfanumeriek
    description: Alfanumerieke reeks van maximaal 80 tekens.
    pattern: "^[A-Za-z0-9]{0,80}$"

  Identificatie:
    typeof: Tekst
    description: >-
      Object- of documentidentificatie zonder vaste structuur.

  Postcode:
    typeof: Tekst
    description: >-
      Nederlandse postcode in het formaat 9999 XX (norm NEN 5825).
    pattern: "^[1-9][0-9]{3} ?[A-Z]{2}$"

  Numeriek:
    typeof: integer
    description: Geheel getal zonder eenheid.
    aliases: ["Integer"]
    annotations:
      mim:herkomst: MIM 1.2

  Numeriek8:
    typeof: Numeriek
    description: Geheel getal van maximaal 8 cijfers.

  # Vaste-lengte-varianten; als string gemodelleerd omdat voorloopnullen
  # betekenisvol zijn (vergelijk Numeriek9).
  N2:
    typeof: string
    description: Numerieke reeks van precies 2 cijfers.
    pattern: "^[0-9]{2}$"

  N4:
    typeof: string
    description: Numerieke reeks van precies 4 cijfers.
    pattern: "^[0-9]{4}$"

  N5:
    typeof: string
    description: Numerieke reeks van precies 5 cijfers.
    pattern: "^[0-9]{5}$"

  N6:
    typeof: string
    description: Numerieke reeks van precies 6 cijfers.
    pattern: "^[0-9]{6}$"

  Numeriek9:
    typeof: string
    description: >-
      Numerieke reeks van precies 9 cijfers. Als string gemodelleerd
      omdat voorloopnullen betekenisvol zijn (onder andere BSN).
    pattern: "^[0-9]{9}$"

  Numeriek12:
    typeof: string
    description: >-
      Numerieke reeks van maximaal 12 cijfers, voorloopnullen
      betekenisvol.
    pattern: "^[0-9]{1,12}$"

  Decimaal:
    typeof: float
    description: >-
      Decimaal getal zonder eenheid. Voor bedragen wordt het
      aanvullende datatype Bedrag gebruikt, niet Decimaal.
    aliases: ["Real"]
    annotations:
      mim:herkomst: MIM 1.2

  Datum:
    typeof: date
    description: >-
      Kalenderdatum in ISO 8601, precisie tot op de dag (jjjj-mm-dd).
      Gebruikt voor de materiële tijdlijn.
    aliases: ["Date"]
    annotations:
      mim:herkomst: MIM 1.2 / ISO 8601

  DatumTijd:
    typeof: datetime
    description: >-
      Datum met tijdstip in ISO 8601, precisie tot op de seconde.
      Gebruikt voor de formele tijdlijn (registratiemoment).
    aliases: ["DateTime"]
    annotations:
      mim:herkomst: MIM 1.2 / ISO 8601

  Jaar:
    typeof: string
    uri: xsd:gYear
    description: Kalenderjaar in ISO 8601, vier cijfers (jjjj).
    aliases: ["Year"]
    pattern: "^[0-9]{4}$"

  Duur:
    typeof: string
    uri: xsd:duration
    description: >-
      Tijdsduur in ISO 8601-periode-notatie (P5Y, P3M, P7D).
    aliases: ["Duration"]

  URI:
    typeof: uri
    description: >-
      Uniform Resource Identifier conform RFC 3986. Gebruikt voor
      begrip-verwijzingen naar NL-SBB en andere semantische ankers.
    annotations:
      mim:herkomst: MIM 1.2 / RFC 3986

  # --- Aanvullende datatypes --------------------------------------------------

  DatumIncompleet:
    typeof: string
    description: >-
      Datum waarin jaar, maand of dag elk afzonderlijk onbekend kan
      zijn. Formaten: jjjj, jjjj-mm of jjjj-mm-dd; nullen op de
      onbekende positie.
    pattern: "^[0-9]{4}(-[0-9]{2}(-[0-9]{2})?)?$"
    annotations:
      mim:herkomst: Logisch Ontwerp BRP
    comments:
      - >-
        BRP-conventie voor onder andere geboortedatum en datum
        overlijden. MIM kent geen onvolledige datum als primitief; een
        volledige datum wordt als gewone Datum gerepresenteerd.

  NEN3610ID:
    typeof: string
    description: >-
      Landelijke objectidentificatie voor stelselobjecten, opgebouwd
      uit namespace, lokaalID en versie (NEN 3610).
    see_also:
      - https://docs.geostandaarden.nl/nen3610/
    comments:
      - >-
        Gebruikt voor BAG- en BRK-objecten; garandeert uniciteit over
        registers heen.

  UUID:
    typeof: string
    description: >-
      Universally Unique Identifier conform RFC 4122 (128 bits,
      hexadecimaal genoteerd). Interne GBO-identifier voor objecten
      zonder externe authentieke identifier.
    pattern: "^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$"

  # Geometrie-typen: in de wiki gestructureerde datatypes (ISO 19107 /
  # NEN 3610); hier voorlopig als scalaire WKT-string gemodelleerd.
  Geometrie:
    typeof: string
    description: >-
      Ruimtelijke objectplaatsing; abstract supertype van Punt, Vlak en
      Lijn. Default-coördinatenstelsel EPSG:28992 (RD-New) voor
      binnenlandse objecten, WGS84 (EPSG:4326) bij internationale
      uitwisseling.
    see_also:
      - https://docs.geostandaarden.nl/nen3610/
    annotations:
      mim:equivalent: GM_Object (ISO 19107)

  Punt:
    typeof: Geometrie
    description: Geometrie als één coördinaat (x, y, optioneel z).
    annotations:
      mim:equivalent: GM_Point (ISO 19107)

  Vlak:
    typeof: Geometrie
    description: >-
      Geometrie als gesloten polygoon, eventueel met binnenringen voor
      uitsparingen.
    annotations:
      mim:equivalent: GM_Surface (ISO 19107)

  Lijn:
    typeof: Geometrie
    description: Geometrie als reeks aaneengesloten lijnsegmenten.
    annotations:
      mim:equivalent: GM_Curve (ISO 19107)

  Breuk:
    typeof: string
    description: >-
      Rationaal getal als teller/noemer (1/2, 1/3), zodat mede-eigendom
      exact zonder afrondingsverlies wordt vastgelegd; gebruikt voor
      Tenaamstelling.aandeel.
    pattern: "^[0-9]+/[0-9]+$"
    annotations:
      mim:herkomst: GBO

  ObjectAanduiding:
    typeof: string
    description: >-
      Gestandaardiseerde samenstelling van gemeentecode en objectnummer
      als één string; maakt een WOZ-object uniek identificeerbaar
      buiten de eigen gemeentecontext.
    annotations:
      mim:herkomst: Wet WOZ / Waarderingskamer

  # --- «Codelijst»-typen: stelselbreed ---------------------------------------
  # Extern beheerde, open value-sets; daarom string-typen en geen enums.
  # Dit zijn de zes stelselbrede codelijsten uit
  # datatypes-en-codelijsten.md, plus ISO 4217 (valuta, via Bedrag);
  # deelmodel-specifieke codelijsten staan in het betreffende
  # deelmodel-bestand.

  CodelijstISO3166:
    typeof: string
    aliases: ["Codelijst~ISO3166"]
    description: >-
      Landcode conform ISO 3166-1 alpha-2. Stelselbreed voor land- en
      nationaliteit-typering; cross-walks naar BRP-LT 32
      (nationaliteit) en BRP-LT 34 (landen) staan in de documentatie.
    pattern: "^[A-Z]{2}$"
    see_also:
      - https://www.iso.org/iso-3166-country-codes.html
    annotations:
      mim:stereotype: Codelijst

  CodelijstLT33:
    typeof: string
    aliases: ["Codelijst~LT33"]
    description: >-
      Gemeentecode conform BRP-Landelijke Tabel 33 Gemeenten. Formeel
      een BRP-codelijst, feitelijk de stelselbrede gemeente-codering
      inclusief historische gemeenten met einddatum.
    pattern: "^[0-9]{4}$"
    see_also:
      - https://publicaties.rvig.nl/home
    annotations:
      mim:stereotype: Codelijst

  CodelijstBRP:
    typeof: string
    aliases: ["Codelijst~BRP"]
    description: >-
      Waarde uit een BRP-Landelijke Tabel die in de documentatie niet
      nader is gespecificeerd.
    see_also:
      - https://publicaties.rvig.nl/home
    annotations:
      mim:stereotype: Codelijst

  CodelijstCBSSBI:
    typeof: string
    aliases: ["Codelijst~CBS_SBI"]
    description: >-
      Bedrijfsindeling conform de CBS Standaard Bedrijfsindeling
      (SBI 2008 / 2025). Stelselbreed; primair in Bedrijven en
      instellingen. Vanwege de SBI-herziening is een versie-attribuut
      naast de code verplicht.
    see_also:
      - https://www.cbs.nl/nl-nl/onze-diensten/methoden/classificaties/activiteiten/standaard-bedrijfsindeling--sbi--
    annotations:
      mim:stereotype: Codelijst

  CodelijstCBSWijkBuurt:
    typeof: string
    aliases: ["Codelijst~CBS_WijkBuurt"]
    description: >-
      Wijk- en buurtcodes conform de CBS Wijk- en Buurtkaart
      (jaarlijkse uitgave).
    see_also:
      - https://www.cbs.nl/nl-nl/dossier/nederland-regionaal/geografische-data
    annotations:
      mim:stereotype: Codelijst

  CodelijstKadaster:
    typeof: string
    aliases: ["Codelijst~Kadaster"]
    description: >-
      Kadastrale aanduiding (kadastrale gemeente / sectie /
      perceelnummer); de lijst kadastrale gemeenten is onderdeel van de
      BRK en wijzigt mee met gemeentelijke herindelingen.
    see_also:
      - https://www.kadaster.nl/zakelijk/registraties/basisregistraties/brk
    annotations:
      mim:stereotype: Codelijst

  CodelijstTOOI:
    typeof: string
    aliases: ["Codelijst~TOOI"]
    description: >-
      TOOI-waardelijsten uit het Register van Overheidsorganisaties
      (KOOP/Logius); gebruikt voor onder andere
      Overheidsinstelling.bevoegdGezagCode.
    see_also:
      - https://standaarden.overheid.nl/tooi
    annotations:
      mim:stereotype: Codelijst

  CodelijstISO4217:
    typeof: string
    aliases: ["Codelijst~ISO4217"]
    description: >-
      Valuta-aanduiding conform ISO 4217 (drieletterige code, EUR).
    pattern: "^[A-Z]{3}$"
    see_also:
      - https://www.iso.org/iso-4217-currency-codes.html
    annotations:
      mim:stereotype: Codelijst

classes:

  # Gestructureerd datatype (MIM «DataType»): als klasse gemodelleerd
  # omdat het meerdere velden draagt.
  Bedrag:
    description: >-
      Geldbedrag: numerieke waarde met expliciete valuta-aanduiding
      (ISO 4217). Voor binnenlandse toepassingen impliciet EUR; de
      valuta wordt expliciet bij internationale uitwisseling.
    annotations:
      mim:stereotype: DataType
      mim:herkomst: ISO 4217
    attributes:
      waarde:
        range: Decimaal
        required: true
        description: De numerieke waarde van het bedrag.
      valuta:
        range: CodelijstISO4217
        description: >-
          Valuta conform ISO 4217; bij afwezigheid geldt EUR.

enums:

  Indicatie:
    description: >-
      Logische waarde met expliciete onbekendheid. GBO hanteert als
      NL-conventie een drie-waardig type in plaats van MIM-Boolean,
      zodat onbekendheid expliciet kan worden vastgelegd.
    aliases: ["Boolean"]
    annotations:
      mim:herkomst: MIM 1.2 (Boolean) / Logisch Ontwerp BRP (waarde Onbekend)
    permissible_values:
      Ja:
        description: Waar.
      Nee:
        description: Onwaar.
      Onbekend:
        description: >-
          Onbekend; volgt de BRP-conventie voor afwezigheid en is geen
          MIM-Boolean-waarde.
