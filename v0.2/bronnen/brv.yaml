# =============================================================================
# Bron-profiel BRV — welke onderdelen van het GBO-informatiemodel de
# Basisregistratie Voertuigen (RDW) via GBO beschikbaar stelt.
#
# Dit bestand is LinkML-data conform het schema
# ../informatiemodel/linkml/bronprofiel.yaml (klasse Bronprofiel).
# Valideren:
#   linkml-validate -s ../informatiemodel/linkml/bronprofiel.yaml \
#       -C Bronprofiel brv.yaml
# Materialiseren:
#   python3 tools/genereer_bronschema.py v0.2/bronnen/brv.yaml
#
# De tenaamgestelde is een Partij uit het hoofdmodel. Partij staat niet
# in dit profiel; de relatie Voertuigtenaamstelling.tenaamgesteldeOp ->
# Partij wordt daarom een sleutel-referentie naar partijnummer (UUID).
# =============================================================================
bron: BRV
titel: Basisregistratie Voertuigen
beschrijving: >-
  Voertuigen uit de Basisregistratie Voertuigen (RDW): kerngegevens van
  het voertuig (kenteken, soort, merk, brandstof, massa, APK) en de
  tenaamstelling op een partij (eigenaar/houder).
schemabestand: ../informatiemodel/linkml/gbo.yaml

# Query-ingangen: hiervoor genereert de pipeline GraphQL Query-velden.
ingangen:
  - Voertuig

# Objecttypen die deze bron beschikbaar stelt (expliciete lijst).
objecttypen:
  - Voertuig
  - Voertuigtenaamstelling
