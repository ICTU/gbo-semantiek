# =============================================================================
# Bron-profiel HR — welke onderdelen van het GBO-informatiemodel het
# Handelsregister via GBO beschikbaar stelt.
#
# Dit bestand is LinkML-data conform het schema
# ../informatiemodel/linkml/bronprofiel.yaml (klasse Bronprofiel).
# Valideren:
#   linkml-validate -s ../informatiemodel/linkml/bronprofiel.yaml \
#       -C Bronprofiel hr.yaml
# Materialiseren:
#   python3 tools/genereer_bronschema.py v0.2/bronnen/hr.yaml
#
# Partij (supertype van NietNatuurlijkPersoon) gaat automatisch mee;
# diens relatie ingeschrevenAls -> Inschrijving valt binnen dit
# profiel en blijft dus een echte relatie. De koppeling van Vestiging
# naar de BAG loopt via het datatype-attribuut adresseerbaarObjectId
# (NEN3610ID), niet via een klasse-relatie.
# =============================================================================
bron: HR
titel: Handelsregister
beschrijving: >-
  Bedrijven en instellingen uit het Handelsregister: inschrijvingen
  met hun vestigingen, naamgevingen, activiteiten en rechtstoestand,
  de maatschappelijke activiteit (onderneming) en de
  niet-natuurlijke-persoon-hiërarchie.
schemabestand: ../informatiemodel/linkml/gbo.yaml

# Query-ingangen: hiervoor genereert de pipeline GraphQL Query-velden.
ingangen:
  - Inschrijving
  - MaatschappelijkeActiviteit
  - Vestiging

# Objecttypen die deze bron beschikbaar stelt (expliciete lijst).
objecttypen:
  - NietNatuurlijkPersoon
  - Bedrijf
  - BuitenlandseEntiteit
  - Instelling
  - MaatschappelijkeInstelling
  - Overheidsinstelling
  - OverigeNietNatuurlijkPersoon
  - MaatschappelijkeActiviteit
  - Inschrijving
  - Vestiging
  - Naamgeving
  - Rechtstoestand
  - Activiteit
