<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 740" width="1920" height="1291" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6c8ebf"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#82b366"/>
    </marker>
    <marker id="arrowGreenUp" viewBox="0 0 10 10" refX="1" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 10 0 L 0 5 L 10 10 z" fill="#82b366"/>
    </marker>
  </defs>

  <rect width="1100" height="740" fill="#ffffff"/>

  <!-- Titel -->
  <text x="550" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#222222">GBO Gegevensarchitectuur</text>
  <text x="550" y="48" text-anchor="middle" font-size="11" fill="#666666">Drie lagen: sectormodellen, kerngegevens en GBO-informatiemodel</text>

  <!-- ==================== BOVENSTE LAAG: Sectormodellen ==================== -->
  <rect x="60" y="65" width="980" height="210" rx="8" ry="8" fill="#e1d5e7" stroke="#9673a6" stroke-width="2" filter="url(#shadow)"/>
  <text x="550" y="87" text-anchor="middle" font-size="12" font-weight="bold" fill="#6c4a85">Sectormodellen</text>
  <text x="550" y="102" text-anchor="middle" font-size="9" fill="#888888">Domeinspecifieke silo's die bouwen op de kerngegevens en het GBO-informatiemodel</text>

  <!-- Silo 1: Zorgeloos Vastgoed -->
  <rect x="80" y="115" width="280" height="145" rx="6" ry="6" fill="#f0e4ee" stroke="#9673a6" stroke-width="1"/>
  <text x="220" y="135" text-anchor="middle" font-size="11" font-weight="bold" fill="#6c4a85">Zorgeloos Vastgoed</text>
  <rect x="95" y="148" width="110" height="26" rx="4" ry="4" fill="#ffffff" stroke="#9673a6" stroke-width="0.5"/>
  <text x="150" y="166" text-anchor="middle" font-size="9" fill="#333">WOZ-waarde</text>
  <rect x="215" y="148" width="130" height="26" rx="4" ry="4" fill="#ffffff" stroke="#9673a6" stroke-width="0.5"/>
  <text x="280" y="166" text-anchor="middle" font-size="9" fill="#333">Eigendomsrecht</text>
  <rect x="95" y="182" width="110" height="26" rx="4" ry="4" fill="#ffffff" stroke="#9673a6" stroke-width="0.5"/>
  <text x="150" y="200" text-anchor="middle" font-size="9" fill="#333">Hypotheek</text>
  <rect x="215" y="182" width="130" height="26" rx="4" ry="4" fill="#ffffff" stroke="#9673a6" stroke-width="0.5"/>
  <text x="280" y="200" text-anchor="middle" font-size="9" fill="#333">Taxatierapport</text>
  <rect x="95" y="216" width="250" height="26" rx="4" ry="4" fill="#ffffff" stroke="#9673a6" stroke-width="0.5"/>
  <text x="220" y="234" text-anchor="middle" font-size="9" fill="#333">Energielabel</text>

  <!-- Silo 2: Gebouwinformatie -->
  <rect x="385" y="115" width="280" height="145" rx="6" ry="6" fill="#f0e4ee" stroke="#9673a6" stroke-width="1"/>
  <text x="525" y="135" text-anchor="middle" font-size="11" font-weight="bold" fill="#6c4a85">Gebouwinformatie</text>
  <rect x="400" y="148" width="120" height="26" rx="4" ry="4" fill="#ffffff" stroke="#9673a6" stroke-width="0.5"/>
  <text x="460" y="166" text-anchor="middle" font-size="9" fill="#333">Verblijfsobject</text>
  <rect x="530" y="148" width="120" height="26" rx="4" ry="4" fill="#ffffff" stroke="#9673a6" stroke-width="0.5"/>
  <text x="590" y="166" text-anchor="middle" font-size="9" fill="#333">Gebruiksdoel</text>
  <rect x="400" y="182" width="120" height="26" rx="4" ry="4" fill="#ffffff" stroke="#9673a6" stroke-width="0.5"/>
  <text x="460" y="200" text-anchor="middle" font-size="9" fill="#333">Bouwjaar</text>
  <rect x="530" y="182" width="120" height="26" rx="4" ry="4" fill="#ffffff" stroke="#9673a6" stroke-width="0.5"/>
  <text x="590" y="200" text-anchor="middle" font-size="9" fill="#333">Oppervlakte</text>
  <rect x="400" y="216" width="250" height="26" rx="4" ry="4" fill="#ffffff" stroke="#9673a6" stroke-width="0.5"/>
  <text x="525" y="234" text-anchor="middle" font-size="9" fill="#333">Pandstatus</text>

  <!-- Silo 3: Nog te bepalen -->
  <rect x="690" y="115" width="280" height="145" rx="6" ry="6" fill="#f5f0f5" stroke="#9673a6" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="830" y="180" text-anchor="middle" font-size="11" fill="#aaa" font-style="italic">Nader te bepalen</text>
  <text x="830" y="200" text-anchor="middle" font-size="9" fill="#bbb">Volgend domein</text>

  <!-- Pijlen: Sector -> Core -->
  <line x1="220" y1="275" x2="220" y2="310" stroke="#6c8ebf" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <text x="280" y="298" text-anchor="middle" font-size="9" fill="#6c8ebf" font-style="italic">gebruikt definities uit</text>
  <line x1="525" y1="275" x2="525" y2="310" stroke="#6c8ebf" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <text x="600" y="298" text-anchor="middle" font-size="9" fill="#6c8ebf" font-style="italic">gebruikt definities uit</text>

  <!-- ==================== MIDDENLAAG: Core Data ==================== -->
  <rect x="60" y="315" width="980" height="130" rx="8" ry="8" fill="#dae8fc" stroke="#6c8ebf" stroke-width="2" filter="url(#shadow)"/>
  <text x="550" y="337" text-anchor="middle" font-size="12" font-weight="bold" fill="#2a5a8a">Core Data</text>
  <text x="550" y="352" text-anchor="middle" font-size="9" fill="#888888">Gedeelde kerngegevens uit de basisregistraties: de gemeenschappelijke taal voor alle domeinen</text>

  <rect x="85" y="365" width="140" height="55" rx="6" ry="6" fill="#c8daf0" stroke="#6c8ebf" stroke-width="1"/>
  <text x="155" y="388" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">Personen</text>
  <text x="155" y="404" text-anchor="middle" font-size="9" fill="#555">BRP</text>

  <rect x="250" y="365" width="140" height="55" rx="6" ry="6" fill="#c8daf0" stroke="#6c8ebf" stroke-width="1"/>
  <text x="320" y="388" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">Bedrijven</text>
  <text x="320" y="404" text-anchor="middle" font-size="9" fill="#555">HR</text>

  <rect x="415" y="365" width="140" height="55" rx="6" ry="6" fill="#c8daf0" stroke="#6c8ebf" stroke-width="1"/>
  <text x="485" y="388" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">Panden</text>
  <text x="485" y="404" text-anchor="middle" font-size="9" fill="#555">BAG</text>

  <rect x="580" y="365" width="140" height="55" rx="6" ry="6" fill="#c8daf0" stroke="#6c8ebf" stroke-width="1"/>
  <text x="650" y="388" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">Locaties</text>
  <text x="650" y="404" text-anchor="middle" font-size="9" fill="#555">BGT, BRK</text>

  <rect x="745" y="365" width="140" height="55" rx="6" ry="6" fill="#c8daf0" stroke="#6c8ebf" stroke-width="1"/>
  <text x="815" y="388" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">WOZ</text>
  <text x="815" y="404" text-anchor="middle" font-size="9" fill="#555">Waardering</text>

  <!-- Pijlen: GBO -> Core -->
  <line x1="330" y1="490" x2="330" y2="450" stroke="#6c8ebf" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <text x="395" y="475" text-anchor="middle" font-size="9" fill="#6c8ebf" font-style="italic">ontsluit gegevens uit</text>
  <line x1="770" y1="490" x2="770" y2="450" stroke="#6c8ebf" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <text x="835" y="475" text-anchor="middle" font-size="9" fill="#6c8ebf" font-style="italic">ontsluit gegevens uit</text>

  <!-- ==================== ONDERSTE LAAG: GBO-informatiemodel ==================== -->
  <rect x="60" y="490" width="980" height="140" rx="8" ry="8" fill="#d5e8d4" stroke="#82b366" stroke-width="2" filter="url(#shadow)"/>
  <text x="550" y="512" text-anchor="middle" font-size="12" font-weight="bold" fill="#4d7a3a">GBO-informatiemodel</text>
  <text x="550" y="527" text-anchor="middle" font-size="9" fill="#888888">Objecttypen voor gestructureerde, verantwoorde gegevensdeling</text>

  <rect x="100" y="542" width="120" height="32" rx="4" ry="4" fill="#f0f7ef" stroke="#82b366" stroke-width="1"/>
  <text x="160" y="563" text-anchor="middle" font-size="10" font-weight="bold" fill="#333">Bron</text>

  <rect x="240" y="542" width="120" height="32" rx="4" ry="4" fill="#f0f7ef" stroke="#82b366" stroke-width="1"/>
  <text x="300" y="563" text-anchor="middle" font-size="10" font-weight="bold" fill="#333">Dienst</text>

  <rect x="380" y="542" width="120" height="32" rx="4" ry="4" fill="#f0f7ef" stroke="#82b366" stroke-width="1"/>
  <text x="440" y="563" text-anchor="middle" font-size="10" font-weight="bold" fill="#333">Scope</text>

  <rect x="520" y="542" width="140" height="32" rx="4" ry="4" fill="#f0f7ef" stroke="#82b366" stroke-width="1"/>
  <text x="590" y="563" text-anchor="middle" font-size="10" font-weight="bold" fill="#333">Toestemming</text>

  <rect x="680" y="542" width="160" height="32" rx="4" ry="4" fill="#f0f7ef" stroke="#82b366" stroke-width="1"/>
  <text x="760" y="563" text-anchor="middle" font-size="10" font-weight="bold" fill="#333">Gegevensverzoek</text>

  <rect x="860" y="542" width="120" height="32" rx="4" ry="4" fill="#f0f7ef" stroke="#82b366" stroke-width="1"/>
  <text x="920" y="563" text-anchor="middle" font-size="10" font-weight="bold" fill="#333">Grondslag</text>

  <text x="550" y="605" text-anchor="middle" font-size="10" fill="#666" font-style="italic">Zie Laag 2: Informatiemodel GBO voor de volledige uitwerking</text>

  <!-- Pijl: Sector <-> GBO -->
  <line x1="1000" y1="275" x2="1000" y2="490" stroke="#82b366" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowGreen)" marker-start="url(#arrowGreenUp)"/>
  <text x="1008" y="365" font-size="9" fill="#82b366" font-style="italic">domeinextensies</text>
  <text x="1008" y="378" font-size="9" fill="#82b366" font-style="italic">importeren</text>
  <text x="1008" y="391" font-size="9" fill="#82b366" font-style="italic">GBO-model</text>

  <!-- ==================== Legenda ==================== -->
  <rect x="60" y="655" width="420" height="42" rx="4" ry="4" fill="#fafafa" stroke="#cccccc" stroke-width="1"/>
  <text x="74" y="671" font-size="10" font-weight="bold" fill="#333">Legenda</text>

  <rect x="70" y="681" width="22" height="12" rx="3" ry="3" fill="#e1d5e7" stroke="#9673a6" stroke-width="1"/>
  <text x="98" y="691" font-size="9" fill="#333">Sectormodellen</text>

  <rect x="195" y="681" width="22" height="12" rx="3" ry="3" fill="#dae8fc" stroke="#6c8ebf" stroke-width="1"/>
  <text x="223" y="691" font-size="9" fill="#333">Core Data</text>

  <rect x="290" y="681" width="22" height="12" rx="3" ry="3" fill="#d5e8d4" stroke="#82b366" stroke-width="1"/>
  <text x="318" y="691" font-size="9" fill="#333">GBO-informatiemodel</text>

  <text x="1030" y="691" text-anchor="end" font-size="9" fill="#888888">v0.1 · 2026-04-13</text>
</svg>
