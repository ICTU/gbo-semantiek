# docs-build.yml — Validatie van de MkDocs-documentatie
#
# Deze workflow valideert de MkDocs-documentatie bij elke push en pull request
# naar de main/develop branch. De build wordt uitgevoerd in strikte modus,
# zodat gebroken links en ontbrekende bestanden als fouten worden gerapporteerd.

name: Documentatie valideren

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'docs/**'
      - 'mkdocs.yml'

# Minimale rechten: alleen lezen van repository-inhoud
permissions:
  contents: read

jobs:
  build:
    name: MkDocs bouwen en valideren
    runs-on: ubuntu-latest

    steps:
      - name: Repository uitchecken
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Volledige geschiedenis voor mike

      - name: Python instellen
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Afhankelijkheden installeren
        run: pip install mkdocs-material mike

      - name: Documentatie bouwen (strikte modus)
        # --strict: waarschuwingen worden behandeld als fouten
        run: mkdocs build --strict

      - name: Gebouwde site uploaden als artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs-site
          path: site/
          retention-days: 7
